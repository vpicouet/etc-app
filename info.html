<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Generic ETC — User Guide & Methodology</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />

<style>
  :root{
    --header-h: 38px;
    --radius:6px; --radius-sm:3px;
    --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, "JetBrains Mono", "IBM Plex Mono", Menlo, monospace;
    --bg:#f7f7f7; --bg-alt:#f0f0f0; --panel:#ffffff; --panel-2:#fafafa;
    --line:#e2e2e2; --line-strong:#cccccc;
    --text:#1a1a1a; --text-soft:#444; --muted:#666;
    --header-bg:#fff; --header-text:var(--text);
    --accent:#348ABD; --accent-2:#E24A33; --error:#c00;
    --shadow-elev-1:0 1px 2px rgba(0,0,0,0.04);
    --code-bg:#f0f0f0;
  }
  body[data-mode="dark"]{
    --bg:#161a20; --bg-alt:#1c2128; --panel:#21262d; --panel-2:#1c2128;
    --line:#30363d; --line-strong:#444c56;
    --text:#e6edf3; --text-soft:#c9d1d9; --muted:#8b949e;
    --header-bg:#0d1117; --header-text:#e6edf3;
    --accent:#58a6ff; --accent-2:#ff7b72; --error:#f85149;
    --shadow-elev-1:0 1px 2px rgba(0,0,0,0.4);
    --code-bg:#0d1117;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font:14px/1.55 var(--font-ui)}

  header{height:var(--header-h);display:flex;align-items:center;gap:10px;padding:0 12px;
    border-bottom:1px solid var(--line);background:var(--header-bg);color:var(--header-text);
    position:sticky;top:0;z-index:50}
  header h1{margin:0;font-size:14px;font-weight:600;flex:0 0 auto}
  header nav{flex:1;display:flex;gap:6px;align-items:center}
  header nav a{font-size:12px;color:var(--muted);text-decoration:none;padding:3px 8px;
    border:1px solid transparent;border-radius:var(--radius-sm)}
  header nav a.active,header nav a:hover{background:var(--bg-alt);color:var(--text);border-color:var(--line)}
  header .theme-controls{display:flex;gap:4px;align-items:center;flex:0 0 auto;margin-left:auto}
  #theme-toggle{font-size:14px;width:26px;height:22px;line-height:1;padding:0;background:transparent;
    border:1px solid var(--line);color:var(--text);border-radius:var(--radius-sm);cursor:pointer}
  #theme-toggle:hover{background:var(--bg-alt)}

  .docs{display:grid;grid-template-columns:240px minmax(0,1fr);gap:24px;
    max-width:1080px;margin:0 auto;padding:18px 20px 80px}
  aside.toc{position:sticky;top:calc(var(--header-h) + 12px);align-self:start;
    max-height:calc(100vh - var(--header-h) - 24px);overflow:auto;
    border-right:1px solid var(--line);padding:8px 14px 18px 0;font-size:13px}
  aside.toc .toc-title{font-size:11.5px;color:var(--muted);text-transform:uppercase;
    letter-spacing:0.06em;margin:0 0 8px 0;font-weight:700}
  aside.toc ol{list-style:none;margin:0;padding:0;counter-reset:lvl1}
  aside.toc ol > li{counter-increment:lvl1;margin:1px 0}
  aside.toc ol > li > a::before{content:counter(lvl1) ". ";color:var(--muted);
    font-variant-numeric:tabular-nums;font-family:var(--font-mono);font-size:11.5px}
  aside.toc ol ol{margin-top:2px;padding-left:14px;counter-reset:lvl2}
  aside.toc ol ol > li{counter-increment:lvl2}
  aside.toc ol ol > li > a::before{content:counter(lvl1) "." counter(lvl2) " ";color:var(--muted);
    font-variant-numeric:tabular-nums;font-family:var(--font-mono);font-size:11.5px}
  aside.toc a{display:block;color:var(--text-soft);text-decoration:none;padding:2px 6px;
    border-radius:3px;border-left:2px solid transparent;line-height:1.3}
  aside.toc a:hover{background:var(--bg-alt);color:var(--text)}
  aside.toc a.active{background:var(--bg-alt);color:var(--accent);border-left-color:var(--accent);font-weight:600}

  main{min-width:0}
  main h1{font-size:26px;margin:0 0 1em;padding-bottom:8px;border-bottom:2px solid var(--line)}
  main h2{font-size:22px;margin:1.8em 0 0.5em;padding-bottom:6px;border-bottom:1px solid var(--line);
    scroll-margin-top:calc(var(--header-h) + 12px)}
  main h2:first-of-type{margin-top:0}
  main h3{font-size:16px;margin:1.4em 0 0.4em;color:var(--text);
    scroll-margin-top:calc(var(--header-h) + 12px)}
  main h4{font-size:14px;margin:1.1em 0 0.3em;color:var(--text-soft);font-weight:700}
  main p{margin:0.6em 0;color:var(--text-soft)}
  main strong{color:var(--text)}
  main ul,main ol{margin:0.4em 0 0.9em 1.4em;padding:0}
  main li{margin:0.2em 0;color:var(--text-soft)}
  main code{font-family:var(--font-mono);font-size:12.5px;background:var(--code-bg);
    padding:1px 5px;border-radius:3px;color:var(--text)}
  main pre{background:var(--code-bg);border:1px solid var(--line);border-radius:4px;
    padding:10px 12px;overflow:auto;margin:0.8em 0}
  main pre code{background:none;padding:0;font-size:12px}
  main a{color:var(--accent);text-decoration:none}
  main a:hover{text-decoration:underline}
  main table{border-collapse:collapse;margin:0.8em 0;width:100%;font-size:13px}
  main th,main td{border:1px solid var(--line);padding:6px 10px;text-align:left;
    color:var(--text-soft);vertical-align:top}
  main th{background:var(--bg-alt);color:var(--text);font-weight:600}
  main blockquote{background:var(--bg-alt);border-left:3px solid var(--accent);
    padding:10px 14px;margin:1.2em 0;border-radius:0 4px 4px 0;font-size:13.5px}
  main blockquote p{margin:0.3em 0}
  main blockquote strong{color:var(--text)}
  main img{max-width:100%;border:1px solid var(--line);border-radius:6px;
    box-shadow:var(--shadow-elev-1);display:block;margin:0.8em auto}
  main em{color:var(--muted)}
  main hr{border:none;border-top:1px solid var(--line);margin:2em 0}

  mjx-container{font-size:1em !important}
  mjx-container[display="true"]{margin:0.7em 0 !important}

  #load-status{color:var(--muted);font-size:13px;padding:40px 0;text-align:center}

  @media (max-width: 820px){
    .docs{grid-template-columns:1fr;padding:12px}
    aside.toc{position:static;max-height:none;border-right:none;
      border-bottom:1px solid var(--line);padding:8px 0 16px 0;margin-bottom:8px}
  }
</style>

<!-- marked.js — CommonMark + GFM Markdown parser (~50 kB, no dependencies) -->
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<!-- MathJax — configured before the script tag loads so inline $ works -->
<script>
window.MathJax = {
  tex: { inlineMath: [["$","$"],["\\(","\\)"]], displayMath: [["$$","$$"],["\\[","\\]"]] },
  options: { skipHtmlTags: ["script","noscript","style","textarea","pre","code"] }
};
</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
<link id="theme-css" rel="stylesheet" href="themes/twilight.css">
</head>
<body>

<header>
  <h1>Generic ETC</h1>
  <nav>
    <a href="./">Instrument simulator</a>
    <a href="./comparison.html">Comparison</a>
    <a href="./info.html" class="active">Docs</a>
    <a href="https://github.com/vpicouet/etc-app" target="_blank">GitHub</a>
    <a href="https://docs.google.com/spreadsheets/d/1Ox0uxEm2TfgzYA6ivkTpU4xrmN5vO5kmnUPdCSt73uU/edit" target="_blank">Instrument DB</a>
  </nav>
  <span class="theme-controls"><button id="theme-toggle" title="Toggle dark / light mode">🌙</button></span>
</header>

<div class="docs">
  <aside class="toc">
    <p class="toc-title">Contents</p>
    <ol id="toc-list"></ol>
  </aside>
  <main id="doc-body">
    <p id="load-status">Loading…</p>
  </main>
</div>

<script>
"use strict";

/* ── Theme ───────────────────────────────────────────────────────────────── */
function applyMode(mode){
  if (mode !== "dark" && mode !== "light") mode = "light";
  document.body.setAttribute("data-mode", mode);
  try { localStorage.setItem("etc.mode", mode); } catch(e){}
  const b = document.getElementById("theme-toggle");
  if (b) b.textContent = (mode === "dark") ? "☀" : "🌙";
}
(function initTheme(){
  let mode = "light";
  try { mode = localStorage.getItem("etc.mode") || mode; } catch(e){}
  applyMode(mode);
  document.getElementById("theme-toggle").addEventListener("click", () => {
    applyMode(document.body.getAttribute("data-mode") === "dark" ? "light" : "dark");
  });
})();

/* ── Markdown → HTML with math protection ────────────────────────────────── */
function renderMarkdown(md){
  // Stash math blocks so marked doesn't mangle underscores/asterisks inside them
  const stash = [];
  const protect = s => { stash.push(s); return `\x02MATH${stash.length - 1}\x03`; };

  // Display math first (wider patterns, must come before inline)
  md = md.replace(/\$\$([\s\S]+?)\$\$/g,  (_, m) => protect(`$$${m}$$`));
  md = md.replace(/\\\[([\s\S]+?)\\\]/g,  (_, m) => protect(`\\[${m}\\]`));
  // Inline math
  md = md.replace(/\$([^\n$]+?)\$/g,       (_, m) => protect(`$${m}$`));
  md = md.replace(/\\\((.+?)\\\)/g,        (_, m) => protect(`\\(${m}\\)`));

  let html = marked.parse(md, { gfm: true, breaks: false });

  // Restore math tokens (the surrounding HTML may have escaped &amp; etc. — math is raw)
  html = html.replace(/\x02MATH(\d+)\x03/g, (_, i) => stash[+i]);
  return html;
}

/* ── Extract an {#id} anchor from a heading's text, return {id, clean} ───── */
function extractAnchor(text){
  const m = text.match(/\{#([\w-]+)\}\s*$/);
  if (m) return { id: m[1], clean: text.replace(/\s*\{#[\w-]+\}\s*$/, "").trim() };
  // Auto-slug from text (strip leading "N · " section numbers)
  const slug = text.replace(/^[\d·.\s]+/, "").trim()
                   .toLowerCase().replace(/[^\w]+/g, "-").replace(/^-|-$/g, "");
  return { id: slug, clean: text };
}

/* ── Walk rendered headings: set IDs + strip {#id} text ─────────────────── */
function assignIds(container){
  container.querySelectorAll("h1,h2,h3,h4").forEach(h => {
    const { id, clean } = extractAnchor(h.textContent);
    h.id = id;
    if (clean !== h.textContent) h.textContent = clean;
  });
}

/* ── Build sidebar TOC from h2/h3 in the rendered content ───────────────── */
function buildToc(container){
  const tocList = document.getElementById("toc-list");
  tocList.replaceChildren();  // clear

  let h2Li = null, h2Ol = null;

  container.querySelectorAll("h2, h3").forEach(h => {
    if (!h.id) return;
    // Strip leading "N · " or "N.M " from display text
    const text = h.textContent.replace(/^[\d·.\s]+/, "").trim();
    const a = document.createElement("a");
    a.href = "#" + h.id;
    a.textContent = text;

    if (h.tagName === "H2"){
      const li = document.createElement("li");
      li.appendChild(a);
      tocList.appendChild(li);
      h2Li = li; h2Ol = null;
    } else if (h.tagName === "H3" && h2Li){
      if (!h2Ol){ h2Ol = document.createElement("ol"); h2Li.appendChild(h2Ol); }
      const li = document.createElement("li");
      li.appendChild(a);
      h2Ol.appendChild(li);
    }
  });
}

/* ── Smooth scroll for TOC links ─────────────────────────────────────────── */
function wireTocScroll(){
  document.querySelectorAll("aside.toc a[href^='#']").forEach(a => {
    a.addEventListener("click", e => {
      const el = document.getElementById(a.getAttribute("href").slice(1));
      if (!el) return;
      e.preventDefault();
      el.scrollIntoView({ behavior: "smooth", block: "start" });
      history.replaceState(null, "", a.getAttribute("href"));
    });
  });
}

/* ── Scrollspy ───────────────────────────────────────────────────────────── */
function initScrollspy(){
  const links   = Array.from(document.querySelectorAll("aside.toc a[href^='#']"));
  const targets = links.map(a => ({ a, el: document.getElementById(a.getAttribute("href").slice(1)) }))
                       .filter(t => t.el);
  if (!targets.length) return;
  function onScroll(){
    const y = window.scrollY + 70;
    let cur = targets[0];
    for (const t of targets){ if (t.el.offsetTop <= y) cur = t; }
    links.forEach(a => a.classList.remove("active"));
    if (cur) cur.a.classList.add("active");
  }
  window.addEventListener("scroll", onScroll, { passive: true });
  window.addEventListener("resize", onScroll);
  onScroll();
}

/* ── Main ────────────────────────────────────────────────────────────────── */
async function main(){
  const docBody = document.getElementById("doc-body");
  try {
    const res = await fetch("info.md");
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const md   = await res.text();
    const html = renderMarkdown(md);

    // Safe insertion: use a detached div to parse, then move children
    const tmp = document.createElement("div");
    // eslint-disable-next-line no-unsanitized/property -- content is from our own repo file
    tmp.innerHTML = html;
    docBody.replaceChildren(...tmp.childNodes);

    assignIds(docBody);
    buildToc(docBody);
    wireTocScroll();
    initScrollspy();

    // Re-typeset math in the freshly-inserted content
    if (window.MathJax && MathJax.typesetPromise){
      await MathJax.typesetPromise([docBody]);
    }

    // Scroll to hash if present in URL
    if (location.hash){
      const el = document.getElementById(location.hash.slice(1));
      if (el) setTimeout(() => el.scrollIntoView({ block: "start" }), 120);
    }
  } catch(err){
    docBody.replaceChildren();
    const p1 = document.createElement("p");
    p1.style.color = "var(--error)";
    p1.textContent = "Failed to load info.md: " + err.message;
    const p2 = document.createElement("p");
    p2.style.cssText = "color:var(--muted);font-size:12px";
    p2.innerHTML = 'If you are opening this via <code>file://</code>, the browser blocks the fetch. '
      + 'Serve the repo with <code>python3 -m http.server 8000</code> and open '
      + '<a href="http://127.0.0.1:8000/info.html">http://127.0.0.1:8000/info.html</a>.';
    docBody.appendChild(p1);
    docBody.appendChild(p2);
  }
}
main();
</script>
</body>
</html>
