<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Generic ETC — SNR calculator</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<!-- Baked spectra data — also accessible via fetch("data/spectra.json"). The .js wrapper lets file:// work. -->
<script src="data/spectra.js"></script>
<style>
  :root{
    --bg:#f7f7f7; --panel:#ffffff; --line:#e2e2e2; --text:#1a1a1a; --muted:#666;
    --accent:#348ABD; --accent2:#E24A33;
    --header-h: 38px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font:13px/1.35 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    height:100%;width:100%;overflow:hidden}

  /* Header */
  header{height:var(--header-h);display:flex;align-items:center;gap:10px;padding:0 12px;
    border-bottom:1px solid var(--line);background:#fff;position:relative;z-index:5}
  header h1{margin:0;font-size:14px;font-weight:600;flex:0 0 auto}
  header nav{flex:1;display:flex;gap:6px;align-items:center}
  header nav a{font-size:12px;color:var(--muted);text-decoration:none;padding:3px 8px;border:1px solid transparent;border-radius:3px}
  header nav a.active,header nav a:hover{background:#f0f0f0;color:var(--text);border-color:var(--line)}
  header .meta{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}

  /* App grid — fills the remaining viewport */
  .app{display:grid;grid-template-columns: minmax(0,1fr) 480px;gap:8px;padding:8px;
    height: calc(100vh - var(--header-h)); width:100%}
  #plot-wrap{background:var(--panel);border:1px solid var(--line);border-radius:6px;
    padding:6px;display:flex;flex-direction:column;min-height:0;min-width:0;overflow:hidden}
  #controls{background:var(--panel);border:1px solid var(--line);border-radius:6px;
    padding:8px;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:8px}

  /* Top row controls */
  .topbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;flex:0 0 auto}
  .topbar > *{flex:0 0 auto}
  label.kv{display:flex;align-items:center;gap:4px;font-size:11.5px;color:var(--muted)}
  select,input[type="text"],input[type="number"]{font:12px inherit;padding:2px 4px;
    border:1px solid #ccc;border-radius:3px;background:#fff;color:var(--text)}
  button{font:12px inherit;padding:3px 8px;border:1px solid #ccc;background:#fff;
    border-radius:3px;cursor:pointer}
  button:hover{background:#f0f0f0}
  .check{display:flex;align-items:center;gap:3px;font-size:11.5px;color:#333}

  /* Accordions */
  .acc{border:1px solid var(--line);border-radius:4px;background:#fff}
  .acc > summary{padding:5px 8px;cursor:pointer;font-weight:600;font-size:12px;
    background:#f3f3f3;border-radius:4px 4px 0 0;list-style:none;
    display:flex;justify-content:space-between;align-items:center;user-select:none}
  .acc[open] > summary{border-bottom:1px solid var(--line)}
  .acc > summary::after{content:"▾";color:var(--muted);font-size:10px}
  .acc[open] > summary::after{content:"▴"}
  .acc-body{padding:6px 8px}

  /* Slider rows */
  .slider-row{display:grid;grid-template-columns: 130px 1fr 78px;gap:6px;
    align-items:center;margin-bottom:4px}
  .slider-row label{font-size:11px;color:var(--muted);cursor:pointer;user-select:none}
  .slider-row label:hover{color:var(--accent);text-decoration:underline}
  .slider-row label.is-x{color:var(--accent2);font-weight:600}
  .slider-row input[type="range"]{width:100%;accent-color:var(--accent)}
  .slider-row .val{font-size:11px;text-align:right;color:var(--text);
    font-variant-numeric:tabular-nums}
  .flags-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}

  /* Plot */
  #status{font-size:11px;color:var(--muted);padding:2px 4px;flex:0 0 auto}
  #status.err{color:#c00}
  .plot-area{flex:1 1 auto;min-height:0;width:100%;position:relative;display:flex;flex-direction:column;overflow:hidden}
  .plot-area > svg, .plot-area > .img-view{display:none;flex:1 1 0;min-height:0;width:100%;height:100%}
  .plot-area > svg.active{display:block}
  .plot-area > .img-view.active{display:flex}
  #plot{display:none;width:100%;height:100%}
  #plot.active{display:block}
  .plot-axis text{font-size:10px;fill:#333}
  .plot-axis path,.plot-axis line{stroke:#888;shape-rendering:crispEdges}
  .legend{font-size:10.5px;fill:#222}
  .vline{stroke:#000;stroke-width:1.2;stroke-dasharray:3,3;pointer-events:none}
  .ax-title{font-size:11px;fill:#222;font-weight:600}

  /* View tabs (SNR / Spectro image) */
  .view-tabs{display:flex;gap:2px;flex:0 0 auto;margin-bottom:4px}
  .view-tab{padding:3px 10px;font-size:11.5px;background:#ececec;border:1px solid var(--line);
    border-bottom:none;border-radius:4px 4px 0 0;cursor:pointer;color:#444}
  .view-tab.active{background:#fff;color:var(--text);font-weight:600}

  /* Spectro image view: fixed proportion between imshow stack (top 55%) and analysis panels (bottom 45%) */
  .img-view{flex-direction:column;gap:4px;padding:2px;min-height:0;height:100%;overflow:hidden}
  .img-row{display:flex;flex-direction:column;gap:6px;height:55%;min-height:0;flex:none}
  /* Horizontal variant: two imshow cells side-by-side (used by the IFS view) */
  .img-row-h{display:grid;grid-template-columns:1fr 1fr;gap:6px;height:55%;min-height:0;flex:none}
  .img-cell{border:1px solid var(--line);border-radius:3px;background:#000;
    position:relative;overflow:hidden;display:block;width:100%;flex:1 1 0;min-height:0}
  .img-cell .cell-title{font-size:11px;color:#fff;background:rgba(0,0,0,0.55);
    padding:2px 6px;position:absolute;top:0;left:0;right:0;z-index:3}
  /* Canvas fills the cell, stretched in pixel-art mode — image aspect is not preserved (it's 500×100, very thin) */
  .img-cell canvas{width:100%;height:100%;display:block;image-rendering:pixelated;position:relative;z-index:1;cursor:crosshair}
  .img-cell svg.overlay{position:absolute;inset:0;width:100%;height:100%;z-index:2;pointer-events:none}
  /* 2×2 grid of analysis sub-plots: left col = spatial profile + histogram, right col = spectral profile + optics */
  .img-extra{height:45%;min-height:0;flex:none;display:grid;
    grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:6px;overflow:hidden}
  .img-extra > svg{display:block;border:1px solid var(--line);
    border-radius:3px;background:#fff;min-height:0;min-width:0;overflow:hidden}

  /* Pixel hover tooltip */
  #pixtip{position:fixed;pointer-events:none;background:rgba(0,0,0,0.85);color:#fff;
    font-size:11px;padding:4px 7px;border-radius:3px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    z-index:9999;white-space:pre;display:none;line-height:1.35}

  details.sheet{margin-top:auto;flex:0 0 auto}
  details.sheet summary{cursor:pointer;color:var(--muted);font-size:11px}
  details.sheet input{width:100%;margin-top:4px;font-size:11px;padding:2px 4px;
    border:1px solid #ccc;border-radius:3px}

  /* === Responsive: mobile === */
  @media (max-width: 820px){
    html,body{overflow:auto}
    .app{grid-template-columns: 1fr;height:auto;padding:6px}
    #plot-wrap{height:55vh;min-height:380px}
    #controls{max-height:none;overflow:visible}
    .slider-row{grid-template-columns: 110px 1fr 70px}
    header nav{flex-wrap:wrap}
  }
</style>
</head>
<body>

<div id="pixtip"></div>

<header>
  <h1>Generic ETC</h1>
  <nav>
    <a href="./" class="active">App</a>
    <a href="./info.html">Info</a>
    <a href="https://github.com/vpicouet/etc-app" target="_blank">GitHub</a>
    <a href="https://docs.google.com/spreadsheets/d/1Ox0uxEm2TfgzYA6ivkTpU4xrmN5vO5kmnUPdCSt73uU/edit" target="_blank">Instrument DB</a>
  </nav>
  <span id="meta" class="meta"></span>
</header>

<div class="app">
  <div id="plot-wrap">
    <div id="status">Loading instruments…</div>
    <div class="view-tabs">
      <div class="view-tab active" data-view="snr" title="Noise budget, contributions stack, SNR stack, surface-brightness limits">SNR</div>
      <div class="view-tab" data-view="img" title="Simulated detector image: source + sky + dark + RN + CIC (and EMCCD gamma amplification if EM_gain>1)">Spectro image</div>
      <div class="view-tab" id="view-tab-ifs" data-view="ifs" style="display:none" title="IFS view: cube slice + integrated spectrum. Only shown when the current instrument is an IFS (dimensions=3 in the spreadsheet).">IFS</div>
    </div>
    <div class="plot-area">
      <svg id="plot" class="active" preserveAspectRatio="none"></svg>
      <div id="plot-img" class="img-view">
        <div class="img-row">
          <div class="img-cell">
            <div class="cell-title" id="img-single-title">Single exposure</div>
            <canvas id="cv-single" title="DS9 colormap: right-click + drag (or ctrl-click + drag on Mac trackpad). Horizontal = bias, vertical = contrast. Double-click to reset."></canvas>
            <svg id="ov-single" class="overlay" preserveAspectRatio="none"></svg>
          </div>
          <div class="img-cell">
            <div class="cell-title" id="img-stack-title">Stacked</div>
            <canvas id="cv-stack" title="DS9 colormap: right-click + drag (or ctrl-click + drag on Mac trackpad). Horizontal = bias, vertical = contrast. Double-click to reset."></canvas>
            <svg id="ov-stack" class="overlay" preserveAspectRatio="none"></svg>

        <div class="img-extra">
          <svg id="svg-prof-spat"></svg>
          <svg id="svg-prof-spec"></svg>
          <svg id="svg-hist"></svg>
          <svg id="svg-optics"></svg>
        </div>
      </div>
      <div id="plot-ifs" class="img-view">
        <div class="img-row-h">
          <div class="img-cell">
            <div class="cell-title" id="ifs-single-title">Single cube — λ slice</div>
            <canvas id="cv-ifs-single" title="Single-exposure λ-slice of the IFS cube. Cube[H × n3 × W] is built as a separable product: 2D spatial PSF × source spectrum. DS9 colormap drag works here too."></canvas>
            <svg id="ov-ifs-single" class="overlay" preserveAspectRatio="none"></svg>
          </div>
          <div class="img-cell">
            <div class="cell-title" id="ifs-stack-title">Stacked cube — λ slice</div>
            <canvas id="cv-ifs-stack" title="Stacked-exposure λ-slice. Drag the dashed rectangle to choose the extraction region. The integrated spectrum below shows the average flux vs λ over that region."></canvas>
            <svg id="ov-ifs-stack" class="overlay" preserveAspectRatio="none"></svg>

        <div class="img-extra" style="grid-template-columns:1fr;grid-template-rows:1fr">
          <svg id="svg-ifs-spec"></svg>

    </div>
  </div>

  <div id="controls">
    <div class="topbar">
      <label class="kv" title="Pick an instrument from the shared spreadsheet. Loads all its parameters into the sliders.">Instrument <select id="instrument"></select></label>
      <label class="kv" title="Choose which parameter to vary along the x-axis. All other parameters are held fixed.">X axis <select id="xaxis"></select></label>
      <label class="kv" title="SNR mode: per pixel, per resolution element, per source, or per source × 2 spectral pixels (IFS).">SNR <select id="snr_res">
        <option title="SNR computed over a single pixel.">per pix</option>
        <option selected title="SNR computed over one resolution element (default).">per Res elem</option>
        <option title="SNR computed over all pixels covered by the source.">per Source</option>
        <option title="IFS mode: integrate over the source × 2 adaptive spectral pixels (KCWI-like).">per Source per 2λpix</option>
      </select></label>
      <label class="check" title="Use a logarithmic x-axis."><input type="checkbox" id="xlog" checked> xlog</label>
      <label class="check" title="Use a logarithmic y-axis for noise and contribution panels."><input type="checkbox" id="ylog"> ylog</label>
      <button id="reset" title="Reset all parameters to their default values (does not change the instrument).">↺</button>

    <div id="accordions"></div>

    <details class="acc" id="dep-acc">
      <summary>Parameter dependencies (lock formulas)</summary>
      <div class="acc-body" id="dep-list"></div>
    </details>

    <details class="acc" id="img-opts-acc">
      <summary>Image options (Spectro image view)</summary>
      <div id="img-opts"></div>
    </details>

    <!-- Hidden GSheet inputs (still read by loadInstruments). The full "Data source" UI was removed per request. -->
    <input id="sheet_id" type="hidden" value="1Ox0uxEm2TfgzYA6ivkTpU4xrmN5vO5kmnUPdCSt73uU"/>
    <input id="sheet_name" type="hidden" value="instruments.csv"/>
    <button id="reload" style="display:none"></button>
  </div>
</div>

<script>
"use strict";

/* ============================================================================
   1. CONSTANTS + HELPERS
   ========================================================================== */
const COLORS = ['#E24A33','#988ED5','#FBC15E','#348ABD','#8EBA42','#FFB5B8','#777777'];
const NAMES  = ["Signal","Dark current","Sky","Read noise","CIC","Extra background"];

function lin(n,a,b){const o=new Array(n);const d=(b-a)/(n-1);for(let i=0;i<n;i++)o[i]=a+d*i;return o}
function log(n,a,b){a=Math.max(a,1e-30);const la=Math.log10(a),lb=Math.log10(Math.max(b,a*1.0001));const o=new Array(n);const d=(lb-la)/(n-1);for(let i=0;i<n;i++)o[i]=10**(la+d*i);return o}
function space(n,a,b,xlog){return (xlog && a>=0) ? log(n, a===0?1e-4:a, b) : lin(n,a,b)}
function erf(x){const s=Math.sign(x);x=Math.abs(x);const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;const t=1/(1+p*x);const y=1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);return s*y}
function normSf(x,scale){if(scale<=0)return x>0?0:1;const z=x/scale;return 0.5*(1-erf(z/Math.SQRT2))}
function convert_ergs2LU(flux, wave_nm){const wave=wave_nm*1e-7;const E=6.62e-27*3e10/wave;const a=Math.PI/(180*3600);return flux/(E*a*a)}
function convert_LU2ergs(LU, wave_nm){const wave=wave_nm*1e-7;const E=6.62e-27*3e10/wave;const a=Math.PI/(180*3600);return LU*E*a*a}
function calculate_photon_counting_RN_noise(RN){
  const f = r=>{
    if (r<0.3) return 2*normSf(0.5, r);
    if (r>0.5) return r;
    const noise_low = 2*normSf(0.5, 0.3);
    const t = (r-0.3)/0.2;
    return noise_low*(1-t) + 0.5*t;
  };
  return typeof RN==="number" ? f(RN) : RN.map(f);
}
function fmtNum(v){if(!isFinite(v))return "—";return (Math.abs(v)<1e-3||Math.abs(v)>=1e4) ? v.toExponential(2) : (+v).toFixed(2)}
function argClosest(a,v){let best=0,d=Infinity;for(let i=0;i<a.length;i++){const dd=Math.abs(a[i]-v);if(dd<d){d=dd;best=i}}return best}
function safeLog10(v){return v>0 ? Math.log10(v) : NaN}

/* ============================================================================
   PRNG + sample distributions for the image simulator
   ========================================================================== */
function makeRng(seed){
  // Mulberry32 — fast, deterministic
  let s = (seed>>>0) || 1;
  return function(){ s = (s + 0x6D2B79F5)>>>0; let t = s; t = Math.imul(t ^ (t>>>15), t | 1); t ^= t + Math.imul(t ^ (t>>>7), t | 61); return ((t ^ (t>>>14))>>>0) / 4294967296; };
}
function makeNormal(rng){
  // Box-Muller, with cached sample
  let spare=null;
  return function(mu,sigma){
    if (spare!=null){ const x=spare; spare=null; return mu + sigma*x; }
    let u, v, s;
    do { u = rng()*2-1; v = rng()*2-1; s = u*u+v*v; } while (s===0 || s>=1);
    const m = Math.sqrt(-2*Math.log(s)/s);
    spare = v*m;
    return mu + sigma*(u*m);
  };
}
function makePoisson(rng){
  // Knuth for small λ, Gaussian approx for large λ
  return function(lambda){
    if (!(lambda>0)) return 0;
    if (lambda < 30){
      const L = Math.exp(-lambda);
      let k=0, p=1;
      while (true){
        k++; p *= rng();
        if (p <= L) return k-1;
        if (k>2000) return k;
      }
    } else {
      // Normal approx, clamp at 0
      // Use Box-Muller inline to avoid coupling
      let u, v, s;
      do { u = rng()*2-1; v = rng()*2-1; s = u*u+v*v; } while (s===0 || s>=1);
      const z = u*Math.sqrt(-2*Math.log(s)/s);
      return Math.max(0, Math.round(lambda + Math.sqrt(lambda)*z));
    }
  };
}
function makeGamma(rng, normFn){
  // Marsaglia & Tsang for shape k>=1; shape boost for k<1 (Ahrens-Dieter-ish)
  // theta = scale; returns sample from Gamma(k, theta), mean = k*theta.
  return function gamma(k, theta){
    if (!(k>0) || !(theta>0)) return 0;
    if (k < 1){
      // Boost: Gamma(k) = Gamma(k+1) * U^(1/k)
      const g = gamma(k+1, theta);
      const u = rng();
      return g * Math.pow(u, 1/k);
    }
    const d = k - 1/3, c = 1/Math.sqrt(9*d);
    while (true){
      let x, v;
      do { x = normFn(0,1); v = 1 + c*x; } while (v<=0);
      v = v*v*v;
      const u = rng();
      if (u < 1 - 0.0331*x*x*x*x) return d*v*theta;
      if (Math.log(u) < 0.5*x*x + d*(1 - v + Math.log(v))) return d*v*theta;
    }
  };
}

/* ============================================================================
   Image simulator — baseline Gaussian emission line (spectro) or 2D point source (imager)
   Returns: { single:Float32Array(H*W), stack:Float32Array(H*W), W, H,
              wavelengths (Å, length W), xPhys (Å), yPhys ("), title_single, title_stack }
   Physics matches Observation.SimulateFIREBallemCCDImage for source="Baseline Spectra".
   ========================================================================== */
function gauss1d(x, x0, sigma){
  const a = (x-x0)/sigma;
  return Math.exp(-0.5*a*a);
}
function erf01(x){return 0.5*(1+erf(x))}

/* Interpolate a baked curve {min_nm, max_nm, n, values:[...]} onto a target wavelength array (Å). */
function interpCurve(values, gridSpec, targetAngstroms){
  if (!values || !values.length) return null;
  const out = new Float64Array(targetAngstroms.length);
  const minNm = gridSpec.min_nm, maxNm = gridSpec.max_nm, n = values.length;
  const dnm = (maxNm - minNm) / (n - 1);
  for (let i=0; i<targetAngstroms.length; i++){
    const nm = targetAngstroms[i] / 10;
    if (nm < minNm || nm > maxNm){ out[i] = 0; continue; }
    const f = (nm - minNm) / dnm;
    const i0 = Math.floor(f);
    const i1 = Math.min(n-1, i0+1);
    const t = f - i0;
    out[i] = values[i0]*(1-t) + values[i1]*t;
  }
  return out;
}

function simulateImage(p){
  // Use scalar parameters from STATE.values + FLAGS
  const W = p.W || 500, H = p.H || 100;          // detector size (W = spectral, H = spatial)
  const seed = p.seed >>> 0;
  const rng = makeRng(seed);
  const norm = makeNormal(rng);
  const pois = makePoisson(rng);
  const gam = makeGamma(rng, norm);

  // Pull params
  const wavelength = p.wavelength;                  // nm
  const Spectral_resolution = p.Spectral_resolution;
  const Slitwidth = p.Slitwidth, Slitlength = p.Slitlength;
  const PSF_RMS_mask = p.PSF_RMS_mask, PSF_RMS_det = p.PSF_RMS_det;
  const Size_source = p.Size_source, Line_width = p.Line_width;
  const pixel_scale = p.pixel_scale, dispersion = p.dispersion;
  const Bandwidth = p.Bandwidth;
  const QE = p.QE, Throughput = p.Throughput, Atmosphere = p.Atmosphere;
  const Collecting_area = p.Collecting_area;
  const Sky = p.Sky, Signal = p.Signal_in;
  const exposure_time = p.exposure_time, readout_time = p.readout_time, acquisition_time = p.acquisition_time;
  const RN = p.RN, Dark_current = p.Dark_current, CIC_charge = p.CIC_charge;
  const EM_gain = p.EM_gain, extra_background = p.extra_background;
  const cosmic_ray_loss_per_sec = p.cosmic_ray_loss_per_sec;
  const Throughput_FWHM = p.Throughput_FWHM; // Å
  const spectro = !!p.spectrograph, counting_mode = !!p.counting_mode;
  const opt_QElambda = p.QElambda!==false;
  const opt_atmlambda = p.atmlambda!==false;
  const opt_skylines = !!p.sky_lines;
  const mode = p.source_im || "Sim image";   // "Sim image" | "Source" | "Convolved source" | "SNR"

  // ---- Reproduce key derived quantities from Observation.initilize ----
  const fsr = 2.35, arcsec2str = Math.pow(Math.PI/180/3600, 2);
  // PSF in spectral pixels
  const PSF_lambda_pix = 10*wavelength/Spectral_resolution/dispersion;
  // Spectral resolution effective (in Å)
  const point_source_spectral_resolution = 10*wavelength/Spectral_resolution; // Å
  const diffuse_spectral_resolution = Math.sqrt(point_source_spectral_resolution**2 + (Slitwidth*dispersion/pixel_scale)**2);

  // Spatial PSF in pixels (at detector)
  const Rx = PSF_RMS_det/pixel_scale;
  // Source spatial sigma (in detector pixels)
  const PSF_x = Math.sqrt(Math.min(Size_source/pixel_scale, Slitlength/pixel_scale)**2 + Rx*Rx);
  // Source spectral sigma (in detector pixels)
  const PSF_lam = Math.sqrt((diffuse_spectral_resolution/dispersion)**2 + (Line_width/dispersion)**2);

  // Effective area
  const effective_area = QE*Throughput*Atmosphere*(Collecting_area*100*100);

  // Aperture (slit) fraction
  let flux_fraction = 1;
  if (spectro){
    flux_fraction = (1 + erf(Slitlength/(2*Math.SQRT2*PSF_RMS_mask)) - 1);
    flux_fraction *= (1 + erf(Slitwidth /(2*Math.SQRT2*PSF_RMS_mask)) - 1);
    if (!isFinite(flux_fraction) || flux_fraction<=0) flux_fraction = 1;
  }

  // Signal: convert ergs → LU; per pix per s integrated over slit area (Slitwidth × dispersion in Å)
  const Signal_use = Signal > 1 ? Math.pow(10, -(Signal-20.08)/2.5)*2.06e-16 : Signal;
  const Signal_LU = convert_ergs2LU(Signal_use, wavelength);
  // factor_CU2el: e-/s per LU per pixel (depends on mode; for the image, take per-pixel rate = effective_area · arcsec2str · Slitwidth · dispersion)
  let factor_CU2el, factor_CU2el_sky;
  if (spectro){
    factor_CU2el     = effective_area * arcsec2str * Math.min(Slitwidth, Size_source) * dispersion;
    factor_CU2el_sky = effective_area * arcsec2str * Slitwidth * dispersion;
  } else {
    factor_CU2el     = effective_area * pixel_scale*pixel_scale * Throughput_FWHM;
    factor_CU2el_sky = factor_CU2el;
  }
  // Signal_el = e-/pix/exp at the SOURCE PEAK before profile spreading (we then multiply by normalized Gaussian)
  const Signal_el_total = Signal_LU * factor_CU2el * exposure_time * flux_fraction;
  // For the image, the source spreads over PSF_x × PSF_lam pixels — integrate to total e- = Signal_el_total
  // Sky rate per pixel per exposure:
  const Sky_LU = convert_ergs2LU(Sky, wavelength);
  const sky_e_per_pix_per_exp = Sky_LU * factor_CU2el_sky * exposure_time;
  const dark_per_pix_per_exp = Dark_current * exposure_time / 3600;
  const extra_per_pix_per_exp = extra_background * exposure_time / 3600;

  // N images stacked
  const cosmic_ray_loss = Math.min(cosmic_ray_loss_per_sec*(exposure_time + readout_time/2), 1);
  const N_images = acquisition_time*3600/(exposure_time + readout_time);
  const N_stack = Math.max(1, Math.floor(N_images * (1-cosmic_ray_loss)));

  // λ-axis (Å)
  const wave_min = 10*wavelength - (W/2)*dispersion;
  const wave_max = 10*wavelength + (W/2)*dispersion;
  const wavelengths = new Float64Array(W);
  for (let i=0;i<W;i++) wavelengths[i] = wave_min + (wave_max-wave_min)*i/(W-1);

  // Throughput(λ): try baked instrument throughput; else Gaussian; else flat.
  const thSigma = Throughput_FWHM / 2.35;
  const throughputCurve = new Float64Array(W);
  if (opt_QElambda){
    for (let i=0;i<W;i++) throughputCurve[i] = gauss1d(wavelengths[i], wavelength*10, thSigma);
  } else {
    throughputCurve.fill(1);
  }

  // Atmosphere curve — use baked transmission if available; otherwise mild raised-cosine placeholder.
  const atmCurve = new Float64Array(W);
  if (opt_atmlambda){
    let used = false;
    if (SPECTRA_DATA && SPECTRA_DATA.atm && p.atm_kind && SPECTRA_DATA.atm[p.atm_kind]){
      const c = interpCurve(SPECTRA_DATA.atm[p.atm_kind], SPECTRA_DATA.grid, wavelengths);
      if (c){
        for (let i=0;i<W;i++) atmCurve[i] = c[i];
        used = true;
      }
    }
    if (!used){
      for (let i=0;i<W;i++){
        const t = (wavelengths[i] - wavelengths[0]) / (wavelengths[W-1] - wavelengths[0] || 1);
        atmCurve[i] = 1 - 0.15*(1 - Math.cos(2*Math.PI*t))/2;
      }
    }
  } else {
    atmCurve.fill(1);
  }

  // Spectral profile of the source — either:
  //   - "Baseline emission line": Gaussian centred mid-W, sigma = PSF_lam (original behaviour), OR
  //   - a baked spectrum (continuum SED): interpolate it on the detector wavelengths
  //
  // We follow Observation.py SimulateFIREBallemCCDImage closely:
  //   - spatialProfile = Gaussian1D(amp=1, sigma=PSF_x)         (peak=1, NOT sum=1)
  //   - spectra        = Gaussian1D(amp=1, sigma=PSF_λ) × atm × throughput
  //   - source_im      = outer(spectra, spatial × slit) / Σ_smaller_psf
  //   - amplitude      = Signal_el_total (proportional to Signal slider through Signal_el_total)
  // The key trick (Python): we normalise the total flux by the sum of a NARROWER PSF, which makes
  // the peak of the source proportional to Signal_el_total / (2π σ_y σ_λ) — physically correct,
  // and visible on the imshow when Signal grows.

  const spectralProfile = new Float64Array(W);
  const wantedSpec = p.spectrum || "Baseline emission line";
  if (wantedSpec === "Baseline emission line" || !SPECTRA_DATA || !SPECTRA_DATA.spectra[wantedSpec]){
    // Gaussian emission line, peak=1 at the centre
    for (let i=0;i<W;i++) spectralProfile[i] = gauss1d(i, W/2, PSF_lam);
  } else {
    const redshift = (typeof p.Redshift==="number") ? p.Redshift : 0;
    const observedRest = new Float64Array(W);
    for (let i=0;i<W;i++) observedRest[i] = wavelengths[i] / (1 + redshift);
    const fluxRest = interpCurve(SPECTRA_DATA.spectra[wantedSpec], SPECTRA_DATA.grid, observedRest);
    // SED with peak=1 (so it acts like the Gaussian baseline — Signal_el_total carries the magnitude)
    let pk = 0; for (let i=0;i<W;i++) if (fluxRest[i]>pk) pk = fluxRest[i];
    if (!(pk>0)) pk = 1;
    for (let i=0;i<W;i++) spectralProfile[i] = fluxRest[i]/pk;
  }
  // Apply throughput × atm (multiplicative shaping along λ — does NOT renormalise)
  for (let i=0;i<W;i++) spectralProfile[i] *= throughputCurve[i]*atmCurve[i];

  // Spatial profile — Gaussian, peak=1 (NOT sum=1, matches Python)
  const spatialProfile = new Float64Array(H);
  for (let j=0;j<H;j++) spatialProfile[j] = gauss1d(j, H/2, PSF_x);

  // Slit profile (only for spectro): erf gate, peak=1
  const slitProfile = new Float64Array(H);
  if (spectro){
    const length = Slitlength/2/pixel_scale;
    for (let j=0;j<H;j++){
      const dj = j - H/2;
      const a = erf((length - dj)/(Math.SQRT2*Math.max(Rx,0.05)));
      const b = erf((length + dj)/(Math.SQRT2*Math.max(Rx,0.05)));
      slitProfile[j] = 0.5*(a+b);
    }
    let m = 0; for (let j=0;j<H;j++) if (slitProfile[j]>m) m=slitProfile[j];
    if (m>0) for (let j=0;j<H;j++) slitProfile[j] /= m;
  } else {
    slitProfile.fill(1);
  }

  // Build the noiseless source image (e-/pix/exp).
  // Python: source_im = outer(spectra, spatial × slit) / Σ_smaller_spatial
  // i.e. it divides by the SUM of a NARROWER Gaussian (sigma = PSF_lambda_pix² / (PSF_λ² + PSF_lambda_pix²)
  // for the spectral axis, Rx² / (PSF_x² + Rx²) for the spatial axis).
  // This narrower-PSF normaliser makes the source peak proportional to Signal_el_total / (PSF area).
  //
  // We implement the same idea: build the narrower Gaussian and sum it once.
  const psf_spec_narrow_sigma = Math.max(0.5, PSF_lambda_pix * PSF_lambda_pix / Math.max(0.01, PSF_lam*PSF_lam + PSF_lambda_pix*PSF_lambda_pix));
  const psf_spat_narrow_sigma = Math.max(0.5, Rx * Rx / Math.max(0.01, PSF_x*PSF_x + Rx*Rx));
  // Sum of a Gaussian peak=1 narrower-σ on a wide window  ≈ σ × √(2π) when σ is small vs window
  let sumNarrowSpec = 0;
  for (let i=0;i<W;i++) sumNarrowSpec += gauss1d(i, W/2, psf_spec_narrow_sigma);
  let sumNarrowSpat = 0;
  for (let j=0;j<H;j++) sumNarrowSpat += gauss1d(j, H/2, psf_spat_narrow_sigma);
  const normFactor = (sumNarrowSpec || 1) * (sumNarrowSpat || 1);

  // Amplitude: Python uses `flux = Signal_el / exposure_time` (e-/s) but the whole image is implicitly
  // multiplied by exposure_time downstream. In our model we already have Signal_el_total (e-/exp,
  // total integrated through the slit). So the right amplitude is Signal_el_total / normFactor.
  const amplitude = Signal_el_total / normFactor;

  const source = new Float64Array(W*H);
  for (let j=0;j<H;j++){
    const spat = amplitude * spatialProfile[j] * slitProfile[j];
    for (let i=0;i<W;i++){
      source[j*W + i] = spat * spectralProfile[i];
    }
  }

  // Sky: continuum + optional emission lines (baked sky_lines OR fallback random Gaussians).
  // IMPORTANT: sky is light that goes through the slit too — so it is GATED BY THE SLIT PROFILE
  // on the spatial axis (just like the source). Outside the slit, no sky.
  const sky_rate = sky_e_per_pix_per_exp;        // e-/pix/exp continuum baseline (inside slit)
  const dark_rate = dark_per_pix_per_exp;
  const extra_rate = extra_per_pix_per_exp;

  // Per-column sky multiplier from baked sky-line spectrum
  let skyLineMult = null;
  if (opt_skylines){
    skyLineMult = new Float64Array(W); skyLineMult.fill(1);
    let used = false;
    if (SPECTRA_DATA && SPECTRA_DATA.sky_lines && p.sky_kind && SPECTRA_DATA.sky_lines[p.sky_kind]){
      // sky_lines stored on the finer sky_grid
      const skyCurve = interpCurve(SPECTRA_DATA.sky_lines[p.sky_kind], SPECTRA_DATA.sky_grid, wavelengths);
      if (skyCurve){
        // Convolve mildly with the spectral PSF
        const sigmaPix = Math.max(0.7, PSF_lam);
        const k = Math.max(2, Math.ceil(sigmaPix*3));
        const conv = new Float64Array(W);
        for (let i=0;i<W;i++){
          let s = 0, n = 0;
          for (let d=-k; d<=k; d++){
            const j = i+d; if (j<0||j>=W) continue;
            const w = gauss1d(d, 0, sigmaPix);
            s += skyCurve[j]*w; n += w;
          }
          conv[i] = n>0 ? s/n : 0;
        }
        // Normalise so the peak is "amp×" continuum
        let pk = 0; for (let i=0;i<W;i++) if (conv[i]>pk) pk = conv[i];
        if (pk > 0){
          const amp = 10;
          for (let i=0;i<W;i++) skyLineMult[i] = 1 + (amp-1)*conv[i]/pk;
          used = true;
        }
      }
    }
    if (!used){
      // Fallback: 6 random Gaussian sky lines (deterministic given seed)
      const rngLines = makeRng(seed^0xBEEF);
      for (let l=0;l<6;l++){
        const i0 = Math.floor(rngLines()*W);
        const sigma = 1.0 + rngLines()*1.5;
        const amp = 4 + rngLines()*8;
        for (let i=0;i<W;i++) skyLineMult[i] += (amp-1)*gauss1d(i, i0, sigma);
      }
    }
  }

  // sky multiplier value at a column
  function skyAt(col){ return skyLineMult ? sky_rate*skyLineMult[col] : sky_rate; }

  // Spatial gate: sky only present inside the slit. Dark + extra-background are everywhere
  // (they originate at the detector, not from the sky).
  function skyAtRow(col, j){ return skyAt(col) * slitProfile[j]; }

  // ---- Build single + stacked images depending on the requested display mode
  const single = new Float64Array(W*H);
  const stack = new Float64Array(W*H);
  const Nst = N_stack;

  if (mode === "Source" || mode === "Convolved source"){
    // Display the noise-free source image (e-/exp), with or without convolution / slit losses already applied (we always apply slit profile above).
    for (let j=0;j<H;j++) for (let i=0;i<W;i++) single[j*W+i] = stack[j*W+i] = source[j*W+i];
  } else if (mode === "SNR"){
    // Approximate per-pixel SNR map = source / sqrt(source + sky + dark + extra + RN²)
    for (let j=0;j<H;j++){
      for (let i=0;i<W;i++){
        const s = source[j*W+i];
        const bg = skyAtRow(i, j) + dark_rate + extra_rate;
        const noise2 = s + bg + RN*RN;
        const snr1 = noise2>0 ? s/Math.sqrt(noise2) : 0;
        single[j*W+i] = snr1;
        stack[j*W+i] = snr1 * Math.sqrt(Math.max(1,Nst));
      }
    }
  } else {
    // "Sim image" — full Poisson + EMCCD + RN realisation
    for (let j=0;j<H;j++){
      for (let i=0;i<W;i++){
        const lam1 = source[j*W+i] + skyAtRow(i, j) + dark_rate + extra_rate;
        let s = pois(lam1);
        if (EM_gain > 1){
          if (rng() < CIC_charge) s += 1;
          if (s > 0) s = gam(s, EM_gain);
        }
        s += norm(0, RN);
        single[j*W+i] = s;
      }
    }
    for (let j=0;j<H;j++){
      for (let i=0;i<W;i++){
        const lamN = (source[j*W+i] + skyAtRow(i, j) + dark_rate + extra_rate) * Nst;
        let s = pois(lamN);
        if (EM_gain > 1){
          const cic_sum = Nst > 0 ? pois(CIC_charge * Nst) : 0;
          if (s + cic_sum > 0) s = gam(s + cic_sum, EM_gain) / Nst;
          else s = 0;
        } else {
          s = Nst > 0 ? s / Nst : 0;
        }
        s += norm(0, Nst>0 ? RN/Math.sqrt(Nst) : RN);
        stack[j*W+i] = s;
      }
    }
  }

  return {
    single, stack, W, H, N_stack: Nst,
    wavelengths,
    xPhys_per_pix: dispersion,    // Å/pix
    yPhys_per_pix: pixel_scale,   // "/pix
    Signal_el_total, sky_e_per_pix_per_exp, dark_per_pix_per_exp, extra_per_pix_per_exp,
    cosmic_ray_loss, EM_gain, spectro,
    // Optics curves for the right-hand panel
    throughputCurve, atmCurve, skyLineMult, slitProfile,
    // Diagnostics
    spectralProfile, spatialProfile
  };
}

/* ============================================================================
   2. PHYSICS (port of Observation.initilize)
   ========================================================================== */
function computeObservation(p){
  const N = p.xArr.length;
  const arrify = v => (typeof v==="number")? Array(N).fill(v) : v.slice();
  let Signal=arrify(p.Signal), Sky=arrify(p.Sky), Dark_current=arrify(p.Dark_current),
      RN=arrify(p.RN), CIC_charge=arrify(p.CIC_charge), extra_background=arrify(p.extra_background),
      EM_gain=arrify(p.EM_gain), exposure_time=arrify(p.exposure_time),
      readout_time=arrify(p.readout_time), acquisition_time=arrify(p.acquisition_time),
      QE=arrify(p.QE), Throughput=arrify(p.Throughput), Atmosphere=arrify(p.Atmosphere),
      Collecting_area=arrify(p.Collecting_area), pixel_scale=arrify(p.pixel_scale),
      Spectral_resolution=arrify(p.Spectral_resolution), dispersion=arrify(p.dispersion),
      Slitwidth=arrify(p.Slitwidth), Slitlength=arrify(p.Slitlength),
      PSF_RMS_mask=arrify(p.PSF_RMS_mask), PSF_RMS_det=arrify(p.PSF_RMS_det),
      Size_source=arrify(p.Size_source), Line_width=arrify(p.Line_width),
      wavelength=arrify(p.wavelength), cosmic_ray_loss_per_sec=arrify(p.cosmic_ray_loss_per_sec),
      Bandwidth=arrify(p.Bandwidth), Throughput_FWHM=arrify(p.Throughput_FWHM),
      lambda_stack=arrify(p.lambda_stack);

  const IFS = !!p.IFS, spectro = !!p.spectrograph, counting_mode = !!p.counting_mode;
  const SNR_res = p.SNR_res || "per pix";
  const fsr = 2.35, arcsec2str = Math.pow(Math.PI/180/3600, 2);

  Signal = Signal.map(s => s>1 ? Math.pow(10, -(s-20.08)/2.5)*2.06e-16 : s);
  for(let i=0;i<N;i++){ if (Math.abs(Slitlength[i]-Slitwidth[i])<1e-12) Signal[i] *= Math.PI/4; }

  let flux_fraction = new Array(N).fill(1);
  for(let i=0;i<N;i++){
    const f1 = (1+erf(Slitlength[i]/(2*Math.SQRT2*PSF_RMS_mask[i]))) - 1;
    let f = f1;
    if (!IFS) f *= ((1+erf(Slitwidth[i]/(2*Math.SQRT2*PSF_RMS_mask[i]))) - 1);
    flux_fraction[i] = isFinite(f) ? f : 1;
  }
  const ff_slit = flux_fraction;

  const PSF_lambda_pix = new Array(N);
  for(let i=0;i<N;i++) PSF_lambda_pix[i] = 10*wavelength[i]/Spectral_resolution[i]/dispersion[i];

  const source_size = new Array(N), elem_size = new Array(N), pixels_total_source = new Array(N);
  for(let i=0;i<N;i++){
    if (spectro){
      const sspec = Math.max(1, Math.sqrt(PSF_lambda_pix[i]**2 + Math.pow(Math.min(Line_width[i],Bandwidth[i])/dispersion[i],2)));
      source_size[i] = Math.max(Math.min(Size_source[i]*fsr, Slitlength[i])/pixel_scale[i], 1) * sspec;
      pixels_total_source[i] = source_size[i] * (IFS ? Math.ceil(Math.sqrt(Size_source[i]**2+PSF_RMS_mask[i]**2)*fsr/Slitwidth[i]) : 1);
      elem_size[i] = Math.ceil(Math.min(PSF_RMS_mask[i]*fsr, Slitlength[i])/pixel_scale[i]) *
        Math.ceil(Math.sqrt(Math.min(PSF_RMS_det[i]/pixel_scale[i], PSF_lambda_pix[i])**2 + Math.min(Line_width[i]/dispersion[i], PSF_lambda_pix[i])**2)) *
        (IFS ? Math.ceil(PSF_RMS_mask[i]*fsr/Slitwidth[i]) : 1);
    } else {
      source_size[i] = Math.pow(Size_source[i]*fsr/pixel_scale[i], 2);
      elem_size[i]   = Math.pow(PSF_RMS_det[i]*fsr/pixel_scale[i], 2);
      pixels_total_source[i] = source_size[i];
    }
  }

  let number_pixels_used = new Array(N);
  if (SNR_res==="per pix") number_pixels_used.fill(1);
  else if (SNR_res==="per Res elem") for(let i=0;i<N;i++) number_pixels_used[i] = Math.ceil(elem_size[i]);
  else if (SNR_res==="per Source") for(let i=0;i<N;i++) number_pixels_used[i] = Math.ceil(pixels_total_source[i]);
  else {
    if (spectro && IFS){
      for(let i=0;i<N;i++){
        const spatial_pix_per_slicer = Slitwidth[i]/pixel_scale[i];
        const spectral_pix_adaptive = Math.max(2, Math.pow(2, Math.floor(Math.log2(spatial_pix_per_slicer))));
        const nslices = Math.sqrt(Size_source[i]**2 + PSF_RMS_mask[i]**2)/Slitwidth[i];
        const pixels_spat_total = (1/pixel_scale[i])*nslices;
        pixels_total_source[i] = pixels_spat_total * spectral_pix_adaptive;
        number_pixels_used[i] = pixels_total_source[i];
        source_size[i] = (pixels_spat_total/nslices) * spectral_pix_adaptive;
      }
    } else for(let i=0;i<N;i++) number_pixels_used[i] = Math.ceil(pixels_total_source[i]);
  }

  const ENF = new Array(N);
  for(let i=0;i<N;i++) ENF[i] = (counting_mode || EM_gain[i]<2) ? 1 : 2;

  const Dark_current_f = new Array(N), Dark_current_noise = new Array(N), CIC_noise = new Array(N);
  for(let i=0;i<N;i++){
    Dark_current_f[i] = Dark_current[i]*exposure_time[i]/3600;
    Dark_current_noise[i] = Math.sqrt(Dark_current_f[i]*ENF[i]);
    CIC_noise[i] = Math.sqrt(CIC_charge[i]*ENF[i]);
  }

  const Photon_fraction_kept = new Array(N).fill(1), RN_fraction_kept = new Array(N).fill(1);
  const QE_eff = new Array(N), effective_area = new Array(N);
  for(let i=0;i<N;i++){
    QE_eff[i] = Photon_fraction_kept[i]*QE[i];
    effective_area[i] = QE_eff[i]*Throughput[i]*Atmosphere[i]*(Collecting_area[i]*100*100);
  }

  const cosmic_ray_loss = new Array(N);
  for(let i=0;i<N;i++) cosmic_ray_loss[i] = Math.min(cosmic_ray_loss_per_sec[i]*(exposure_time[i]+readout_time[i]/2), 1);

  const sourceSizeAfter = new Array(N), slitSizeAfter = new Array(N);
  for(let i=0;i<N;i++){
    if (SNR_res==="per Source per 2λpix" && IFS && spectro){
      let slicer_eff;
      if (Slitwidth[i]>=1.0) slicer_eff = 1.38;
      else if (Slitwidth[i]>=0.5) slicer_eff = Math.max(0.69, Size_source[i]);
      else slicer_eff = Size_source[i];
      sourceSizeAfter[i] = Size_source[i]*slicer_eff;
      slitSizeAfter[i]   = Size_source[i]*slicer_eff;
    } else {
      const a = Math.min(Size_source[i]*fsr, Slitlength[i]);
      sourceSizeAfter[i] = a * (IFS ? Size_source[i] : Math.min(Size_source[i]*fsr, Slitwidth[i]));
      slitSizeAfter[i]   = a * (IFS ? Math.max(Size_source[i], Slitwidth[i]) : Slitwidth[i]);
    }
  }

  const factor_CU2el = new Array(N), factor_CU2el_sky = new Array(N);
  for(let i=0;i<N;i++){
    if (spectro){
      if (SNR_res==="per Source per 2λpix" && IFS){
        const spatial_pix_per_slicer = Slitwidth[i]/pixel_scale[i];
        const spectral_bin_pixels = Math.max(2, Math.pow(2, Math.floor(Math.log2(spatial_pix_per_slicer))));
        const spectral_bin_A = spectral_bin_pixels * dispersion[i]*10.0;
        factor_CU2el[i]     = effective_area[i]*arcsec2str*sourceSizeAfter[i]*spectral_bin_A/pixels_total_source[i];
        factor_CU2el_sky[i] = effective_area[i]*arcsec2str*slitSizeAfter[i]  *spectral_bin_A/pixels_total_source[i];
      } else {
        const lw = Math.min(Line_width[i], Bandwidth[i]);
        factor_CU2el[i]     = effective_area[i]*arcsec2str*lw*sourceSizeAfter[i]/pixels_total_source[i];
        factor_CU2el_sky[i] = effective_area[i]*arcsec2str*Math.max(lw, dispersion[i])*slitSizeAfter[i]/pixels_total_source[i];
      }
    } else {
      factor_CU2el[i] = pixel_scale[i]*pixel_scale[i]*Throughput_FWHM[i];
      factor_CU2el_sky[i] = factor_CU2el[i];
    }
  }

  const N_images = new Array(N), N_images_true = new Array(N);
  for(let i=0;i<N;i++){
    N_images[i] = acquisition_time[i]*3600/(exposure_time[i]+readout_time[i]);
    N_images_true[i] = N_images[i]*(1-cosmic_ray_loss[i]);
  }

  const sky = new Array(N), Sky_noise = new Array(N), Signal_LU = new Array(N), Signal_el = new Array(N), signal_noise = new Array(N);
  for(let i=0;i<N;i++){
    const Sky_CU_i = convert_ergs2LU(Sky[i], wavelength[i]);
    sky[i] = Sky_CU_i*factor_CU2el_sky[i]*exposure_time[i];
    Sky_noise[i] = Math.sqrt(sky[i]*ENF[i]);
    Signal_LU[i] = convert_ergs2LU(Signal[i], wavelength[i]);
    Signal_el[i] = Signal_LU[i]*factor_CU2el[i]*exposure_time[i]*ff_slit[i];
    signal_noise[i] = Math.sqrt(Signal_el[i]*ENF[i]);
  }

  const RN_after_gain = new Array(N);
  for(let i=0;i<N;i++) RN_after_gain[i] = RN[i]*RN_fraction_kept[i]/EM_gain[i];
  const RN_final = calculate_photon_counting_RN_noise(RN_after_gain);

  const Additional_background = new Array(N), Additional_background_noise = new Array(N);
  for(let i=0;i<N;i++){
    Additional_background[i] = extra_background[i]/3600*exposure_time[i];
    Additional_background_noise[i] = Math.sqrt(Additional_background[i]*ENF[i]);
  }

  const N_resol_element_A = spectro ? Array(N).fill(1) : lambda_stack;
  const factor = new Array(N), Signal_resolution = new Array(N), Total_noise_final = new Array(N), SNR = new Array(N);
  for(let i=0;i<N;i++){
    factor[i] = Math.sqrt(number_pixels_used[i])*Math.sqrt(N_resol_element_A[i])*Math.sqrt(N_images_true[i]);
    Signal_resolution[i] = Signal_el[i]*factor[i]*factor[i];
    const inside = signal_noise[i]**2 + Dark_current_noise[i]**2 + Additional_background_noise[i]**2 + Sky_noise[i]**2 + CIC_noise[i]**2 + RN_final[i]**2;
    Total_noise_final[i] = factor[i]*Math.sqrt(inside);
    SNR[i] = Signal_resolution[i]/Total_noise_final[i];
  }

  const noises_per_exp = new Array(N), noises = new Array(N), electrons_per_pix = new Array(N);
  for(let i=0;i<N;i++){
    const sp = Math.sqrt(number_pixels_used[i]);
    noises_per_exp[i] = [
      sp*signal_noise[i], sp*Dark_current_noise[i], sp*Sky_noise[i],
      sp*RN_final[i], sp*CIC_noise[i], sp*Additional_background_noise[i],
      sp*Math.sqrt(Signal_el[i])
    ];
    noises[i] = [
      signal_noise[i]*factor[i], Dark_current_noise[i]*factor[i], Sky_noise[i]*factor[i],
      RN_final[i]*factor[i], CIC_noise[i]*factor[i], Additional_background_noise[i]*factor[i],
      Signal_resolution[i]
    ];
    electrons_per_pix[i] = [Signal_el[i], Dark_current_f[i], sky[i], 0*RN_final[i], CIC_charge[i], Additional_background[i]];
  }

  const n_sigma = 5;
  const SB_lim_per_pix = new Array(N), SB_lim_per_res = new Array(N), SB_lim_per_source = new Array(N);
  for(let i=0;i<N;i++){
    const sn_nf = signal_noise[i]*factor[i], Tnf = Total_noise_final[i];
    const val = (n_sigma**2 * ENF[i] + n_sigma * Math.sqrt(4*Tnf*Tnf - 4*sn_nf*sn_nf + ENF[i]**2 * n_sigma**2))/2;
    const lu_per_e = Signal_LU[i]/Signal_resolution[i];
    const sig_ergs = convert_LU2ergs(val*lu_per_e, wavelength[i]);
    SB_lim_per_pix[i] = sig_ergs;
    SB_lim_per_res[i] = sig_ergs/elem_size[i];
    SB_lim_per_source[i] = sig_ergs/source_size[i];
  }

  return { x: p.xArr, N, noises_per_exp, noises, electrons_per_pix,
    Signal_el, Dark_current_f, sky, RN_final, CIC_charge, Additional_background,
    SNR, Total_noise_final, number_pixels_used, source_size, elem_size,
    SB_lim_per_pix, SB_lim_per_res, SB_lim_per_source, factor, Signal_resolution };
}

/* ============================================================================
   4. LOAD GSHEET
   ========================================================================== */
async function loadInstruments(sheet_id, sheet_name){
  const url = `https://docs.google.com/spreadsheets/d/${sheet_id}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheet_name)}`;
  const r = await fetch(url, {mode:"cors"});
  if (!r.ok) throw new Error(`HTTP ${r.status} loading gsheet`);
  const txt = await r.text();
  const rows = d3.csvParseRows(txt);
  if (rows.length<2) throw new Error("Empty sheet");
  const header = rows[0];
  const instrNames = header.slice(3).filter(n=>n && n.trim().length);
  const dict = {}; const char_units = {};
  for (const n of instrNames) dict[n] = {};
  for (let r=1;r<rows.length;r++){
    const row = rows[r]; const key = row[1]; const unit = row[2];
    if (!key) continue;
    char_units[key] = unit||"";
    for (let c=0;c<instrNames.length;c++){
      const raw = row[3+c];
      if (raw==null || raw==="") continue;
      const f = parseFloat(raw);
      dict[instrNames[c]][key] = isFinite(f) ? f : raw;
    }
  }
  STATE.instruments = {colnames: instrNames, char_units, dict};
  return STATE.instruments;
}

function applyInstrument(name){
  const d = STATE.instruments.dict[name]; if (!d) return;
  STATE.current_instrument = name;
  for (const k of Object.keys(PARAMS)){
    if (k in d && typeof d[k]==="number" && isFinite(d[k])) STATE.values[k] = d[k];
  }
  if ("IFS" in d) FLAGS.IFS = !!d.IFS;
  if (d.dimensions === 3) FLAGS.IFS = true;   // match Observation.py: dimensions=3 implies IFS=True
  // Stash for IFS view (needs FOV_size)
  STATE.instrument_FOV_size = (typeof d.FOV_size === "number") ? d.FOV_size : null;
  for (const k of Object.keys(PARAMS)) syncSlider(k);
  IFS_STATE.rect = null;          // reset extraction box on instrument change
  IFS_STATE.lambda_center = null; // reset λ cursor → defaults to central detector λ next render
  updateIfsTabVisibility();
}

function buildUI(){
  const root = d3.select("#accordions");
  root.selectAll("*").remove();
  GROUPS.forEach(group=>{
    const det = root.append("details").attr("class","acc").attr("open",true);
    det.append("summary").text(group);
    const body = det.append("div").attr("class","acc-body");
    for (const [k,p] of Object.entries(PARAMS)){
      if (p.tab!==group) continue;
      const row = body.append("div").attr("class","slider-row");
      const tipText = `${k}${p.unit?` [${p.unit}]`:""}${p.tip?`\n\n${p.tip}`:""}`;
      const lab = row.append("label").attr("title", tipText + (p.xable?"\n\nClick to use as x-axis.":"\n\n(not selectable as x-axis)"))
        .attr("data-label-key", k)
        .classed("is-x", STATE.xKey===k)
        .text(p.label + (p.unit?` [${p.unit}]`:""));
      if (p.xable){
        lab.on("click", function(){
          STATE.xKey = k;
          const sel = document.getElementById("xaxis");
          sel.value = k;
          document.querySelectorAll("label.is-x").forEach(el=>el.classList.remove("is-x"));
          this.classList.add("is-x");
          scheduleUpdate();
        });
      }
      const v = STATE.values[k];
      const sliderVal = p.log ? Math.log10(Math.max(v, Math.pow(10,p.min))) : v;
      const step = p.log ? (p.step||0.05) : p.step;
      const inp = row.append("input").attr("type","range").attr("data-key",k)
        .attr("title", tipText)
        .attr("min", p.min).attr("max", p.max).attr("step", step).attr("value", sliderVal);
      const val = row.append("div").attr("class","val").attr("data-val",k).text(p.fmt(v));
      inp.on("input", function(){
        const s = +this.value;
        STATE.values[k] = p.log ? Math.pow(10, s) : s;
        val.text(p.fmt(STATE.values[k]));
        scheduleUpdate();
      });
    }
    // (IFS, Spectrograph and γ-Threshold flag checkboxes are hidden — the FLAGS state is still driven by
    //  the instrument spreadsheet "IFS" column / overrides in code.)
  });
}

function syncSlider(k){
  const p = PARAMS[k]; if (!p) return;
  const v = STATE.values[k];
  const inp = document.querySelector(`input[data-key="${k}"]`);
  if (!inp) return;
  inp.value = p.log ? Math.log10(Math.max(v, Math.pow(10,p.min))) : v;
  const val = document.querySelector(`[data-val="${k}"]`);
  if (val) val.textContent = p.fmt(v);
}

/* Build dependencies UI + show/hide slider rows when a dep becomes active */
function buildDependencyUI(){
  const root = d3.select("#dep-list");
  root.selectAll("*").remove();
  DEPENDENCIES.forEach((d,idx)=>{
    const row = root.append("label").attr("class","check").attr("title", d.tip).style("display","block").style("margin","2px 0");
    row.append("input").attr("type","checkbox").attr("data-dep",d.key)
      .property("checked", ACTIVE_DEPS.has(d.key))
      .on("change", function(){
        if (this.checked) ACTIVE_DEPS.add(d.key); else ACTIVE_DEPS.delete(d.key);
        updateDepVisibility();
        scheduleUpdate();
      });
    row.append("span").style("margin-left","4px").text(" "+d.label);
  });
}
function updateDepVisibility(){
  DEPENDENCIES.forEach(d=>{
    const active = ACTIVE_DEPS.has(d.key);
    const inp = document.querySelector(`input[data-key="${d.key}"]`);
    if (!inp) return;
    const row = inp.closest(".slider-row");
    if (row) row.style.display = active ? "none" : "";
  });
}
/* Apply active dependencies to a scalar param map (mutates in place) */
function applyDependenciesScalar(values){
  // Iterate in declaration order; cascading deps would need topo sort but the three formulas here don't chain.
  DEPENDENCIES.forEach(d=>{
    if (!ACTIVE_DEPS.has(d.key)) return;
    const ok = d.deps.every(name => isFinite(values[name]));
    if (ok) values[d.key] = d.compute(values);
  });
}
/* Vector version: arrays for the x-axis are honored. */
function applyDependenciesVector(map, N){
  DEPENDENCIES.forEach(d=>{
    if (!ACTIVE_DEPS.has(d.key)) return;
    const arr = new Array(N);
    for (let i=0;i<N;i++){
      const ctx = {};
      for (const nm of d.deps) ctx[nm] = Array.isArray(map[nm]) ? map[nm][i] : map[nm];
      arr[i] = d.compute(ctx);
    }
    map[d.key] = arr;
  });
}

/* ============================================================================
   6. PLOT — 4 stacked panels, sized to the plot container
   ========================================================================== */
function getPlotDim(){
  const el = document.getElementById("plot-wrap");
  const sb = document.getElementById("status");
  const tabs = document.querySelector(".view-tabs");
  const availH = el.clientHeight - (sb ? sb.offsetHeight : 0) - (tabs ? tabs.offsetHeight : 0) - 18;
  return { w: Math.max(200, el.clientWidth - 14), h: Math.max(120, availH) };
}
function makePanels(W,H,n){
  // Tight layout: only the global x-label sits at the very bottom.
  // Inner panels share the x-axis (no per-panel x-ticks), only the last panel has them.
  const margin = {l:64, r:14, t:10, b:28};
  const innerW = W - margin.l - margin.r;
  const innerH = H - margin.t - margin.b;
  const ph = innerH / n;
  return Array.from({length:n}, (_,i)=>({
    x: margin.l, y: margin.t + i*ph,
    w: innerW, h: ph - 2,
    isLast: (i === n-1)
  }));
}

function drawPlot(res){
  const svg = d3.select("#plot");
  svg.selectAll("*").remove();
  const dim = getPlotDim();
  // Don't set width/height as attributes — let CSS control them. Just set viewBox + preserveAspectRatio.
  svg.attr("viewBox", `0 0 ${dim.w} ${dim.h}`).attr("preserveAspectRatio", "none");
  const xKey = STATE.xKey, x = res.x;
  const xlog = document.getElementById("xlog").checked;
  const ylog = document.getElementById("ylog").checked;
  const xmin = d3.min(x), xmax = d3.max(x);
  const xScale = (xlog && xmin>0)
    ? d3.scaleLog().domain([Math.max(xmin,1e-30), xmax]).range([0,1])
    : d3.scaleLinear().domain([xmin,xmax]).range([0,1]);

  const panels = makePanels(dim.w, dim.h, 4);

  // Panel 0: noise lines
  const noiseSeries = [];
  for (let s=0; s<6; s++){
    noiseSeries.push({ name:NAMES[s], color:COLORS[s], y: x.map((_,i)=>res.noises_per_exp[i][s]) });
  }
  const quadSum = x.map((_,i)=>{
    let q=0; for (let s=0;s<6;s++) q += res.noises_per_exp[i][s]**2;
    return Math.sqrt(q);
  });

  const contribStack = stackify(x.length, 6, (i,s)=> res.number_pixels_used[i]*res.electrons_per_pix[i][s]);
  const snrStack = stackify(x.length, 6, (i,s)=>{
    const Tn = res.Total_noise_final[i]; return (isFinite(Tn)&&Tn>0) ? res.SNR[i]*res.noises[i][s]**2/(Tn*Tn) : 0;
  });
  const sb_pix = x.map((_,i)=>safeLog10(res.SB_lim_per_pix[i]));
  const sb_res = x.map((_,i)=>safeLog10(res.SB_lim_per_res[i]));
  const sb_src = x.map((_,i)=>safeLog10(res.SB_lim_per_source[i]));

  const currentVal = STATE.values[xKey];
  const iCur = currentVal!=null ? argClosest(x, currentVal) : Math.floor(x.length/2);

  // ===== Panel 0 =====
  const p0 = panels[0];
  const allY0 = noiseSeries.flatMap(s=>s.y).concat(quadSum);
  drawPanel(svg, p0, x, xScale, allY0, ylog, "Noise (e-/exp)", g=>{
    noiseSeries.forEach(s=>{
      g.append("path").datum(s.y).attr("fill","none").attr("stroke",s.color).attr("stroke-width",2.8)
        .attr("d", lineGen(x, p0, xScale, allY0, ylog));
    });
    g.append("path").datum(quadSum).attr("fill","none").attr("stroke","#000").attr("stroke-width",3.4).attr("stroke-opacity",0.7)
      .attr("d", lineGen(x, p0, xScale, allY0, ylog));
    legendBlock(g, p0, [
      ...noiseSeries.map(s=>({name:`${s.name}: ${fmtNum(s.y[iCur])}`, color:s.color})),
      {name:`Quad sum: ${fmtNum(quadSum[iCur])}`, color:"#000"}
    ]);
  });

  // ===== Panel 1 =====
  const p1 = panels[1];
  const max1 = d3.max(contribStack[contribStack.length-1].y1);
  drawStackPanel(svg, p1, x, xScale, contribStack, max1, ylog, "e-/exp (× npix)", iCur,
    NAMES.map((n,j)=>({name:n, color:COLORS[j]})), (j)=>res.number_pixels_used[iCur]*res.electrons_per_pix[iCur][j]);

  // ===== Panel 2 =====
  const p2 = panels[2];
  const max2 = d3.max(snrStack[snrStack.length-1].y1);
  drawStackPanel(svg, p2, x, xScale, snrStack, max2, ylog, "SNR contributions", iCur,
    NAMES.map((n,j)=>({name:n, color:COLORS[j]})), (j)=>{
      const Tn = res.Total_noise_final[iCur];
      return Tn>0 ? res.SNR[iCur]*res.noises[iCur][j]**2/(Tn*Tn) : 0;
    });
  svg.append("text").attr("x", p2.x+p2.w-6).attr("y", p2.y+12).attr("text-anchor","end").attr("class","ax-title")
    .text(`SNR = ${res.SNR[iCur].toFixed(2)}  (max ${d3.max(res.SNR).toFixed(2)})`);

  // ===== Panel 3 =====
  const p3 = panels[3];
  const allY3 = sb_pix.concat(sb_res).concat(sb_src).filter(v=>isFinite(v));
  drawPanel(svg, p3, x, xScale, allY3, false, "log₁₀ ergs/cm²/s/asec²", g=>{
    [["per pix",sb_pix,"#000",1],["per Res",sb_res,"#000",0.5],["per Source",sb_src,"#000",0.3]].forEach(([n,arr,c,a])=>{
      g.append("path").datum(arr).attr("fill","none").attr("stroke",c).attr("stroke-opacity",a).attr("stroke-width",1.8)
        .attr("d", lineGen(x, p3, xScale, allY3, false));
    });
    legendBlock(g, p3, [
      {name:`SB SNR=5 / pix: ${fmtNum(sb_pix[iCur])}`, color:"#000"},
      {name:`SB SNR=5 / res: ${fmtNum(sb_res[iCur])}`, color:"#000", alpha:0.5},
      {name:`SB SNR=5 / src: ${fmtNum(sb_src[iCur])}`, color:"#000", alpha:0.3}
    ]);
  });

  // x label
  svg.append("text").attr("x", panels[0].x + panels[0].w/2).attr("y", dim.h-6)
    .attr("text-anchor","middle").attr("class","ax-title").text(xKey);

  // current-value vertical line
  if (currentVal!=null && currentVal>=xmin && currentVal<=xmax){
    const xp = xScale(currentVal);
    panels.forEach(pr=>{
      svg.append("line").attr("class","vline").attr("x1", pr.x + xp*pr.w).attr("x2", pr.x + xp*pr.w).attr("y1", pr.y).attr("y2", pr.y+pr.h);
    });
  }

  // ============================ Hover tooltip ============================
  // Cache the panel data so the hover handler can read it
  const xfmt = d3.format(".3~g");
  const panelInfo = [
    {
      title: "Noise (e-/exp)",
      series: [
        ...noiseSeries.map(s=>({name:s.name, color:s.color, ys:s.y})),
        {name:"Quad sum", color:"#000", ys:quadSum}
      ]
    },
    {
      title: "Contributions (e-/exp · npix)",
      series: NAMES.map((n,j)=>({
        name:n, color:COLORS[j],
        ys: x.map((_,i)=> res.number_pixels_used[i]*res.electrons_per_pix[i][j])
      }))
    },
    {
      title: "SNR contributions",
      series: NAMES.map((n,j)=>({
        name:n, color:COLORS[j],
        ys: x.map((_,i)=>{
          const Tn = res.Total_noise_final[i];
          return (Tn>0) ? res.SNR[i]*res.noises[i][j]**2/(Tn*Tn) : 0;
        })
      })).concat([{ name:"SNR total", color:"#000", ys: res.SNR.slice() }])
    },
    {
      title: "log₁₀ SB (ergs/cm²/s/asec²)",
      series: [
        {name:"per pix",    color:"#000", ys: sb_pix},
        {name:"per Res",    color:"#000", ys: sb_res},
        {name:"per Source", color:"#000", ys: sb_src}
      ]
    }
  ];

  const tip = document.getElementById("pixtip");
  panels.forEach((pr, pi)=>{
    const rect = svg.append("rect")
      .attr("x", pr.x).attr("y", pr.y).attr("width", pr.w).attr("height", pr.h)
      .attr("fill", "transparent").style("cursor","crosshair");
    rect.on("mousemove", function(e){
      const r = svg.node().getBoundingClientRect();
      const svgX = (e.clientX - r.left) * (dim.w / r.width);
      const fx = (svgX - pr.x) / pr.w;
      if (fx<0 || fx>1) { tip.style.display="none"; return; }
      // Invert xScale (which has range [0,1])
      const xVal = xScale.invert(fx);
      const idx = argClosest(x, xVal);
      const info = panelInfo[pi];
      let txt = `${xKey} = ${xfmt(x[idx])}\n${info.title}`;
      info.series.forEach(s=>{
        const v = s.ys[idx];
        txt += `\n  ${s.name.padEnd(14)} ${isFinite(v) ? xfmt(v) : "—"}`;
      });
      tip.textContent = txt;
      tip.style.display = "block";
      // Position with edge protection
      const pad = 12;
      let tx = e.clientX + pad, ty = e.clientY + pad;
      const tb = tip.getBoundingClientRect();
      if (tx + tb.width  > window.innerWidth)  tx = e.clientX - pad - tb.width;
      if (ty + tb.height > window.innerHeight) ty = e.clientY - pad - tb.height;
      tip.style.left = tx + "px";
      tip.style.top  = ty + "px";
    }).on("mouseleave", ()=>{ tip.style.display="none"; });
  });
}

function stackify(N, S, get){
  const layers = Array.from({length:S}, ()=>({y0:new Array(N), y1:new Array(N)}));
  for (let i=0;i<N;i++){
    let acc = 0;
    for (let s=0;s<S;s++){
      const v = get(i,s); const vv = isFinite(v)?v:0;
      layers[s].y0[i] = acc; layers[s].y1[i] = acc + vv; acc += vv;
    }
  }
  return layers;
}

function lineGen(x, panel, xScale, allY, ylog){
  const yDom = d3.extent(allY.filter(v=>isFinite(v)));
  let yScale;
  if (ylog){
    const minPos = d3.min(allY.filter(v=>v>0));
    yScale = d3.scaleLog().domain([Math.max(minPos||1e-6,1e-30), Math.max(yDom[1], (minPos||1e-6)*10)]).range([panel.h, 0]);
  } else {
    yScale = d3.scaleLinear().domain([Math.min(yDom[0],0), yDom[1]||1]).range([panel.h, 0]);
  }
  return d3.line()
    .defined((v,i)=> isFinite(x[i]) && isFinite(v) && !(xScale.base && x[i]<=0) && !(ylog && v<=0))
    .x((_,i)=>panel.x + xScale(x[i])*panel.w)
    .y(v=>panel.y + yScale(v));
}

function drawPanel(svg, panel, x, xScale, allY, ylog, title, drawLines){
  const yDom = d3.extent(allY.filter(v=>isFinite(v)));
  let yScale;
  if (ylog){
    const minPos = d3.min(allY.filter(v=>v>0));
    yScale = d3.scaleLog().domain([Math.max(minPos||1e-6,1e-30), Math.max(yDom[1], (minPos||1e-6)*10)]).range([panel.h, 0]);
  } else {
    yScale = d3.scaleLinear().domain([Math.min(yDom[0],0), yDom[1]||1]).range([panel.h, 0]);
  }
  const xAxisScale = xScale.copy().range([panel.x, panel.x+panel.w]);
  const yAxisScale = yScale.copy().range([panel.y+panel.h, panel.y]);
  const nx = panel.w < 380 ? 3 : 4;
  const ny = panel.h < 90 ? 3 : 4;
  const xAxis = makeAxis(d3.axisBottom, xAxisScale, nx, panel.isLast);
  if (!panel.isLast) xAxis.tickSize(3);
  svg.append("g").attr("class","plot-axis").attr("transform",`translate(0,${panel.y+panel.h})`).call(xAxis);
  svg.append("g").attr("class","plot-axis").attr("transform",`translate(${panel.x},0)`)
    .call(makeAxis(d3.axisLeft, yAxisScale, ny, true));
  svg.append("text").attr("class","ax-title")
    .attr("transform",`translate(${panel.x-50},${panel.y+panel.h/2}) rotate(-90)`)
    .attr("text-anchor","middle").text(title);
  drawLines(svg.append("g"));
}

/* Build an axis with sparse tick labels — works for both linear and log scales.
   For log scales, d3.scaleLog().ticks(n) ignores n; we instead enumerate decades and keep at most n. */
function makeAxis(axisFn, scale, nMax, withLabels){
  const isLog = (scale.base !== undefined);    // d3.scaleLog has .base()
  const fmt = d3.format(".2~g");
  if (isLog){
    const [a,b] = scale.domain();
    const la = Math.floor(Math.log10(Math.max(a, 1e-30)));
    const lb = Math.ceil(Math.log10(Math.max(b, 10*a)));
    const decades = [];
    for (let k=la; k<=lb; k++) decades.push(Math.pow(10,k));
    // Down-sample if too many
    let step = Math.max(1, Math.ceil(decades.length / nMax));
    const kept = decades.filter((_,i)=> i%step === 0);
    return axisFn(scale).tickValues(kept).tickFormat(withLabels ? fmt : "").tickSizeOuter(0);
  } else {
    return axisFn(scale).ticks(nMax).tickFormat(withLabels ? fmt : "").tickSizeOuter(0);
  }
}

function drawStackPanel(svg, panel, x, xScale, layers, maxY, ylog, title, iCur, legend, getCur){
  let yScale;
  if (ylog){
    let minPos = Infinity;
    for (const lay of layers) for (const v of lay.y1) if (v>0 && v<minPos) minPos = v;
    if (!isFinite(minPos)) minPos = 1e-3;
    yScale = d3.scaleLog().domain([Math.max(minPos,1e-30), Math.max(maxY, minPos*10)]).range([panel.h, 0]);
  } else {
    yScale = d3.scaleLinear().domain([0, Math.max(maxY,1e-12)]).range([panel.h, 0]);
  }
  const xAxisScale = xScale.copy().range([panel.x, panel.x+panel.w]);
  const yAxisScale = yScale.copy().range([panel.y+panel.h, panel.y]);
  const nx = panel.w < 380 ? 3 : 4;
  const ny = panel.h < 90 ? 3 : 4;
  const xAxis = makeAxis(d3.axisBottom, xAxisScale, nx, panel.isLast);
  if (!panel.isLast) xAxis.tickSize(3);
  svg.append("g").attr("class","plot-axis").attr("transform",`translate(0,${panel.y+panel.h})`).call(xAxis);
  svg.append("g").attr("class","plot-axis").attr("transform",`translate(${panel.x},0)`)
    .call(makeAxis(d3.axisLeft, yAxisScale, ny, true));
  svg.append("text").attr("class","ax-title")
    .attr("transform",`translate(${panel.x-50},${panel.y+panel.h/2}) rotate(-90)`)
    .attr("text-anchor","middle").text(title);
  const yDomMin = yScale.domain()[0];
  for (let s=0;s<layers.length;s++){
    const lay = layers[s];
    const a = d3.area()
      .x((_,i)=>panel.x + xScale(x[i])*panel.w)
      .y0((_,i)=>panel.y + yScale(Math.max(lay.y0[i] || yDomMin, yDomMin)))
      .y1((_,i)=>panel.y + yScale(Math.max(lay.y1[i] || yDomMin, yDomMin)));
    svg.append("path").datum(lay.y1.map((_,i)=>i))
      .attr("fill", legend[s].color).attr("fill-opacity",0.7).attr("d", a);
  }
  const totalCur = legend.reduce((acc,_,j)=>acc + (getCur(j)||0), 0);
  legendBlock(svg.append("g"), panel, legend.map((L,j)=>{
    const v = getCur(j)||0;
    const pct = totalCur>0 ? (100*v/totalCur).toFixed(1) : "0";
    return {name:`${L.name}: ${fmtNum(v)} (${pct}%)`, color:L.color};
  }));
}

function legendBlock(g, panel, items){
  // Render legend inside the panel, anchored to top-right, with a translucent white background.
  const lineH = 12, padX = 6, padY = 4;
  // Estimate width via longest item name × ~6 px (monospaced-ish approximation)
  let maxLen = 0;
  for (const it of items) if (it.name.length > maxLen) maxLen = it.name.length;
  const swatchW = 9, swatchGap = 5;
  const labelW = Math.min(panel.w * 0.6, Math.max(70, maxLen * 5.8));
  const boxW = padX*2 + swatchW + swatchGap + labelW;
  const boxH = padY*2 + items.length * lineH;
  const x0 = panel.x + panel.w - boxW - 6;
  const y0 = panel.y + 6;
  g.append("rect").attr("x", x0).attr("y", y0).attr("width", boxW).attr("height", boxH)
    .attr("fill", "#fff").attr("fill-opacity", 0.78)
    .attr("stroke", "#bbb").attr("stroke-opacity", 0.5).attr("rx", 3);
  let y = y0 + padY + 9;
  for (const it of items){
    g.append("rect").attr("x", x0 + padX).attr("y", y - 8).attr("width", swatchW).attr("height", swatchW)
      .attr("fill", it.color).attr("fill-opacity", it.alpha!=null?it.alpha:0.85);
    g.append("text").attr("x", x0 + padX + swatchW + swatchGap).attr("y", y + 1).attr("class","legend").text(it.name);
    y += lineH;
  }
}

/* ============================================================================
   IMAGE VIEW RENDERING
   ========================================================================== */
// Color map (viridis-like, hardcoded LUT for speed)
const VIRIDIS = [
  [68,1,84],[71,24,106],[71,44,123],[68,62,135],[64,79,140],
  [58,93,142],[51,107,143],[46,121,142],[40,135,141],[35,148,138],
  [33,162,132],[44,176,121],[68,189,107],[101,201,87],[140,210,66],
  [183,217,42],[222,224,27],[253,231,37]
];
function viridisAt(t){ // t in [0,1]
  if (!isFinite(t)) return [0,0,0];
  t = Math.max(0,Math.min(1,t));
  const x = t*(VIRIDIS.length-1);
  const i0 = Math.floor(x), i1 = Math.min(VIRIDIS.length-1, i0+1);
  const f = x-i0;
  const a = VIRIDIS[i0], b = VIRIDIS[i1];
  return [a[0]+(b[0]-a[0])*f, a[1]+(b[1]-a[1])*f, a[2]+(b[2]-a[2])*f];
}

function rasterizeImage(canvas, data, W, H, vmin, vmax, useLog){
  // data[j*W+i] in row-major (j = spatial / row, i = spectral / col)
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext("2d");
  const img = ctx.createImageData(W, H);
  let tFn;
  if (useLog){
    // Symlog mapping: shift so the floor is positive, then take log10.
    // linthresh chosen as max(1, |vmin|+1) so log(vmin) = log(1) = 0.
    const offset = Math.max(1, -vmin + 1);
    const lmin = Math.log10(vmin + offset);
    const lmax = Math.log10(vmax + offset);
    const range = (lmax - lmin) || 1;
    tFn = v => (Math.log10(v + offset) - lmin) / range;
  } else {
    const range = (vmax - vmin) || 1;
    tFn = v => (v - vmin)/range;
  }
  for (let j=0;j<H;j++){
    for (let i=0;i<W;i++){
      const v = data[j*W+i];
      const t = isFinite(v) ? tFn(v) : 0;
      const [r,g,b] = viridisAt(t);
      const k = (j*W+i)*4;
      img.data[k] = r; img.data[k+1] = g; img.data[k+2] = b; img.data[k+3] = 255;
    }
  }
  ctx.putImageData(img,0,0);
}

function percentile(arr, p){
  // p in [0,1]; in-place is OK because we don't need order preserved
  const a = Array.from(arr).filter(v=>isFinite(v)).sort((x,y)=>x-y);
  if (!a.length) return 0;
  const idx = Math.min(a.length-1, Math.max(0, Math.floor(p*a.length)));
  return a[idx];
}

function drawImageView(){
  // Build the parameter set as scalars
  const pa = {};
  for (const k of Object.keys(PARAMS)) pa[k] = STATE.values[k];
  applyDependenciesScalar(pa);
  pa.Signal_in = pa.Signal;
  pa.IFS = FLAGS.IFS; pa.spectrograph = FLAGS.spectrograph; pa.counting_mode = FLAGS.counting_mode;
  // Image-tab flags
  pa.atmlambda = IMG_FLAGS.atmlambda;
  pa.QElambda  = IMG_FLAGS.QElambda;
  pa.sky_lines = IMG_FLAGS.sky_lines;
  pa.source_im = IMG_FLAGS.source_im;
  pa.spectrum  = IMG_FLAGS.spectrum;
  pa.atm_kind  = IMG_FLAGS.atm_kind;
  pa.sky_kind  = IMG_FLAGS.sky_kind;
  pa.Redshift  = STATE.values.Redshift || 0;
  // Detector image size (kept fixed; you can change to scale with viewport)
  pa.W = 500; pa.H = 100;
  // Fresh realisation on each update — change seed deterministically so slider movement shows noise diversity
  STATE.imgSeed = (STATE.imgSeed + 1) >>> 0;
  pa.seed = STATE.imgSeed;

  let sim;
  try { sim = simulateImage(pa); }
  catch(e){ d3.select("#status").classed("err",true).text("Image sim error: "+e.message); console.error(e); return; }

  // Single + Stack canvases — auto-stretch via 1% / 99% percentiles
  const cvS = document.getElementById("cv-single");
  const cvK = document.getElementById("cv-stack");
  const vminS = percentile(sim.single, 0.01), vmaxS = percentile(sim.single, 0.99);
  const vminK = percentile(sim.stack,  0.01), vmaxK = percentile(sim.stack,  0.99);
  const ylog = document.getElementById("ylog").checked;
  // Cache + apply bias/contrast (DS9-style)
  STATE.imgCache = {
    single: sim.single, stack: sim.stack, W: sim.W, H: sim.H, sim,
    vmin0: { single: vminS, stack: vminK },
    vmax0: { single: vmaxS, stack: vmaxK },
    ylog
  };
  applyColorScale("single");
  applyColorScale("stack");
  drawSlitOverlay("ov-single", pa, sim);
  drawSlitOverlay("ov-stack",  pa, sim);
  attachImageHover();
  attachImageColorscaleDrag();

  const slitW_pix = pa.Slitwidth  / pa.pixel_scale;
  const slitH_pix = pa.Slitlength / pa.pixel_scale;
  const slitStr = `slit ${pa.Slitwidth.toFixed(2)}″ × ${pa.Slitlength.toFixed(2)}″ (${slitW_pix.toFixed(1)}×${slitH_pix.toFixed(1)} px)`;
  document.getElementById("img-single-title").textContent =
    `Single exposure  ·  ${sim.W}×${sim.H} pix = ${(sim.W*sim.xPhys_per_pix).toFixed(0)}Å × ${(sim.H*sim.yPhys_per_pix).toFixed(1)}″  ·  ${slitStr}`;
  document.getElementById("img-stack-title").textContent =
    `Stacked  ·  ${sim.N_stack} frames, T_acq=${(STATE.values.acquisition_time).toFixed(1)}h  ·  ${slitStr}`;

  // ===== Profiles SVG (spatial avg + spectral avg, single & stacked) =====
  drawProfiles(sim);
  // ===== Throughput / atm / sky-line curves =====
  drawOptics(sim, pa);
  // ===== Histogram SVG =====
  drawHistogram(sim);
}

/* Apply current bias/contrast to one canvas and re-rasterise.
   bias  ∈ (-1, +1) shifts the center of the displayed range (negative → favours dark, positive → favours bright).
   contrast > 0     scales the spread (1 = identity, >1 = high contrast/narrow range, <1 = low contrast/wide range).
   The formulas follow DS9's standard mapping: center += bias × half_range; spread /= contrast.
   `which` must match a key in STATE.imgCM. Mapping: spectro → STATE.imgCache, ifs → STATE.imgCacheIfs. */
function applyColorScale(which){
  const isIfs = which.startsWith("ifs_");
  const c = isIfs ? STATE.imgCacheIfs : STATE.imgCache;
  if (!c) return;
  const cvId = {
    single:     "cv-single",
    stack:      "cv-stack",
    ifs_single: "cv-ifs-single",
    ifs_stack:  "cv-ifs-stack"
  }[which];
  const dataKey = isIfs ? (which === "ifs_single" ? "single" : "stack") : which;
  const cv = document.getElementById(cvId);
  const data = c[dataKey];
  const cm = STATE.imgCM[which];
  const v0 = c.vmin0[dataKey], v1 = c.vmax0[dataKey];
  const half = (v1 - v0) / 2;
  const center0 = (v0 + v1) / 2;
  const center = center0 + cm.bias * half;
  const spread = half / Math.max(cm.contrast, 0.01);
  const vmin = center - spread;
  const vmax = center + spread;
  rasterizeImage(cv, data, c.W, c.H, vmin, vmax, c.ylog);
}

function attachImageColorscaleDrag(){
  if (STATE._dragAttached) return;
  STATE._dragAttached = true;
  const targets = [
    { which:"single",     cvId:"cv-single" },
    { which:"stack",      cvId:"cv-stack" },
    { which:"ifs_single", cvId:"cv-ifs-single" },
    { which:"ifs_stack",  cvId:"cv-ifs-stack" }
  ];
  targets.forEach(({which, cvId})=>{
    const cv = document.getElementById(cvId);
    if (!cv) return;
    // Disable the browser context menu so right-click drag works
    cv.addEventListener("contextmenu", e => e.preventDefault());
    let dragging = false, sx0=0, sy0=0, bias0=0, contrast0=1;
    function startDrag(e){
      // Right-click OR ctrl+left-click (Mac trackpad)
      const isRight = (e.button === 2) || (e.ctrlKey && e.button === 0);
      if (!isRight) return;
      e.preventDefault();
      dragging = true;
      sx0 = e.clientX; sy0 = e.clientY;
      bias0 = STATE.imgCM[which].bias; contrast0 = STATE.imgCM[which].contrast;
      cv.style.cursor = "grabbing";
    }
    function moveDrag(e){
      if (!dragging) return;
      const rect = cv.getBoundingClientRect();
      const dx = (e.clientX - sx0) / rect.width;     // -1 .. +1 across the image width
      const dy = (e.clientY - sy0) / rect.height;    // -1 .. +1 across the image height
      // bias from horizontal drag: range ~[-1, +1] (sensitivity 1)
      const bias = clamp(bias0 + dx, -1, 1);
      // contrast from vertical drag: dragging DOWN = MORE contrast (DS9 convention).
      // Use an exponential mapping so it's symmetric on both sides.
      const contrast = clamp(contrast0 * Math.pow(8, dy), 0.1, 10);
      STATE.imgCM[which].bias = bias;
      STATE.imgCM[which].contrast = contrast;
      if (!STATE._dragPending){
        STATE._dragPending = true;
        requestAnimationFrame(()=>{
          STATE._dragPending = false;
          applyColorScale(which);
        });
      }
    }
    function endDrag(){
      if (!dragging) return;
      dragging = false;
      cv.style.cursor = "";
    }
    cv.addEventListener("mousedown", startDrag);
    window.addEventListener("mousemove", moveDrag);
    window.addEventListener("mouseup", endDrag);
    // Double-click → reset to auto stretch
    cv.addEventListener("dblclick", e => {
      e.preventDefault();
      STATE.imgCM[which] = { bias: 0, contrast: 1 };
      applyColorScale(which);
    });
  });
}

function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }

function attachImageHover(){
  if (STATE._hoverAttached) return;
  STATE._hoverAttached = true;
  const tip = document.getElementById("pixtip");
  function wire(canvasId, label){
    const cv = document.getElementById(canvasId);
    cv.addEventListener("mousemove", (e)=>{
      const cache = STATE.imgCache; if (!cache) { tip.style.display="none"; return; }
      const rect = cv.getBoundingClientRect();
      const fx = (e.clientX - rect.left) / rect.width;
      const fy = (e.clientY - rect.top)  / rect.height;
      if (fx<0||fx>1||fy<0||fy>1){ tip.style.display="none"; return; }
      const i = Math.max(0, Math.min(cache.W-1, Math.floor(fx*cache.W)));
      const j = Math.max(0, Math.min(cache.H-1, Math.floor(fy*cache.H)));
      const data = canvasId==="cv-single" ? cache.single : cache.stack;
      const v = data[j*cache.W + i];
      // Physical coords
      const sim = cache.sim;
      const lam = sim.wavelengths[i];                                  // Å
      const dy_arcsec = (j - cache.H/2) * sim.yPhys_per_pix;           // ″
      const dlam = (i - cache.W/2) * sim.xPhys_per_pix;                // Å from centre
      tip.textContent =
        `${label} (col ${i}, row ${j})\n` +
        `value : ${v.toFixed(3)} e-\n` +
        `λ     : ${lam.toFixed(2)} Å  (Δλ ${dlam>=0?"+":""}${dlam.toFixed(2)} Å)\n` +
        `spat  : ${dy_arcsec>=0?"+":""}${dy_arcsec.toFixed(2)}″ from slit centre`;
      tip.style.display = "block";
      // Position near cursor with edge protection
      const pad = 12;
      let x = e.clientX + pad, y = e.clientY + pad;
      const tipBox = tip.getBoundingClientRect();
      if (x + tipBox.width  > window.innerWidth)  x = e.clientX - pad - tipBox.width;
      if (y + tipBox.height > window.innerHeight) y = e.clientY - pad - tipBox.height;
      tip.style.left = x + "px";
      tip.style.top  = y + "px";
    });
    cv.addEventListener("mouseleave", ()=>{ tip.style.display="none"; });
  }
  wire("cv-single", "Single exposure");
  wire("cv-stack",  "Stacked");
}
