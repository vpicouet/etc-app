      if (STATE.imgCache){ applyColorScale("single"); applyColorScale("stack"); }
      if (STATE.imgCacheIfs){ applyColorScale("ifs_single"); applyColorScale("ifs_stack"); }
    });
  });
}

/* Build dependencies UI + show/hide slider rows when a dep becomes active */
function buildDependencyUI(){
  const root = d3.select("#dep-list");
  root.selectAll("*").remove();
  DEPENDENCIES.forEach((d,idx)=>{
    const row = root.append("label").attr("class","check").attr("title", d.tip).style("display","block").style("margin","2px 0");
    row.append("input").attr("type","checkbox").attr("data-dep",d.key)
      .property("checked", ACTIVE_DEPS.has(d.key))
      .on("change", function(){
        if (this.checked) ACTIVE_DEPS.add(d.key); else ACTIVE_DEPS.delete(d.key);
        updateDepVisibility();
        scheduleUpdate();
      });
    row.append("span").style("margin-left","4px").text(" "+d.label);
  });
}
function updateDepVisibility(){
  DEPENDENCIES.forEach(d=>{
    const active = ACTIVE_DEPS.has(d.key);
    const inp = document.querySelector(`input[data-key="${d.key}"]`);
    if (!inp) return;
    const row = inp.closest(".slider-row");
    // Keep the row visible; just disable the slider and grey out the row to signal the dep is driving it.
    if (row) row.classList.toggle("dep-locked", active);
    inp.disabled = active;
  });
}
/* Apply active dependencies to a scalar param map (mutates in place) */
function applyDependenciesScalar(values){
  // Iterate in declaration order; cascading deps would need topo sort but the three formulas here don't chain.
  DEPENDENCIES.forEach(d=>{
    if (!ACTIVE_DEPS.has(d.key)) return;
    const ok = d.deps.every(name => isFinite(values[name]));
    if (ok) values[d.key] = d.compute(values);
  });
}
/* Vector version: arrays for the x-axis are honored. */
function applyDependenciesVector(map, N){
  DEPENDENCIES.forEach(d=>{
    if (!ACTIVE_DEPS.has(d.key)) return;
    const arr = new Array(N);
    for (let i=0;i<N;i++){
      const ctx = {};
      for (const nm of d.deps) ctx[nm] = Array.isArray(map[nm]) ? map[nm][i] : map[nm];
      arr[i] = d.compute(ctx);
    }
    map[d.key] = arr;
  });
}

/* ============================================================================
   6. PLOT — 4 stacked panels, sized to the plot container
   ========================================================================== */
function getPlotDim(){
  const el = document.getElementById("plot-wrap");
  const sb = document.getElementById("status");
  const tabs = document.querySelector(".view-tabs");
  const availH = el.clientHeight - (sb ? sb.offsetHeight : 0) - (tabs ? tabs.offsetHeight : 0) - 18;
  return { w: Math.max(200, el.clientWidth - 14), h: Math.max(120, availH) };
}
function makePanels(W,H,n){
  // Tight layout: only the global x-label sits at the very bottom.
  // Inner panels share the x-axis (no per-panel x-ticks), only the last panel has them.
  const margin = {l:64, r:14, t:10, b:28};
  const innerW = W - margin.l - margin.r;
  const innerH = H - margin.t - margin.b;
  const ph = innerH / n;
  return Array.from({length:n}, (_,i)=>({
    x: margin.l, y: margin.t + i*ph,
    w: innerW, h: ph - 2,
    isLast: (i === n-1)
  }));
}

function drawPlot(res){
  const svg = d3.select("#plot");
  svg.selectAll("*").remove();
  const dim = getPlotDim();
  // Don't set width/height as attributes — let CSS control them. Just set viewBox + preserveAspectRatio.
  svg.attr("viewBox", `0 0 ${dim.w} ${dim.h}`).attr("preserveAspectRatio", "none");
  const xKey = STATE.xKey, x = res.x;
  const xlog = document.getElementById("xlog").classList.contains("on");
  const ylog = document.getElementById("ylog").classList.contains("on");
  const xmin = d3.min(x), xmax = d3.max(x);
  const xScale = (xlog && xmin>0)
    ? d3.scaleLog().domain([Math.max(xmin,1e-30), xmax]).range([0,1])
    : d3.scaleLinear().domain([xmin,xmax]).range([0,1]);

  // 3 panels now (the old "SB limit" panel was folded into panel 2's legend).
  const panels = makePanels(dim.w, dim.h, 3);

  // Panel 0: noise lines
  const noiseSeries = [];
  for (let s=0; s<6; s++){
    noiseSeries.push({ name:NAMES[s], color:COLORS[s], y: x.map((_,i)=>res.noises_per_exp[i][s]) });
  }
  const quadSum = x.map((_,i)=>{
    let q=0; for (let s=0;s<6;s++) q += res.noises_per_exp[i][s]**2;
    return Math.sqrt(q);
  });

  const contribStack = stackify(x.length, 6, (i,s)=> res.number_pixels_used[i]*res.electrons_per_pix[i][s]);
  const snrStack = stackify(x.length, 6, (i,s)=>{
    const Tn = res.Total_noise_final[i]; return (isFinite(Tn)&&Tn>0) ? res.SNR[i]*res.noises[i][s]**2/(Tn*Tn) : 0;
  });
  const sb_pix = x.map((_,i)=>safeLog10(res.SB_lim_per_pix[i]));
  const sb_res = x.map((_,i)=>safeLog10(res.SB_lim_per_res[i]));
  const sb_src = x.map((_,i)=>safeLog10(res.SB_lim_per_source[i]));

  const currentVal = STATE.values[xKey];
  const iCur = currentVal!=null ? argClosest(x, currentVal) : Math.floor(x.length/2);

  // ===== Panel 0 =====
  const p0 = panels[0];
  const allY0 = noiseSeries.flatMap(s=>s.y).concat(quadSum);
  const dom0 = drawPanel(svg, p0, x, xScale, allY0, ylog, "Noise (e-/exp)", g=>{
    noiseSeries.forEach(s=>{
      g.append("path").datum(s.y).attr("fill","none").attr("stroke",s.color).attr("stroke-width",5.0)
        .attr("d", lineGen(x, p0, xScale, allY0, ylog, LOCK_AXES.active ? LOCK_AXES.snrY[0] : null));
    });
    const quadColor = cssVar("--plot-curve","#000");
    g.append("path").datum(quadSum).attr("fill","none").attr("stroke", quadColor).attr("stroke-width",2.5)
      .attr("stroke-dasharray","6,3")
      .attr("d", lineGen(x, p0, xScale, allY0, ylog, LOCK_AXES.active ? LOCK_AXES.snrY[0] : null));
    legendBlock(g, p0, [
      ...noiseSeries.map(s=>({name:`${s.name}: ${fmtNum(s.y[iCur])}`, color:s.color})),
      {name:`Quad sum: ${fmtNum(quadSum[iCur])}`, color:quadColor, dashed:true}
    ]);
  }, LOCK_AXES.active ? LOCK_AXES.snrY[0] : null);
  if (LOCK_AXES.active && !LOCK_AXES.snrY[0]) LOCK_AXES.snrY[0] = dom0;

  // ===== Panel 1 =====
  const p1 = panels[1];
  const max1 = d3.max(contribStack[contribStack.length-1].y1);
  const dom1 = drawStackPanel(svg, p1, x, xScale, contribStack, max1, ylog, "e-/exp (× npix)", iCur,
    NAMES.map((n,j)=>({name:n, color:COLORS[j]})), (j)=>res.number_pixels_used[iCur]*res.electrons_per_pix[iCur][j],
    undefined, LOCK_AXES.active ? LOCK_AXES.snrY[1] : null);
  if (LOCK_AXES.active && !LOCK_AXES.snrY[1]) LOCK_AXES.snrY[1] = dom1;

  // ===== Panel 2 =====
  const p2 = panels[2];
  const max2 = d3.max(snrStack[snrStack.length-1].y1);
  // Pick the SB-limit array matching the active SNR mode
  const snrMode = document.getElementById("snr_res").value;
  const sbArr   = (snrMode === "per pix")       ? sb_pix
               : (snrMode === "per Source" || snrMode === "per Source per 2λpix") ? sb_src
               : sb_res;
  const sbLabel = (snrMode === "per pix") ? "per pix"
                : (snrMode === "per Source" || snrMode === "per Source per 2λpix") ? "per source"
                : "per res elem";
  const sbVal   = sbArr[iCur];
  const snrCur = isFinite(res.SNR[iCur]) ? res.SNR[iCur] : NaN;
  const snrMax = d3.max(res.SNR.filter(isFinite));
  // Pixel breakdown: nx × nλ (× ny if IFS) for spectrograph; total for imager; nothing for per pix.
  const _ps = res.pix_spat[iCur], _pl = res.pix_spec[iCur], _pny = res.pix_ny[iCur];
  const _fmtPix = v => isFinite(v) ? Math.round(v).toString() : "—";
  const _pixInfo = (snrMode === "per pix") ? ""
    : FLAGS.spectrograph
      ? (_pny > 1
          ? ` [${_fmtPix(_ps)} nx × ${_fmtPix(_pl)} nλ × ${_fmtPix(_pny)} ny pix]`
          : ` [${_fmtPix(_ps)} nx × ${_fmtPix(_pl)} nλ pix]`)
      : ` [${_fmtPix(res.number_pixels_used[iCur])} pix]`;
  const snrTitle = `SNR ${isFinite(snrCur)?snrCur.toFixed(2):"—"} (max ${snrMax!=null?snrMax.toFixed(2):"—"})${_pixInfo}\nSB(5σ,${sbLabel}) ${isFinite(sbVal)?sbVal.toFixed(2):"—"} log[erg/cm²/s/asec²]`;
  const dom2 = drawStackPanel(svg, p2, x, xScale, snrStack, max2, ylog, "SNR contributions", iCur,
    NAMES.map((n,j)=>({name:n, color:COLORS[j]})), (j)=>{
      const Tn = res.Total_noise_final[iCur];
      return Tn>0 ? res.SNR[iCur]*res.noises[iCur][j]**2/(Tn*Tn) : 0;
    }, snrTitle, LOCK_AXES.active ? LOCK_AXES.snrY[2] : null);
  if (LOCK_AXES.active && !LOCK_AXES.snrY[2]) LOCK_AXES.snrY[2] = dom2;

  // x-axis label — bottom-right of the last panel, just above the x-axis line
  const lastP = panels[panels.length-1];
  const _xp = PARAMS[xKey];
  const _xLabel = _xp ? `${_xp.label}${_xp.unit ? ` [${_xp.unit}]` : ""}` : xKey;
  svg.append("text").attr("x", lastP.x + lastP.w - 8).attr("y", lastP.y + lastP.h - 6)
    .attr("text-anchor","end").attr("class","ax-title").style("font-style","italic").text(_xLabel);

  // Visible vertical line at the current value (the draggable hit zone is appended
  // AFTER the hover-tooltip rect below so it sits on top in z-order and actually catches mousedown).
  let snrVlineX = null;
  if (currentVal!=null && currentVal>=xmin && currentVal<=xmax){
    const xp = xScale(currentVal);
    snrVlineX = xp;   // remember for the hit zones added later
    panels.forEach(pr=>{
      const lineX = pr.x + xp*pr.w;
      svg.append("line").attr("class","vline")
        .attr("x1", lineX).attr("x2", lineX).attr("y1", pr.y).attr("y2", pr.y+pr.h)
        .style("pointer-events","none");
    });
  }

  // ============================ Hover tooltip ============================
  // Cache the panel data so the hover handler can read it
  const xfmt = d3.format(".3~g");
  const panelInfo = [
    {
      title: "Noise (e-/exp)",
      series: [
        ...noiseSeries.map(s=>({name:s.name, color:s.color, ys:s.y})),
        {name:"Quad sum", color:cssVar("--plot-curve","#000"), ys:quadSum}
      ]
    },
    {
      title: "Contributions (e-/exp · npix)",
      series: NAMES.map((n,j)=>({
        name:n, color:COLORS[j],
        ys: x.map((_,i)=> res.number_pixels_used[i]*res.electrons_per_pix[i][j])
      }))
    },
    {
      title: "SNR contributions",
      series: NAMES.map((n,j)=>({
        name:n, color:COLORS[j],
        ys: x.map((_,i)=>{
          const Tn = res.Total_noise_final[i];
          return (Tn>0) ? res.SNR[i]*res.noises[i][j]**2/(Tn*Tn) : 0;
        })
      })).concat([{ name:"SNR total", color:"#000", ys: res.SNR.slice() }])
    }
  ];

  const tip = document.getElementById("pixtip");
  panels.forEach((pr, pi)=>{
    const rect = svg.append("rect")
      .attr("x", pr.x).attr("y", pr.y).attr("width", pr.w).attr("height", pr.h)
      .attr("fill", "transparent").style("cursor","crosshair");
    rect.on("mousemove", function(e){
      const r = svg.node().getBoundingClientRect();
      const svgX = (e.clientX - r.left) * (dim.w / r.width);
      const fx = (svgX - pr.x) / pr.w;
      if (fx<0 || fx>1) { tip.style.display="none"; return; }
      // Invert xScale (which has range [0,1])
      const xVal = xScale.invert(fx);
      const idx = argClosest(x, xVal);
      const info = panelInfo[pi];
      let txt = `${xKey} = ${xfmt(x[idx])}\n${info.title}`;
      info.series.forEach(s=>{
        const v = s.ys[idx];
        txt += `\n  ${s.name.padEnd(14)} ${isFinite(v) ? xfmt(v) : "—"}`;
      });
      tip.textContent = txt;
      tip.style.display = "block";
      // Position with edge protection
      const pad = 12;
      let tx = e.clientX + pad, ty = e.clientY + pad;
      const tb = tip.getBoundingClientRect();
      if (tx + tb.width  > window.innerWidth)  tx = e.clientX - pad - tb.width;
      if (ty + tb.height > window.innerHeight) ty = e.clientY - pad - tb.height;
      tip.style.left = tx + "px";
      tip.style.top  = ty + "px";
    }).on("mouseleave", ()=>{ tip.style.display="none"; });
  });

  // Draggable hit zone for the SNR vertical cursor — appended LAST so it stays on top of
  // the hover-tooltip rect and actually receives mousedown.
  if (snrVlineX != null){
    panels.forEach(pr=>{
      const lineX = pr.x + snrVlineX*pr.w;
      svg.append("rect").attr("class","vline-hit")
        .attr("x", lineX - 7).attr("y", pr.y).attr("width", 14).attr("height", pr.h)
        .attr("fill", "transparent").style("cursor","ew-resize")
        .on("mousedown", function(e){
          if (e.button !== 0 || e.ctrlKey) return;
          e.preventDefault(); e.stopPropagation();
          STATE._snrXDrag = { panel: pr, xScale, dim, dragging: true };
        });
    });
  }
}

function stackify(N, S, get){
  const layers = Array.from({length:S}, ()=>({y0:new Array(N), y1:new Array(N)}));
  for (let i=0;i<N;i++){
    let acc = 0;
    for (let s=0;s<S;s++){
      const v = get(i,s); const vv = isFinite(v)?v:0;
      layers[s].y0[i] = acc; layers[s].y1[i] = acc + vv; acc += vv;
    }
  }
  return layers;
}

function lineGen(x, panel, xScale, allY, ylog, lockedDom){
  const yDom = d3.extent(allY.filter(v=>isFinite(v)));
  let yScale;
  if (lockedDom){
    yScale = ylog
      ? d3.scaleLog().domain(lockedDom).range([panel.h, 0])
      : d3.scaleLinear().domain(lockedDom).range([panel.h, 0]);
  } else if (ylog){
    const minPos = d3.min(allY.filter(v=>v>0));
    yScale = d3.scaleLog().domain([Math.max(minPos||1e-6,1e-30), Math.max(yDom[1], (minPos||1e-6)*10)]).range([panel.h, 0]);
  } else {
    yScale = d3.scaleLinear().domain([Math.min(yDom[0],0), yDom[1]||1]).range([panel.h, 0]);
  }
  return d3.line()
    .defined((v,i)=> isFinite(x[i]) && isFinite(v) && !(xScale.base && x[i]<=0) && !(ylog && v<=0))
    .x((_,i)=>panel.x + xScale(x[i])*panel.w)
    .y(v=>panel.y + yScale(v));
}

let _clipIdSeq = 0;
function clipPanel(svg, panel){
  const id = `cp-${++_clipIdSeq}`;
  svg.append("defs").append("clipPath").attr("id", id)
    .append("rect")
    .attr("x", panel.x).attr("y", panel.y)
    .attr("width", panel.w).attr("height", panel.h);
  return id;
}

function drawPanel(svg, panel, x, xScale, allY, ylog, title, drawLines, lockedDom){
  const yDomAuto = d3.extent(allY.filter(v=>isFinite(v)));
  let yScale;
  if (lockedDom){
    yScale = ylog
      ? d3.scaleLog().domain(lockedDom).range([panel.h, 0])
      : d3.scaleLinear().domain(lockedDom).range([panel.h, 0]);
  } else if (ylog){
    const minPos = d3.min(allY.filter(v=>v>0));
    yScale = d3.scaleLog().domain([Math.max(minPos||1e-6,1e-30), Math.max(yDomAuto[1], (minPos||1e-6)*10)]).range([panel.h, 0]);
  } else {
    yScale = d3.scaleLinear().domain([Math.min(yDomAuto[0],0), yDomAuto[1]||1]).range([panel.h, 0]);
  }
  const xAxisScale = xScale.copy().range([panel.x, panel.x+panel.w]);
  const yAxisScale = yScale.copy().range([panel.y+panel.h, panel.y]);
  const nx = panel.w < 380 ? 3 : 4;
  const ny = panel.h < 90 ? 3 : 4;
  const xAxis = makeAxis(d3.axisBottom, xAxisScale, nx, panel.isLast);
  if (!panel.isLast) xAxis.tickSize(3);
  svg.append("g").attr("class","plot-axis").attr("transform",`translate(0,${panel.y+panel.h})`).call(xAxis);
  svg.append("g").attr("class","plot-axis").attr("transform",`translate(${panel.x},0)`)
    .call(makeAxis(d3.axisLeft, yAxisScale, ny, true));
  svg.append("text").attr("class","ax-title")
    .attr("transform",`translate(${panel.x-50},${panel.y+panel.h/2}) rotate(-90)`)
    .attr("text-anchor","middle").text(title);
  const clipId = clipPanel(svg, panel);
  drawLines(svg.append("g").attr("clip-path", `url(#${clipId})`));
  return yScale.domain();
}

/* Build an axis with sparse tick labels — works for both linear and log scales.
   For log scales, d3.scaleLog().ticks(n) ignores n; we instead enumerate decades and keep at most n. */
function makeAxis(axisFn, scale, nMax, withLabels){
  const isLog = (scale.base !== undefined);    // d3.scaleLog has .base()
  const fmt = d3.format(".2~g");
  if (isLog){
    const [a,b] = scale.domain();
    const la = Math.floor(Math.log10(Math.max(a, 1e-30)));
    const lb = Math.ceil(Math.log10(Math.max(b, 10*a)));
    // Build powers of 10 + the 2/3/5 sub-decade values
    const subs = [1, 2, 3, 5];
    const vals = [];
    for (let k=la; k<=lb; k++){
      const base = Math.pow(10, k);
      for (const s of subs) vals.push(s*base);
    }
    // Keep only values inside [a, b]
    let kept = vals.filter(v => v >= a*0.999 && v <= b*1.001);
    // Down-sample if too many (target ~3·nMax labels max so it stays readable)
    const target = Math.max(4, nMax*3);
    if (kept.length > target){
      const step = Math.ceil(kept.length / target);
      kept = kept.filter((_,i)=> i%step === 0);
    }
    return axisFn(scale).tickValues(kept).tickFormat(withLabels ? fmt : "").tickSizeOuter(0);
  } else {
    return axisFn(scale).ticks(nMax).tickFormat(withLabels ? fmt : "").tickSizeOuter(0);
  }
}

function drawStackPanel(svg, panel, x, xScale, layers, maxY, ylog, title, iCur, legend, getCur, legendTitle, lockedDom){
  let yScale;
  if (lockedDom){
    yScale = ylog
      ? d3.scaleLog().domain(lockedDom).range([panel.h, 0])
      : d3.scaleLinear().domain(lockedDom).range([panel.h, 0]);
  } else if (ylog){
    let minPos = Infinity;
    for (const lay of layers) for (const v of lay.y1) if (v>0 && v<minPos) minPos = v;
    if (!isFinite(minPos)) minPos = 1e-3;
    yScale = d3.scaleLog().domain([Math.max(minPos,1e-30), Math.max(maxY, minPos*10)]).range([panel.h, 0]);
  } else {
    yScale = d3.scaleLinear().domain([0, Math.max(maxY,1e-12)]).range([panel.h, 0]);
  }
  const xAxisScale = xScale.copy().range([panel.x, panel.x+panel.w]);
  const yAxisScale = yScale.copy().range([panel.y+panel.h, panel.y]);
  const nx = panel.w < 380 ? 3 : 4;
  const ny = panel.h < 90 ? 3 : 4;
  const xAxis = makeAxis(d3.axisBottom, xAxisScale, nx, panel.isLast);
  if (!panel.isLast) xAxis.tickSize(3);
  svg.append("g").attr("class","plot-axis").attr("transform",`translate(0,${panel.y+panel.h})`).call(xAxis);
  svg.append("g").attr("class","plot-axis").attr("transform",`translate(${panel.x},0)`)
    .call(makeAxis(d3.axisLeft, yAxisScale, ny, true));
  svg.append("text").attr("class","ax-title")
    .attr("transform",`translate(${panel.x-50},${panel.y+panel.h/2}) rotate(-90)`)
    .attr("text-anchor","middle").text(title);
  const clipId = clipPanel(svg, panel);
  const dataG = svg.append("g").attr("clip-path", `url(#${clipId})`);
  const yDomMin = yScale.domain()[0];
  for (let s=0;s<layers.length;s++){
    const lay = layers[s];
    const a = d3.area()
      .x((_,i)=>panel.x + xScale(x[i])*panel.w)
      .y0((_,i)=>panel.y + yScale(Math.max(lay.y0[i] || yDomMin, yDomMin)))
      .y1((_,i)=>panel.y + yScale(Math.max(lay.y1[i] || yDomMin, yDomMin)));
    dataG.append("path").datum(lay.y1.map((_,i)=>i))
      .attr("fill", legend[s].color).attr("fill-opacity",0.7)
      .attr("stroke", legend[s].color).attr("stroke-width", 1.2).attr("stroke-opacity",0.95)
      .attr("d", a);
  }
  const totalCur = legend.reduce((acc,_,j)=>acc + (getCur(j)||0), 0);
  legendBlock(svg.append("g"), panel, legend.map((L,j)=>{
    const v = getCur(j)||0;
    const pct = totalCur>0 ? (100*v/totalCur).toFixed(1) : "0";
    return {name:`${L.name}: ${fmtNum(v)} (${pct}%)`, color:L.color};
  }), legendTitle);
  return yScale.domain();
}

function legendBlock(g, panel, items, title){
  // Render legend inside the panel, anchored to top-right, with a translucent theme-aware background.
  // title may contain '\n' to produce multiple title lines.
  const lineH = 12, padX = 6, padY = 4;
  const titleLines = title ? title.split("\n") : [];
  const titleH = titleLines.length * 13;
  // Estimate width via longest line (title or item)
  let maxLen = 0;
  for (const tl of titleLines) if (tl.length > maxLen) maxLen = tl.length;
  for (const it of items) if (it.name.length > maxLen) maxLen = it.name.length;
  const swatchW = 9, swatchGap = 5;
  const labelW = Math.min(panel.w * 0.65, Math.max(70, maxLen * 5.8));
  const boxW = padX*2 + swatchW + swatchGap + labelW;
  const boxH = padY*2 + titleH + items.length * lineH;
  const x0 = panel.x + panel.w - boxW - 6;
  const y0 = panel.y + 6;
  const cs = getComputedStyle(document.body);
  const bgC = cs.getPropertyValue("--plot-bg").trim() || "#fff";
  const lnC = cs.getPropertyValue("--line").trim() || "#bbb";
  g.append("rect").attr("x", x0).attr("y", y0).attr("width", boxW).attr("height", boxH)
    .attr("fill", bgC).attr("fill-opacity", 0.78)
    .attr("stroke", lnC).attr("stroke-opacity", 0.5).attr("rx", 3);
  let y = y0 + padY + 9;
  for (const tl of titleLines){
    g.append("text").attr("x", x0 + padX).attr("y", y + 1).attr("class","legend")
      .style("font-weight","700").text(tl);
    y += 13;
  }
  for (const it of items){
    if (it.dashed){
      g.append("line")
        .attr("x1", x0 + padX).attr("y1", y - 3)
        .attr("x2", x0 + padX + swatchW).attr("y2", y - 3)
        .attr("stroke", it.color).attr("stroke-width", 2.5)
        .attr("stroke-dasharray", "3,2");
    } else {
      g.append("rect").attr("x", x0 + padX).attr("y", y - 8).attr("width", swatchW).attr("height", swatchW)
        .attr("fill", it.color).attr("fill-opacity", it.alpha!=null?it.alpha:0.85);
    }
    g.append("text").attr("x", x0 + padX + swatchW + swatchGap).attr("y", y + 1).attr("class","legend").text(it.name);
    y += lineH;
  }
}

// Color map (viridis-like, hardcoded LUT for speed)
// === Color maps ============================================================
// Each LUT is a small array of [R,G,B] (0..255) that we linearly interpolate.
const COLORMAPS = {
  viridis: [
    [68,1,84],[71,24,106],[71,44,123],[68,62,135],[64,79,140],
    [58,93,142],[51,107,143],[46,121,142],[40,135,141],[35,148,138],
    [33,162,132],[44,176,121],[68,189,107],[101,201,87],[140,210,66],
    [183,217,42],[222,224,27],[253,231,37]
  ],
  inferno: [
    [0,0,4],[20,11,52],[51,4,82],[81,8,99],[110,17,103],
    [138,28,99],[167,40,90],[193,55,76],[216,73,57],[233,97,40],
    [245,124,21],[252,153,11],[253,184,18],[247,215,44],[236,247,80]
  ],
  plasma: [
    [13,8,135],[55,4,159],[91,1,168],[123,3,167],[152,18,158],
    [177,38,143],[200,60,124],[219,84,107],[235,107,89],[247,131,73],
    [253,156,57],[253,182,46],[247,209,49],[239,237,80]
  ],
  cividis: [
    [0,32,77],[0,42,100],[0,52,114],[31,62,118],[55,72,119],
    [73,82,120],[88,93,120],[103,103,120],[118,114,119],[134,124,116],
    [152,135,112],[170,146,108],[190,157,101],[210,169,93],[233,182,80],[253,196,65]
  ],
  gray: [[0,0,0],[255,255,255]],
  hot: [
    [0,0,0],[58,0,0],[110,0,0],[160,0,0],[210,0,0],[255,30,0],
    [255,82,0],[255,135,0],[255,188,0],[255,230,30],[255,255,140],[255,255,255]
  ]
};
const COLORMAP_NAMES = ["viridis","inferno","plasma","cividis","gray","hot"];

function cmapAt(name, t){
  if (!isFinite(t)) return [0,0,0];
  const lut = COLORMAPS[name] || COLORMAPS.viridis;
  t = Math.max(0,Math.min(1,t));
  const x = t*(lut.length-1);
  const i0 = Math.floor(x), i1 = Math.min(lut.length-1, i0+1);
  const f = x-i0;
  const a = lut[i0], b = lut[i1];
  return [a[0]+(b[0]-a[0])*f, a[1]+(b[1]-a[1])*f, a[2]+(b[2]-a[2])*f];
}
// Backwards-compat alias
function viridisAt(t){ return cmapAt(STATE.colormap || "viridis", t); }

function rasterizeImage(canvas, data, W, H, vmin, vmax, useLog){
  // data[j*W+i] in row-major (j = spatial / row, i = spectral / col)
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext("2d");
  const img = ctx.createImageData(W, H);
  let tFn;
  if (useLog){
    // Symlog mapping: shift so the floor is positive, then take log10.
    // linthresh chosen as max(1, |vmin|+1) so log(vmin) = log(1) = 0.
    const offset = Math.max(1, -vmin + 1);
    const lmin = Math.log10(vmin + offset);
    const lmax = Math.log10(vmax + offset);
    const range = (lmax - lmin) || 1;
    tFn = v => (Math.log10(v + offset) - lmin) / range;
  } else {
    const range = (vmax - vmin) || 1;
    tFn = v => (v - vmin)/range;
  }
  for (let j=0;j<H;j++){
    for (let i=0;i<W;i++){
      const v = data[j*W+i];
      const t = isFinite(v) ? tFn(v) : 0;
      const [r,g,b] = viridisAt(t);
      const k = (j*W+i)*4;
      img.data[k] = r; img.data[k+1] = g; img.data[k+2] = b; img.data[k+3] = 255;
    }
  }
  ctx.putImageData(img,0,0);
}

function percentile(arr, p){
  // p in [0,1]; in-place is OK because we don't need order preserved
  const a = Array.from(arr).filter(v=>isFinite(v)).sort((x,y)=>x-y);
  if (!a.length) return 0;
  const idx = Math.min(a.length-1, Math.max(0, Math.floor(p*a.length)));
  return a[idx];
}

function drawImageView(){
  // Build the parameter set as scalars
  const pa = {};
  for (const k of Object.keys(PARAMS)) pa[k] = STATE.values[k];
  applyDependenciesScalar(pa);
  pa.Signal_in = pa.Signal;
  pa.IFS = FLAGS.IFS; pa.spectrograph = FLAGS.spectrograph; pa.counting_mode = FLAGS.counting_mode;
  // Image-tab flags
  pa.atmlambda = IMG_FLAGS.atmlambda;
  pa.QElambda  = IMG_FLAGS.QElambda;
  pa.sky_lines = IMG_FLAGS.sky_lines;
  pa.source_im = IMG_FLAGS.source_im;
  pa.spectrum  = IMG_FLAGS.spectrum;
  pa.atm_kind  = IMG_FLAGS.atm_kind;
  pa.sky_kind  = IMG_FLAGS.sky_kind;
  pa.source_shape = IMG_FLAGS.source_shape;
  pa.bar_angle    = IMG_FLAGS.bar_angle;
  // Use SIMBAD redshift for SDSS-fetched spectra, fall back to slider value
  pa.Redshift = (STATE.fetchedSpectrum && IMG_FLAGS.spectrum === STATE.fetchedSpectrum.name)
    ? STATE.fetchedSpectrum.redshift
    : (STATE.values.Redshift || 0);
  // Detector image size (kept fixed; you can change to scale with viewport)
  pa.W = 500; pa.H = 100;
  // Fresh realisation on each update — change seed deterministically so slider movement shows noise diversity
  STATE.imgSeed = (STATE.imgSeed + 1) >>> 0;
  pa.seed = STATE.imgSeed;

  let sim;
  try { sim = simulateImage(pa); }
  catch(e){ d3.select("#status").classed("err",true).text("Image sim error: "+e.message); console.error(e); return; }

  // Single + Stack canvases — auto-stretch via 1% / 99% percentiles
  const cvS = document.getElementById("cv-single");
  const cvK = document.getElementById("cv-stack");
  const vminS = percentile(sim.single, 0.01), vmaxS = percentile(sim.single, 0.99);
  const vminK = percentile(sim.stack,  0.01), vmaxK = percentile(sim.stack,  0.99);
  const ylog = document.getElementById("ylog").classList.contains("on");
  // Cache + apply bias/contrast (DS9-style)
  STATE.imgCache = {
    single: sim.single, stack: sim.stack, W: sim.W, H: sim.H, sim,
    vmin0: { single: vminS, stack: vminK },
    vmax0: { single: vmaxS, stack: vmaxK },
    ylog
  };
  applyColorScale("single");
  applyColorScale("stack");
  drawSlitOverlay("ov-single", pa, sim);
  drawSlitOverlay("ov-stack",  pa, sim);
  attachImageHover();
  attachImageColorscaleDrag();

  const slitW_pix = pa.Slitwidth  / pa.pixel_scale;
  const slitH_pix = pa.Slitlength / pa.pixel_scale;
  const slitStr = `slit ${pa.Slitwidth.toFixed(2)}″ × ${pa.Slitlength.toFixed(2)}″ (${slitW_pix.toFixed(1)}×${slitH_pix.toFixed(1)} px)`;
  document.getElementById("img-single-title").textContent =
    `Single exposure  ·  ${sim.W}×${sim.H} pix = ${(sim.W*sim.xPhys_per_pix).toFixed(0)}Å × ${(sim.H*sim.yPhys_per_pix).toFixed(1)}″  ·  ${slitStr}`;
  document.getElementById("img-stack-title").textContent =
    `Stacked  ·  ${sim.N_stack} frames, T_acq=${(STATE.values.acquisition_time).toFixed(1)}h  ·  ${slitStr}`;

  // ===== Profiles SVG (spatial avg + spectral avg, single & stacked) =====
  drawProfiles(sim);
  // ===== Throughput / atm / sky-line curves =====
  drawOptics(sim, pa);
  // ===== Histogram SVG =====
  drawHistogram(sim);
}

/* Apply current bias/contrast to one canvas and re-rasterise.
   bias  ∈ (-1, +1) shifts the center of the displayed range (negative → favours dark, positive → favours bright).
   contrast > 0     scales the spread (1 = identity, >1 = high contrast/narrow range, <1 = low contrast/wide range).
   The formulas follow DS9's standard mapping: center += bias × half_range; spread /= contrast.
   `which` must match a key in STATE.imgCM. Mapping: spectro → STATE.imgCache, ifs → STATE.imgCacheIfs. */
function applyColorScale(which){
  const isIfs = which.startsWith("ifs_");
  const c = isIfs ? STATE.imgCacheIfs : STATE.imgCache;
  if (!c) return;
  const cvId = {
    single:     "cv-single",
    stack:      "cv-stack",
    ifs_single: "cv-ifs-single",
    ifs_stack:  "cv-ifs-stack"
  }[which];
  const dataKey = isIfs ? (which === "ifs_single" ? "single" : "stack") : which;
  const cv = document.getElementById(cvId);
  const rawData = c[dataKey];
  const sigma = (IMG_FLAGS.smoothing || 0) / 2.355;  // FWHM → sigma
  const data = sigma >= 0.5 ? gaussBlur2D(rawData, c.W, c.H, sigma) : rawData;
  const cm = STATE.imgCM[which];
  // Axis lock: capture vmin0/vmax0 on first locked render; use frozen values on subsequent renders.
  if (LOCK_AXES.active){
    if (!LOCK_AXES.img) LOCK_AXES.img = { vmin0: {}, vmax0: {} };
    if (!(which in LOCK_AXES.img.vmin0)){
      LOCK_AXES.img.vmin0[which] = c.vmin0[dataKey];
      LOCK_AXES.img.vmax0[which] = c.vmax0[dataKey];
    }
  }
  const v0 = (LOCK_AXES.active && LOCK_AXES.img && which in LOCK_AXES.img.vmin0)
    ? LOCK_AXES.img.vmin0[which] : c.vmin0[dataKey];
  const v1 = (LOCK_AXES.active && LOCK_AXES.img && which in LOCK_AXES.img.vmax0)
    ? LOCK_AXES.img.vmax0[which] : c.vmax0[dataKey];
  const half = (v1 - v0) / 2;
  const center0 = (v0 + v1) / 2;
  const center = center0 + cm.bias * half;
  const spread = half / Math.max(cm.contrast, 0.01);
  const vmin = center - spread;
  const vmax = center + spread;
  rasterizeImage(cv, data, c.W, c.H, vmin, vmax, c.ylog);
  // Render the colorbar for both Spectro image and IFS canvases.
  const cbIdMap = {
    single:     "cb-single",
    stack:      "cb-stack",
    ifs_single: "cb-ifs-single",
    ifs_stack:  "cb-ifs-stack"
  };
  const cbId = cbIdMap[which];
  if (cbId){
    const cb = document.getElementById(cbId);
    if (cb){
      renderColorbar(cb, vmin, vmax, c.ylog);
      const minEl = document.getElementById(cbId+"-min");
      const maxEl = document.getElementById(cbId+"-max");
      if (minEl) minEl.textContent = formatCbVal(vmin);
      if (maxEl) maxEl.textContent = formatCbVal(vmax);
    }
  }
}

/* Compact tick label format for colorbar min/max */
const _cbFmt = d3.format(".3~g");
function formatCbVal(v){
  if (!isFinite(v)) return "—";
  if (v===0) return "0";
  return _cbFmt(v);
}

/* Render a vertical colorbar (low at the bottom, high at the top) using the
   current colormap (STATE.colormap) and the same vmin/vmax+log mapping as the imshow. */
function renderColorbar(cb, vmin, vmax, useLog){
  // Use a fixed internal resolution and let CSS resize. 1px wide × N px tall.
  const W = 8, H = 200;
  cb.width = W; cb.height = H;
  const ctx = cb.getContext("2d");
  const img = ctx.createImageData(W, H);
  let tFn;
  if (useLog){
    const offset = Math.max(1, -vmin + 1);
    const lmin = Math.log10(vmin + offset);
    const lmax = Math.log10(vmax + offset);
    const range = (lmax - lmin) || 1;
    tFn = v => (Math.log10(v + offset) - lmin) / range;
  } else {
    const range = (vmax - vmin) || 1;
    tFn = v => (v - vmin)/range;
  }
  for (let j=0; j<H; j++){
    // Row j=0 is at the TOP (high values), j=H-1 is at the BOTTOM (low values)
    const tDisp = 1 - j/(H-1);                // 1 at top, 0 at bottom
    const vAtRow = vmin + tDisp * (vmax - vmin);
    const t = tFn(vAtRow);
    const [r,g,b] = cmapAt(STATE.colormap || "viridis", t);
    for (let i=0; i<W; i++){
      const k = (j*W + i)*4;
      img.data[k]=r; img.data[k+1]=g; img.data[k+2]=b; img.data[k+3]=255;
    }
  }
  ctx.putImageData(img,0,0);
}

function attachImageColorscaleDrag(){
  if (STATE._dragAttached) return;
  STATE._dragAttached = true;
  const targets = [
    { which:"single",     cvId:"cv-single" },
    { which:"stack",      cvId:"cv-stack" },
    { which:"ifs_single", cvId:"cv-ifs-single" },
    { which:"ifs_stack",  cvId:"cv-ifs-stack" }
  ];
  targets.forEach(({which, cvId})=>{
    const cv = document.getElementById(cvId);
    if (!cv) return;
    // Disable the browser context menu so right-click drag works
    cv.addEventListener("contextmenu", e => e.preventDefault());
    let dragging = false, sx0=0, sy0=0, bias0=0, contrast0=1;
    function startDrag(e){
      // Right-click OR ctrl+left-click (Mac trackpad)
      const isRight = (e.button === 2) || (e.ctrlKey && e.button === 0);
      if (!isRight) return;
      e.preventDefault();
      dragging = true;
      sx0 = e.clientX; sy0 = e.clientY;
      bias0 = STATE.imgCM[which].bias; contrast0 = STATE.imgCM[which].contrast;
      cv.style.cursor = "grabbing";
    }
    function moveDrag(e){
      if (!dragging) return;
      const rect = cv.getBoundingClientRect();
      const dx = (e.clientX - sx0) / rect.width;     // -1 .. +1 across the image width
      const dy = (e.clientY - sy0) / rect.height;    // -1 .. +1 across the image height
      // bias from horizontal drag: range ~[-1, +1] (sensitivity 1)
      const bias = clamp(bias0 + dx, -1, 1);
      // contrast from vertical drag: dragging DOWN = MORE contrast (DS9 convention).
      // Use an exponential mapping so it's symmetric on both sides.
      const contrast = clamp(contrast0 * Math.pow(8, dy), 0.1, 10);
      STATE.imgCM[which].bias = bias;
      STATE.imgCM[which].contrast = contrast;
      if (!STATE._dragPending){
        STATE._dragPending = true;
        requestAnimationFrame(()=>{
          STATE._dragPending = false;
          applyColorScale(which);
        });
      }
    }
    function endDrag(){
      if (!dragging) return;
      dragging = false;
      cv.style.cursor = "";
    }
    cv.addEventListener("mousedown", startDrag);
    window.addEventListener("mousemove", moveDrag);
    window.addEventListener("mouseup", endDrag);
    // Double-click → reset to auto stretch
    cv.addEventListener("dblclick", e => {
      e.preventDefault();
      STATE.imgCM[which] = { bias: 0, contrast: 1 };
      applyColorScale(which);
    });
  });
}

function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }

function attachImageHover(){
  if (STATE._hoverAttached) return;
  STATE._hoverAttached = true;
  const tip = document.getElementById("pixtip");
  function wire(canvasId, label){
    const cv = document.getElementById(canvasId);
    cv.addEventListener("mousemove", (e)=>{
      const cache = STATE.imgCache; if (!cache) { tip.style.display="none"; return; }
      const rect = cv.getBoundingClientRect();
      const fx = (e.clientX - rect.left) / rect.width;
      const fy = (e.clientY - rect.top)  / rect.height;
      if (fx<0||fx>1||fy<0||fy>1){ tip.style.display="none"; return; }
      const i = Math.max(0, Math.min(cache.W-1, Math.floor(fx*cache.W)));
      const j = Math.max(0, Math.min(cache.H-1, Math.floor(fy*cache.H)));
      const data = canvasId==="cv-single" ? cache.single : cache.stack;
      const v = data[j*cache.W + i];
      // Physical coords
      const sim = cache.sim;
      const lam = sim.wavelengths[i];                                  // Å
      const dy_arcsec = (j - cache.H/2) * sim.yPhys_per_pix;           // ″
      const dlam = (i - cache.W/2) * sim.xPhys_per_pix;                // Å from centre
      tip.textContent =
        `${label} (col ${i}, row ${j})\n` +
        `value : ${v.toFixed(3)} e-\n` +
        `λ     : ${lam.toFixed(2)} Å  (Δλ ${dlam>=0?"+":""}${dlam.toFixed(2)} Å)\n` +
        `spat  : ${dy_arcsec>=0?"+":""}${dy_arcsec.toFixed(2)}″ from slit centre`;
      tip.style.display = "block";
      // Position near cursor with edge protection
      const pad = 12;
      let x = e.clientX + pad, y = e.clientY + pad;
      const tipBox = tip.getBoundingClientRect();
      if (x + tipBox.width  > window.innerWidth)  x = e.clientX - pad - tipBox.width;
      if (y + tipBox.height > window.innerHeight) y = e.clientY - pad - tipBox.height;
      tip.style.left = x + "px";
      tip.style.top  = y + "px";
    });
    cv.addEventListener("mouseleave", ()=>{ tip.style.display="none"; });
  }
  wire("cv-single", "Single exposure");
  wire("cv-stack",  "Stacked");
}

function attachIfsHover(){
  if (STATE._ifsHoverAttached) return;
  STATE._ifsHoverAttached = true;
  const tip = document.getElementById("pixtip");
  function wire(canvasId, label){
    const cv = document.getElementById(canvasId);
    if (!cv) return;
    cv.addEventListener("mousemove", (e)=>{
      const cache = STATE.imgCacheIfs; if (!cache) { tip.style.display="none"; return; }
      const rect = cv.getBoundingClientRect();
      const fx = (e.clientX - rect.left) / rect.width;
      const fy = (e.clientY - rect.top)  / rect.height;
      if (fx<0||fx>1||fy<0||fy>1){ tip.style.display="none"; return; }
      // The IFS slice canvas has axes: x = spaxel index (0..n3-1), y = row (0..H-1)
      const i = Math.max(0, Math.min(cache.W-1, Math.floor(fx*cache.W)));    // spaxel
      const j = Math.max(0, Math.min(cache.H-1, Math.floor(fy*cache.H)));    // row
      const data = canvasId === "cv-ifs-single" ? cache.single : cache.stack;
      const v = data[j*cache.W + i];
      // Physical coords: 1 spaxel = Slitwidth arcsec; 1 row = pixel_scale arcsec
      const Slitwidth   = STATE.values.Slitwidth;
      const pixel_scale = STATE.values.pixel_scale;
      const dx_arcsec = (i - cache.W/2) * Slitwidth;     // ″ along the slicer axis
      const dy_arcsec = (j - cache.H/2) * pixel_scale;   // ″ along the slit
      const lam = IFS_STATE.lambda_center;
      tip.textContent =
        `${label} (spaxel ${i}, row ${j})\n` +
        `value : ${v.toFixed(3)} e-\n` +
        `λ     : ${lam!=null ? lam.toFixed(2) : "—"} Å\n` +
        `Δx    : ${dx_arcsec>=0?"+":""}${dx_arcsec.toFixed(2)}″ (slicer axis)\n` +
        `Δy    : ${dy_arcsec>=0?"+":""}${dy_arcsec.toFixed(2)}″ (along slit)`;
      tip.style.display = "block";
      const pad = 12;
      let x = e.clientX + pad, y = e.clientY + pad;
      const tipBox = tip.getBoundingClientRect();
      if (x + tipBox.width  > window.innerWidth)  x = e.clientX - pad - tipBox.width;
      if (y + tipBox.height > window.innerHeight) y = e.clientY - pad - tipBox.height;
      tip.style.left = x + "px";
      tip.style.top  = y + "px";
    });
    cv.addEventListener("mouseleave", ()=>{ tip.style.display="none"; });
  }
  wire("cv-ifs-single", "Single cube slice");
  wire("cv-ifs-stack",  "Stacked cube slice");
}

function drawSlitOverlay(svgId, pa, sim){
  // Detector image is W (cols, spectral) × H (rows, spatial).
  // The slit's GEOMETRIC footprint on the detector (before dispersion):
  //   - horizontal (spectral axis): Slitwidth / pixel_scale  detector pixels
  //   - vertical   (spatial axis):  Slitlength / pixel_scale detector pixels
  // Centred on the image. Note: after dispersion, the slit light is spread across the full
  // spectral axis — what we draw here is the geometric slit projection, not the dispersed trace.
  const svg = d3.select("#"+svgId);
  svg.selectAll("*").remove();
  if (!pa.spectrograph) return;  // imager: no slit
  const slitW_pix = pa.Slitwidth  / pa.pixel_scale;  // px on spectral axis (geometric)
  const slitH_pix = pa.Slitlength / pa.pixel_scale;  // px on spatial axis
  svg.attr("viewBox", `0 0 ${sim.W} ${sim.H}`);
  const x0 = sim.W/2 - slitW_pix/2;
  const y0 = sim.H/2 - slitH_pix/2;
  const w  = Math.min(sim.W, slitW_pix);
  const h  = Math.min(sim.H, slitH_pix);
  svg.append("rect").attr("x", Math.max(0,x0)).attr("y", Math.max(0,y0))
    .attr("width", w).attr("height", h)
    .attr("fill","none").attr("stroke","#000")
    .attr("stroke-width", Math.max(0.6, sim.H*0.012));
}

/* Compute spectral profile (mean over a few central rows) and spatial profile (mean over a few central cols). */
function computeProfiles(sim){
  const j0 = Math.max(0, Math.floor(sim.H/2 - 5)), j1 = Math.min(sim.H, Math.floor(sim.H/2 + 5));
  const specS = new Float64Array(sim.W), specK = new Float64Array(sim.W);
  for (let i=0;i<sim.W;i++){
    let aS=0, aK=0; for (let j=j0;j<j1;j++){ aS += sim.single[j*sim.W+i]; aK += sim.stack[j*sim.W+i]; }
    specS[i] = aS/(j1-j0); specK[i] = aK/(j1-j0);
  }
  const i0 = Math.max(0, Math.floor(sim.W/2 - 8)), i1 = Math.min(sim.W, Math.floor(sim.W/2 + 8));
  const spatS = new Float64Array(sim.H), spatK = new Float64Array(sim.H);
  for (let j=0;j<sim.H;j++){
    let aS=0, aK=0; for (let i=i0;i<i1;i++){ aS += sim.single[j*sim.W+i]; aK += sim.stack[j*sim.W+i]; }
    spatS[j] = aS/(i1-i0); spatK[j] = aK/(i1-i0);
  }
  return { specS, specK, spatS, spatK };
}

/* Measure an SVG cell's actual pixel size for viewBox. Returns null if cell is collapsed. */
/* Measure the SVG cell size by inspecting the parent grid's computed track sizes. */
function svgCellSize(svgNode){
  const parent = svgNode.parentNode;
  const cs = getComputedStyle(parent);
  // grid-template-columns / -rows are space-separated px values when the layout is computed
  const colTracks = cs.gridTemplateColumns.split(/\s+/).map(parseFloat).filter(v=>isFinite(v));
  const rowTracks = cs.gridTemplateRows.split(/\s+/).map(parseFloat).filter(v=>isFinite(v));
  // Locate which cell THIS svg occupies (by index among children → cell indices)
  const idx = Array.from(parent.children).indexOf(svgNode);
  const cols = Math.max(1, colTracks.length);
  const rows = Math.max(1, rowTracks.length);
  const colI = idx % cols;
  const rowI = Math.floor(idx / cols);
  const colW = colTracks[colI] || 0;
  const rowH = rowTracks[rowI] || 0;
  const W = Math.max(80, Math.round(colW - 2));
  const H = Math.max(60, Math.round(rowH - 2));
  svgNode.setAttribute("width",  W);
  svgNode.setAttribute("height", H);
  return { W, H };
}

/* Smooth a typed array with the current IMG_FLAGS.smoothing FWHM (same pixel scale as imshow). */
function smoothCurve(arr){
  const sigma = (IMG_FLAGS.smoothing || 0) / 2.355;
  if (sigma < 0.5) return arr;
  return gaussConv1D(arr instanceof Float64Array ? arr : new Float64Array(arr), sigma);
}

/* Draw a single-line+stack curve on its own SVG, with x-axis using `xValues`.
   viewBox is set to the SVG's actual rendered pixel size to avoid scaling glitches. */
function drawCurveSvg(svgId, single, stack, xValues, title, xLabel, redrawFn){
  const svg = d3.select("#"+svgId);
  svg.selectAll("*").remove();
  const sz = svgCellSize(svg.node());
  const W = sz.W, H = sz.H;
  svg.attr("viewBox", `0 0 ${W} ${H}`).attr("preserveAspectRatio","none");
  const m = {l:38,r:8,t:16,b:22};

  // Apply smoothing before computing domains or drawing
  const singleS = smoothCurve(single);
  const stackS  = smoothCurve(stack);

  // Natural domain = full xValues range; zoomed domain overrides if user scrolled
  const xNatLo = xValues[0], xNatHi = xValues[xValues.length-1];
  const [xLo, xHi] = getZoomDomain(svgId, xNatLo, xNatHi);
  // Index range covered by [xLo, xHi]
  let iLo = 0, iHi = xValues.length-1;
  for (let i=0;i<xValues.length;i++){ if (xValues[i] >= xLo){ iLo = Math.max(0, i-1); break; } }
  for (let i=xValues.length-1;i>=0;i--){ if (xValues[i] <= xHi){ iHi = Math.min(xValues.length-1, i+1); break; } }
  // Y range computed only over the visible window for autoscale
  let yMin = Infinity, yMax = -Infinity;
  for (let i=iLo;i<=iHi;i++){
    if (isFinite(singleS[i])){ if (singleS[i]<yMin) yMin=singleS[i]; if (singleS[i]>yMax) yMax=singleS[i]; }
    if (isFinite(stackS[i])){  if (stackS[i]<yMin)  yMin=stackS[i];  if (stackS[i]>yMax)  yMax=stackS[i]; }
  }
  if (!isFinite(yMin)){ yMin = 0; yMax = 1; }
  const yNatLo = yMin, yNatHi = yMax;
  const [yLo, yHi] = getZoomDomainY(svgId, yNatLo, yNatHi);
  const xs = d3.scaleLinear().domain([xLo, xHi]).range([m.l, W-m.r]);
  const ys = d3.scaleLinear().domain([yLo, yHi]).range([H-m.b, m.t]);
  svg.append("g").attr("class","plot-axis").attr("transform",`translate(0,${H-m.b})`).call(d3.axisBottom(xs).ticks(4).tickFormat(d3.format(".3~g")));
  svg.append("g").attr("class","plot-axis").attr("transform",`translate(${m.l},0)`).call(d3.axisLeft(ys).ticks(3).tickFormat(d3.format(".2~g")));
  const line = d3.line()
    .defined((_,i)=> xValues[i] >= xLo && xValues[i] <= xHi)
    .x((_,i)=>xs(xValues[i])).y(v=>ys(v));
  svg.append("path").datum(Array.from(singleS)).attr("fill","none").attr("stroke","#888").attr("stroke-opacity",0.5).attr("stroke-width",3.0).attr("d", line);
  svg.append("path").datum(Array.from(stackS)).attr("fill","none").attr("stroke", cssVar("--plot-curve","#000")).attr("stroke-width",3.2).attr("d", line);
  svg.append("text").attr("x", W-m.r-4).attr("y", m.t+10).attr("text-anchor","end").attr("class","ax-title").text(title);
  // x-label sits just ABOVE the axis on the right (between curves and the axis line)
  svg.append("text").attr("x", W-m.r-4).attr("y", H-m.b-4).attr("text-anchor","end")
    .style("font-size","10px").style("fill","var(--plot-axis-text,#444)").style("font-style","italic").text(xLabel);
  // Tiny zoom badge when active
  if (STATE.subplotZoom[svgId]){
    svg.append("text").attr("x", m.l+4).attr("y", m.t+10).attr("class","legend")
      .style("fill","var(--accent-2,#E24A33)").text("⊕ zoom — dbl-click to reset");
  }
  // Remember the plotting domain for the drag-zoom handler + attach once
  STATE._lastDomain[svgId] = { used:[xLo, xHi], natural:[xNatLo, xNatHi], margin: m,
    usedY:[yLo, yHi], naturalY:[yNatLo, yNatHi] };
  if (redrawFn) attachSubplotZoom(svgId, redrawFn);
}

function drawProfiles(sim){
  const prof = computeProfiles(sim);
  // x-axis values: spectral in Å (sim.wavelengths), spatial in arcsec offset from slit centre
  const yValsArcsec = new Float64Array(sim.H);
  for (let j=0;j<sim.H;j++) yValsArcsec[j] = (j - sim.H/2) * sim.yPhys_per_pix;
  const redraw = ()=> drawProfiles(sim);
  drawCurveSvg("svg-prof-spec", prof.specS, prof.specK, sim.wavelengths, "Spectral profile (single grey, stack black)", "λ [Å]", redraw);
  drawCurveSvg("svg-prof-spat", prof.spatS, prof.spatK, yValsArcsec,    "Spatial profile",  "spatial offset [″]", redraw);
}

function drawOptics(sim, pa){
  const svg = d3.select("#svg-optics");
  svg.selectAll("*").remove();
  const sz = svgCellSize(svg.node());
  const W = sz.W, H = sz.H;
  svg.attr("viewBox", `0 0 ${W} ${H}`).attr("preserveAspectRatio","none");
  const m = {l:38, r:8, t:14, b:22};

  const xNatLo = sim.wavelengths[0], xNatHi = sim.wavelengths[sim.W-1];
  const [xLo, xHi] = getZoomDomain("svg-optics", xNatLo, xNatHi);
  const xs = d3.scaleLinear().domain([xLo, xHi]).range([m.l, W-m.r]);
  const ys = d3.scaleLinear().domain([0, 1.25]).range([H-m.b, m.t]);
  // Stash + attach zoom handler (idempotent)
  STATE._lastDomain["svg-optics"] = { used:[xLo, xHi], natural:[xNatLo, xNatHi], margin: m };
  attachSubplotZoom("svg-optics", ()=> drawOptics(sim, pa));
  if (STATE.subplotZoom["svg-optics"]){
    svg.append("text").attr("x", m.l+4).attr("y", m.t+10).attr("class","legend")
      .style("fill","var(--accent-2,#E24A33)").text("⊕ zoom — dbl-click to reset");
  }

  svg.append("g").attr("class","plot-axis").attr("transform",`translate(0,${H-m.b})`).call(d3.axisBottom(xs).ticks(4).tickFormat(d3.format(".0f")));
  svg.append("g").attr("class","plot-axis").attr("transform",`translate(${m.l},0)`).call(d3.axisLeft(ys).ticks(4));

  // Throughput (blue)
  svg.append("path").datum(Array.from(sim.throughputCurve))
    .attr("fill","none").attr("stroke","#348ABD").attr("stroke-width",3.5)
    .attr("d", d3.line().x((_,i)=>xs(sim.wavelengths[i])).y(v=>ys(v)));
  // Atmosphere (red)
  svg.append("path").datum(Array.from(sim.atmCurve))
    .attr("fill","none").attr("stroke","#E24A33").attr("stroke-width",3.0)
    .attr("d", d3.line().x((_,i)=>xs(sim.wavelengths[i])).y(v=>ys(v)));
  // Sky lines (orange) — subtract the continuum baseline (1) then normalise to peak for display
  if (sim.skyLineMult){
    let pk = 0;
    for (let i=0;i<sim.W;i++){ const v = sim.skyLineMult[i]-1; if (v>pk) pk = v; }
    if (pk > 0){
      svg.append("path").datum(Array.from(sim.skyLineMult).map(v => (v-1)/pk))
        .attr("fill","none").attr("stroke","#FBC15E").attr("stroke-width",2.5)
        .attr("d", d3.line().x((_,i)=>xs(sim.wavelengths[i])).y(v=>ys(v)));
    }
  }
  // Spectral profile of the source (themeable)
  if (sim.spectralProfile){
    let pk = 0;
    for (let i=0;i<sim.W;i++) if (sim.spectralProfile[i]>pk) pk = sim.spectralProfile[i];
    if (pk>0){
      svg.append("path").datum(Array.from(sim.spectralProfile).map(v => v/pk))
        .attr("fill","none").attr("stroke", cssVar("--plot-curve-2","#777")).attr("stroke-width",2.5).attr("stroke-dasharray","3 2")
        .attr("d", d3.line().x((_,i)=>xs(sim.wavelengths[i])).y(v=>ys(v)));
    }
  }

  // Title at top-right: which curves are actually used
  const titleParts = [];
  if (sim.sourceInfo_throughput) titleParts.push(`TH: ${sim.sourceInfo_throughput}`);
  if (sim.sourceInfo_atm)        titleParts.push(`Atm: ${sim.sourceInfo_atm}`);
  svg.append("text").attr("x", W-m.r-4).attr("y", m.t+10).attr("text-anchor","end").attr("class","ax-title")
    .text(titleParts.join(" — "));
  // x-label just above the x-axis on the right
  svg.append("text").attr("x", W-m.r-4).attr("y", H-m.b-4).attr("text-anchor","end")
    .style("font-size","10px").style("fill","var(--plot-axis-text,#444)").style("font-style","italic").text("λ [Å]");
  // Legend items placed in the headroom above y=1.0 (two columns, left side)
  const items = [
    {n:"Throughput", c:"#348ABD"},
    {n:"Atm trans",  c:"#E24A33"},
    {n:"Sky lines",  c:"#FBC15E"},
    {n:"Source spec",c:"#777"}
  ];
  const legY0 = ys(1.22);  // top row, well inside the headroom band
  const legY1 = ys(1.10);  // bottom row
  const col = [m.l+4, m.l+4+80];
  [[items[0], items[1]], [items[2], items[3]]].forEach((pair, row)=>{
    const y = row === 0 ? legY0 : legY1;
    pair.forEach((it, col_i)=>{
      const x = col[col_i];
      svg.append("rect").attr("x", x).attr("y", y-7).attr("width",8).attr("height",8).attr("fill",it.c);
      svg.append("text").attr("x", x+11).attr("y", y).attr("class","legend").text(it.n);
    });
  });
}

function drawHistogram(sim){
  const svg = d3.select("#svg-hist");
  svg.selectAll("*").remove();
  const sz = svgCellSize(svg.node());
  const W = sz.W, H = sz.H;
  svg.attr("viewBox", `0 0 ${W} ${H}`).attr("preserveAspectRatio","none");
  const m = {l:36,r:8,t:16,b:20};
  const nBins = 60;

  // Use the union range
  function buildHist(arr, vmin, vmax){
    const h = new Int32Array(nBins);
    const range = vmax - vmin || 1;
    for (let k=0;k<arr.length;k++){
      const v = arr[k]; if (!isFinite(v)) continue;
      const bi = Math.max(0, Math.min(nBins-1, Math.floor((v-vmin)/range * nBins)));
      h[bi]++;
    }
    return h;
  }
  const vminN = Math.min(percentile(sim.single, 0.01), percentile(sim.stack, 0.01));
  const vmaxN = Math.max(percentile(sim.single, 0.99), percentile(sim.stack, 0.99));
  const [vmin, vmax] = getZoomDomain("svg-hist", vminN, vmaxN);
  const hS = buildHist(sim.single, vmin, vmax);
  const hK = buildHist(sim.stack,  vmin, vmax);
  const yMax = Math.max(d3.max(hS), d3.max(hK)) || 1;

  const ylog = document.getElementById("ylog").classList.contains("on");
  const xs = d3.scaleLinear().domain([vmin, vmax]).range([m.l, W-m.r]);
  STATE._lastDomain["svg-hist"] = { used:[vmin, vmax], natural:[vminN, vmaxN], margin: m };
  attachSubplotZoom("svg-hist", ()=> drawHistogram(sim));
  if (STATE.subplotZoom["svg-hist"]){
    svg.append("text").attr("x", m.l+4).attr("y", m.t+10).attr("class","legend")
      .style("fill","var(--accent-2,#E24A33)").text("⊕ zoom — dbl-click to reset");
  }
  // Log y when ylog is on (bin counts >=0, so clamp lower bound to 1).
  let ys, yBaselinePx;
  if (ylog && yMax > 1){
    ys = d3.scaleLog().domain([1, yMax]).range([H-m.b, m.t]);
    yBaselinePx = H - m.b;   // bottom of axis = y=1
  } else {
    ys = d3.scaleLinear().domain([0, yMax]).range([H-m.b, m.t]);
    yBaselinePx = ys(0);
  }
  const yFmt = d3.format(".1~e");  // scientific 1 significant digit (e.g. "5e+4")
  svg.append("g").attr("class","plot-axis").attr("transform",`translate(0,${H-m.b})`).call(d3.axisBottom(xs).ticks(5));
  svg.append("g").attr("class","plot-axis").attr("transform",`translate(${m.l},0)`)
    .call(d3.axisLeft(ys).ticks(3).tickFormat(yFmt));

  function plotBars(h, color, opacity){
    const bw = (W-m.l-m.r)/nBins;
    for (let i=0;i<nBins;i++){
      // For ylog: ignore zero bins (scaleLog(0) is -Infinity)
      if (ylog && yMax>1 && h[i] < 1) continue;
      const yTop = ys(h[i] || (ylog ? 1 : 0));
      svg.append("rect")
        .attr("x", m.l + i*bw).attr("y", yTop)
        .attr("width", Math.max(1, bw-0.5))
        .attr("height", Math.max(0, yBaselinePx - yTop))
        .attr("fill", color).attr("fill-opacity", opacity);
    }
  }
  plotBars(hS, "#888", 0.5);
  plotBars(hK, cssVar("--plot-curve","#000"), 0.7);
  svg.append("text").attr("x", W-m.r-4).attr("y", m.t+10).attr("text-anchor","end").attr("class","ax-title").text("Pixel value histogram (single grey, stack curve)");
  // x-label top-right above the panel (not below — overlaps tick labels)
  svg.append("text").attr("x", W-m.r-4).attr("y", H-m.b-4).attr("text-anchor","end")
    .style("font-size","10px").style("fill","var(--plot-axis-text,#444)").style("font-style","italic").text("Pixel value [e-]");
}

/* ============================================================================
   IFS VIEW
   ========================================================================== */
// State for the draggable extraction rectangle (in cube spaxel/spatial coords).
// Defaults to a small box centred on the source position; user can drag it.
const IFS_STATE = {
  rect: null,            // {x1, x2, y1, y2} in cube indices; null = use default centred small box
  cube: null,            // Float64Array(H * W * n3) — single
  cube_stack: null,      // same shape — stacked
  H: 0, W: 0, n3: 0,
  wavelengths: null,     // Float64Array(W) Å
  lambda_center: null    // Å — null = use middle of the detector spectral range
};

/* Shared helper: build the 1D spaxel-direction PSF (sum-normalised) used by all IFS cube builders. */
function _ifsSpaxelPsf(pa, n3){
  const sigma_x_spx = Math.max(0.3, Math.sqrt(pa.Size_source**2 + pa.PSF_RMS_det**2) / Math.max(0.001, pa.Slitwidth));
  const cx = n3 / 2;
  const psf = new Float64Array(n3);
  let s = 0;
  for (let k=0;k<n3;k++){ const dx=(k-cx)/sigma_x_spx; psf[k]=Math.exp(-0.5*dx*dx); s+=psf[k]; }
  if (s>0) for (let k=0;k<n3;k++) psf[k]/=s;
  return psf;
}

/* Source mode: noiseless cube, no Poisson. convolved=false → raw source × spaxel PSF.
   convolved=true  → additionally bin by slicer width (matches Observation.py "Convolved source"). */
function buildIfsCubeSource(sim, pa, n3, convolved){
  const H=sim.H, W=sim.W;
  const cube = new Float64Array(H*W*n3);
  const spatPsf1D = _ifsSpaxelPsf(pa, n3);

  // Fill noiseless signal
  for (let j=0;j<H;j++)
    for (let k=0;k<n3;k++)
      for (let i=0;i<W;i++)
        cube[(j*W+i)*n3+k] = Math.max(0, sim.source[j*W+i]) * spatPsf1D[k];

  if (!convolved) return cube;

  // Convolved: bin along the spaxel axis by reduction = Slitwidth/pixel_scale (same as Observation.py)
  const reduction = Math.max(1, pa.Slitwidth / pa.pixel_scale);
  const newN3 = Math.max(1, Math.floor(n3 / reduction));
  const binned = new Float64Array(H * W * newN3);
  for (let j=0;j<H;j++){
    for (let i=0;i<W;i++){
      for (let b=0;b<newN3;b++){
        let s=0, cnt=0;
        const k0=Math.floor(b*reduction), k1=Math.min(n3, Math.floor((b+1)*reduction));
        for (let k=k0;k<k1;k++){ s+=cube[(j*W+i)*n3+k]; cnt++; }
        binned[(j*W+i)*newN3+b] = cnt>0 ? s/cnt : 0;
      }
    }
  }
  // Repack into original n3 layout (repeat bins) so callers see same shape
  const out = new Float64Array(H*W*n3);
  for (let j=0;j<H;j++)
    for (let i=0;i<W;i++)
      for (let k=0;k<n3;k++){
        const b = Math.min(newN3-1, Math.floor(k/reduction));
        out[(j*W+i)*n3+k] = binned[(j*W+i)*newN3+b];
      }
  return out;
}

/* SNR mode: per-voxel SNR = signal / sqrt(signal + bg + RN²).
   stack=true multiplies SNR by sqrt(N_stack). */
function buildIfsCubeSNR(sim, pa, n3, stack){
  const H=sim.H, W=sim.W;
  const cube = new Float64Array(H*W*n3);
  const spatPsf1D = _ifsSpaxelPsf(pa, n3);
  const skyRate  = sim.sky_e_per_pix_per_exp;
  const darkRate = sim.dark_per_pix_per_exp;
  const extraRate= sim.extra_per_pix_per_exp;
  const RN       = pa.RN;
  const Nst      = sim.N_stack;
  const sqrtNst  = (stack && Nst>0) ? Math.sqrt(Nst) : 1;

  const slitLen_px = pa.Slitlength / pa.pixel_scale;
  const jSlitLo = Math.max(0, Math.floor(H/2 - slitLen_px/2));
  const jSlitHi = Math.min(H, Math.ceil(H/2 + slitLen_px/2));

  for (let j=0;j<H;j++){
    const inSlit = (j>=jSlitLo && j<jSlitHi);
    for (let k=0;k<n3;k++){
      const sp = spatPsf1D[k];
      for (let i=0;i<W;i++){
        const sig = Math.max(0, sim.source[j*W+i]) * sp;
        const bg  = (inSlit ? skyRate : 0) + darkRate + extraRate;
        const noise2 = sig + bg + RN*RN;
        cube[(j*W+i)*n3+k] = noise2>0 ? sig/Math.sqrt(noise2) * sqrtNst : 0;
      }
    }
  }
  return cube;
}

/* Build an IFS cube matching Python's approach:
   - The noiseless source signal per voxel (j, i, k) = sim.source[j,i] * spatPsf1D[k]
     where spatPsf1D is a 1D Gaussian in the spaxel direction (sum-normalised to 1).
     This ensures Σ_k cube_source[j,i,k] = sim.source[j,i], i.e. total signal in any
     (j,i) column = same as the 2D detector image — matching Python's np.repeat approach
     while adding physically correct spaxel-direction PSF structure.
   - Background (sky + dark + extra) is added uniformly per voxel.
   - Poisson + EMCCD + RN noise applied per voxel.
   `stack=true` divides by Nst after Poisson(λ × Nst). */
function buildIfsCubeFromModel(sim, pa, n3, seed, stack){
  const H = sim.H, W = sim.W;
  const cube = new Float64Array(H * W * n3);
  const rng  = makeRng(seed >>> 0);
  const norm = makeNormal(rng);
  const pois = makePoisson(rng);
  const gam  = makeGamma(rng, norm);

  const skyRate   = sim.sky_e_per_pix_per_exp;
  const darkRate  = sim.dark_per_pix_per_exp;
  const extraRate = sim.extra_per_pix_per_exp;
  const EM_gain   = pa.EM_gain;
  const CIC       = pa.CIC_charge;
  const RN        = pa.RN;
  const Nst       = sim.N_stack;

  // 1D spaxel-direction PSF (sum-normalised so Σ_k = 1)
  const sigma_x_spx = Math.max(0.3, Math.sqrt(pa.Size_source*pa.Size_source + pa.PSF_RMS_det*pa.PSF_RMS_det) / Math.max(0.001, pa.Slitwidth));
  const cx = n3 / 2;
  const spatPsf1D = new Float64Array(n3);
  let psfSum = 0;
  for (let k=0;k<n3;k++){
    const dx = (k - cx) / sigma_x_spx;
    spatPsf1D[k] = Math.exp(-0.5*dx*dx);
    psfSum += spatPsf1D[k];
  }
  if (psfSum > 0) for (let k=0;k<n3;k++) spatPsf1D[k] /= psfSum;

  // Slit mask for sky gating
  const slitLen_px = pa.Slitlength / pa.pixel_scale;
  const jSlitLo = Math.max(0, Math.floor(H/2 - slitLen_px/2));
  const jSlitHi = Math.min(H, Math.ceil(H/2 + slitLen_px/2));

  // Fill the cube — source amplitude from sim.source (noiseless 2D image, e-/pix/exp)
  for (let j=0;j<H;j++){
    const inSlit = (j >= jSlitLo && j < jSlitHi);
    for (let k=0;k<n3;k++){
      const sp = spatPsf1D[k];
      // Background per voxel per exposure (sky gated by slit; dark+extra everywhere)
      const bg = (inSlit ? skyRate : 0) + darkRate + extraRate;
      for (let i=0;i<W;i++){
        const sourceRate = Math.max(0, sim.source[j*W + i]) * sp;
        // λ-dependent voxel rate
        const lam = (stack ? (sourceRate + bg)*Nst : sourceRate + bg);
        let s;
        if (stack && Nst <= 0){
          s = 0;
        } else {
          s = pois(lam);
          if (EM_gain > 1){
            if (stack){
              const cic_sum = pois(CIC * Nst);
              if (s + cic_sum > 0) s = gam(s + cic_sum, EM_gain) / Nst;
              else s = 0;
            } else {
              if (rng() < CIC) s += 1;
              if (s > 0) s = gam(s, EM_gain);
            }
          } else {
            if (stack) s = s / Nst;
          }
          s += norm(0, stack ? RN/Math.sqrt(Nst) : RN);
        }
        cube[(j*W + i)*n3 + k] = s;
      }
    }
  }
  return cube;
}

/* Take a λ-slice from the cube: mean over (col_lo .. col_hi) in W → returns (H × n3) Float64Array */
function ifsSlice(cube, H, W, n3, colLo, colHi){
  const out = new Float64Array(H * n3);
  const denom = Math.max(1, colHi - colLo);
  for (let j=0;j<H;j++){
    for (let k=0;k<n3;k++){
      let s = 0;
      for (let i=colLo;i<colHi;i++){
        s += cube[(j*W + i)*n3 + k];
      }
      out[j*n3 + k] = s/denom;
    }
  }
  return out;
}

/* Integrated spectrum: mean over a (x1..x2 in n3, y1..y2 in H) box, returns Float64Array(W).
   Mean (not sum) matches Python's np.nanmean(ifs_cube[y1:y2, :, x1:x2], axis=(0,2)). */
function ifsIntegratedSpectrum(cube, H, W, n3, x1, x2, y1, y2){
  x1 = Math.max(0, Math.floor(x1)); x2 = Math.min(n3, Math.ceil(x2));
  y1 = Math.max(0, Math.floor(y1)); y2 = Math.min(H, Math.ceil(y2));
  if (x2<=x1) x2 = x1+1;
  if (y2<=y1) y2 = y1+1;
  const out = new Float64Array(W);
  const denom = Math.max(1, (x2-x1)*(y2-y1));
  for (let i=0;i<W;i++){
    let s = 0;
    for (let j=y1;j<y2;j++){
      for (let k=x1;k<x2;k++){
        s += cube[(j*W + i)*n3 + k];
      }
    }
    out[i] = s / denom;
  }
  return out;
}

function drawIfsView(){
  // Resimulate the 2D image (same as Spectro image view)
  const pa = {};
  for (const k of Object.keys(PARAMS)) pa[k] = STATE.values[k];
  applyDependenciesScalar(pa);
  pa.Signal_in = pa.Signal;
  pa.IFS = FLAGS.IFS; pa.spectrograph = FLAGS.spectrograph; pa.counting_mode = FLAGS.counting_mode;
  pa.atmlambda = IMG_FLAGS.atmlambda; pa.QElambda = IMG_FLAGS.QElambda;
  pa.sky_lines = IMG_FLAGS.sky_lines; pa.source_im = IMG_FLAGS.source_im;
  pa.spectrum = IMG_FLAGS.spectrum; pa.atm_kind = IMG_FLAGS.atm_kind; pa.sky_kind = IMG_FLAGS.sky_kind;
  pa.source_shape = IMG_FLAGS.source_shape; pa.bar_angle = IMG_FLAGS.bar_angle;
  pa.Redshift = (STATE.fetchedSpectrum && IMG_FLAGS.spectrum === STATE.fetchedSpectrum.name)
    ? STATE.fetchedSpectrum.redshift
    : (STATE.values.Redshift || 0);
  pa.W = 500; pa.H = 100;
  STATE.imgSeed = (STATE.imgSeed + 1) >>> 0;
  pa.seed = STATE.imgSeed;
  let sim;
  try { sim = simulateImage(pa); }
  catch(e){ d3.select("#status").classed("err",true).text("Image sim error: "+e.message); console.error(e); return; }

  // Compute n3 = √(60×60×FOV_size) / Slitwidth   (FOV_size in arcmin²)
  const FOV_size = STATE.instrument_FOV_size || 100;   // fallback if missing
  let n3 = Math.max(2, Math.round(Math.sqrt(60*60*FOV_size) / Math.max(0.01, pa.Slitwidth)));
  // Cap n3 to keep the cube tractable (cap is purely a UI/memory limit, not physical)
  n3 = Math.min(n3, 80);

  // Build cubes — mode-aware (mirrors Observation.py source_image handling)
  const ifsMode = IMG_FLAGS.source_im || "Sim image";
  let cube, cubeK;

  if (ifsMode === "Source"){
    // Noiseless source, no PSF convolution beyond what sim.source already has
    cube  = buildIfsCubeSource(sim, pa, n3, /*convolved*/false);
    cubeK = cube;
  } else if (ifsMode === "Convolved source"){
    // Source convolved with spaxel PSF + slicer binning, no noise
    cube  = buildIfsCubeSource(sim, pa, n3, /*convolved*/true);
    cubeK = cube;
  } else if (ifsMode === "SNR"){
    // Per-voxel SNR map: signal / sqrt(signal + bg + RN²)
    cube  = buildIfsCubeSNR(sim, pa, n3, /*stack*/false);
    cubeK = buildIfsCubeSNR(sim, pa, n3, /*stack*/true);
  } else {
    // "Sim image" — full Poisson + EMCCD + RN realisation
    cube  = buildIfsCubeFromModel(sim, pa, n3, pa.seed^0xA5A5, /*stack*/false);
    cubeK = buildIfsCubeFromModel(sim, pa, n3, pa.seed^0x5A5A, /*stack*/true);
  }
  IFS_STATE.cube = cube; IFS_STATE.cube_stack = cubeK;
  IFS_STATE.H = sim.H; IFS_STATE.W = sim.W; IFS_STATE.n3 = n3;
  IFS_STATE.wavelengths = sim.wavelengths;

  // λ slice: ±lambda_stack/2 around the cursor column (set by IFS_STATE.lambda_center, default = central λ)
  if (IFS_STATE.lambda_center == null){
    IFS_STATE.lambda_center = sim.wavelengths[Math.floor(sim.W/2)];
  }
  // Clamp lambda_center to the detector's spectral range (so a wavelength slider change is followed)
  IFS_STATE.lambda_center = Math.max(sim.wavelengths[0], Math.min(sim.wavelengths[sim.W-1], IFS_STATE.lambda_center));
  // Find the column matching the requested λ
  const colC = Math.max(0, Math.min(sim.W-1, Math.round((IFS_STATE.lambda_center - sim.wavelengths[0]) / (sim.wavelengths[sim.W-1]-sim.wavelengths[0]) * (sim.W-1))));
  const lstk = Math.max(1, Math.round(pa.lambda_stack || 1));
  const colLo = Math.max(0, colC - Math.floor(lstk/2));
  const colHi = Math.min(sim.W, colC + Math.ceil(lstk/2));
  const sliceSingle = ifsSlice(cube,  sim.H, sim.W, n3, colLo, colHi);
  const sliceStack  = ifsSlice(cubeK, sim.H, sim.W, n3, colLo, colHi);

  // Default extraction rectangle: small box around the centre of the slicer
  if (!IFS_STATE.rect){
    const rh = Math.max(2, Math.round(sim.H * 0.1));
    const rw = Math.max(2, Math.round(n3   * 0.1));
    IFS_STATE.rect = { x1: n3/2 - rw/2, x2: n3/2 + rw/2, y1: sim.H/2 - rh/2, y2: sim.H/2 + rh/2 };
  }

  // Render slices on canvases via the bias/contrast aware path (so DS9 drag works on IFS too)
  const vminS = percentile(sliceSingle, 0.01), vmaxS = percentile(sliceSingle, 0.99);
  const vminK = percentile(sliceStack,  0.01), vmaxK = percentile(sliceStack,  0.99);
  STATE.imgCacheIfs = {
    single: sliceSingle, stack: sliceStack,
    W: n3, H: sim.H,
    vmin0: { single: vminS, stack: vminK },
    vmax0: { single: vmaxS, stack: vmaxK },
    ylog: false
  };
  applyColorScale("ifs_single");
  applyColorScale("ifs_stack");
  attachImageColorscaleDrag();
  attachIfsHover();

  // Titles
  document.getElementById("ifs-single-title").textContent =
    `Single cube — λ slice (${sim.H} × ${n3} spaxels, λ ≈ ${sim.wavelengths[colC].toFixed(1)} Å ± ${(lstk/2*pa.dispersion).toFixed(2)} Å)`;
  document.getElementById("ifs-stack-title").textContent =
    `Stacked cube — λ slice (${sim.H} × ${n3} spaxels, full FOV = ${Math.sqrt(FOV_size).toFixed(1)}′ × ${Math.sqrt(FOV_size).toFixed(1)}′)`;

  // Draw the draggable rectangle overlay on the stacked slice
  drawIfsRect();

  // Integrated spectrum
  drawIfsSpectrum();
}

function drawIfsRect(){
  const r = IFS_STATE.rect; if (!r) return;
  const svg = d3.select("#ov-ifs-stack");
  svg.selectAll("*").remove();
  svg.attr("viewBox", `0 0 ${IFS_STATE.n3} ${IFS_STATE.H}`);
  // The SVG itself lets pointer events through to the canvas underneath (so the DS9 colormap drag works);
  // only the rectangle catches events, for the rect-drag handler.
  svg.style("pointer-events", "none");
  svg.append("rect")
    .attr("class", "ifs-rect")
    .attr("x", r.x1).attr("y", r.y1)
    .attr("width", r.x2 - r.x1).attr("height", r.y2 - r.y1)
    .attr("fill", "none").attr("stroke", "#e44")
    .attr("stroke-width", 1.5)
    .attr("vector-effect", "non-scaling-stroke")
    .style("pointer-events", "stroke");
}

function drawIfsSpectrum(){
  const svg = d3.select("#svg-ifs-spec");
  svg.selectAll("*").remove();
  const sz = svgCellSize(svg.node());
  const W = sz.W, H = sz.H;
  svg.attr("viewBox", `0 0 ${W} ${H}`).attr("preserveAspectRatio","none");
  const m = {l:42,r:8,t:16,b:24};

  const r = IFS_STATE.rect;
  if (!r || !IFS_STATE.cube) return;
  const specSingle = smoothCurve(ifsIntegratedSpectrum(IFS_STATE.cube,       IFS_STATE.H, IFS_STATE.W, IFS_STATE.n3, r.x1, r.x2, r.y1, r.y2));
  const specStack  = smoothCurve(ifsIntegratedSpectrum(IFS_STATE.cube_stack, IFS_STATE.H, IFS_STATE.W, IFS_STATE.n3, r.x1, r.x2, r.y1, r.y2));

  const xValues = IFS_STATE.wavelengths;
  const xNatLo = xValues[0], xNatHi = xValues[xValues.length-1];
  const [xLo, xHi] = getZoomDomain("svg-ifs-spec", xNatLo, xNatHi);
  // Y autoscale over visible window only
  let yMin = Infinity, yMax = -Infinity;
  for (let i=0;i<xValues.length;i++){
    if (xValues[i] < xLo || xValues[i] > xHi) continue;
    if (isFinite(specSingle[i])){ if (specSingle[i]<yMin) yMin=specSingle[i]; if (specSingle[i]>yMax) yMax=specSingle[i]; }
    if (isFinite(specStack[i])){  if (specStack[i]<yMin)  yMin=specStack[i];  if (specStack[i]>yMax)  yMax=specStack[i]; }
  }
  if (!isFinite(yMin)){ yMin = 0; yMax = 1; }
  const yNatLo = yMin, yNatHi = yMax;
  const [yLo, yHi] = getZoomDomainY("svg-ifs-spec", yNatLo, yNatHi);
  const xs = d3.scaleLinear().domain([xLo, xHi]).range([m.l, W-m.r]);
  const ys = d3.scaleLinear().domain([yLo, yHi]).range([H-m.b, m.t]);
  STATE._lastDomain["svg-ifs-spec"] = { used:[xLo, xHi], natural:[xNatLo, xNatHi], margin: m,
    usedY:[yLo, yHi], naturalY:[yNatLo, yNatHi] };
  attachSubplotZoom("svg-ifs-spec", ()=> drawIfsSpectrum());
  svg.append("g").attr("class","plot-axis").attr("transform",`translate(0,${H-m.b})`).call(d3.axisBottom(xs).ticks(4).tickFormat(d3.format(".3~g")));
  svg.append("g").attr("class","plot-axis").attr("transform",`translate(${m.l},0)`).call(d3.axisLeft(ys).ticks(3).tickFormat(d3.format(".2~g")));
  const line = d3.line()
    .defined((_,i)=> xValues[i] >= xLo && xValues[i] <= xHi)
    .x((_,i)=>xs(xValues[i])).y(v=>ys(v));
  svg.append("path").datum(Array.from(specSingle)).attr("fill","none").attr("stroke","#888").attr("stroke-opacity",0.5).attr("stroke-width",3.0).attr("d", line);
  svg.append("path").datum(Array.from(specStack)).attr("fill","none").attr("stroke", cssVar("--plot-curve","#000")).attr("stroke-width",3.2).attr("d", line);
  if (STATE.subplotZoom["svg-ifs-spec"]){
    svg.append("text").attr("x", m.l+50).attr("y", m.t+10).attr("class","legend")
      .style("fill","var(--accent-2,#E24A33)").text("⊕ zoom — dbl-click to reset");
  }
  svg.append("text").attr("x", W-m.r-4).attr("y", m.t+10).attr("text-anchor","end").attr("class","ax-title")
    .text(`Integrated spectrum over [${r.x1.toFixed(0)}..${r.x2.toFixed(0)}] × [${r.y1.toFixed(0)}..${r.y2.toFixed(0)}] — drag the red line to slice at another λ.`);
  // x-label top-right above the panel (avoids overlap with bottom ticks)
  svg.append("text").attr("x", W-m.r-4).attr("y", H-m.b-4).attr("text-anchor","end")
    .style("font-size","10px").style("fill","var(--plot-axis-text,#444)").style("font-style","italic").text("λ [Å]");

  // ----- Draggable vertical λ cursor + lambda_stack band -----
  const lc = IFS_STATE.lambda_center;
  if (lc != null){
    const xPos = xs(lc);
    // Translucent band of half-width = lambda_stack/2 spectral pixels (= lambda_stack/2 × dispersion Å).
    // This visualises the spectral window over which the cube is integrated to form the imshow slice.
    const lstkPix = Math.max(1, Math.round(STATE.values.lambda_stack || 1));
    const dispA   = STATE.values.dispersion || 1;
    const halfWidA = (lstkPix/2) * dispA;
    const xLo = xs(Math.max(IFS_STATE.wavelengths[0],                 lc - halfWidA));
    const xHi = xs(Math.min(IFS_STATE.wavelengths[IFS_STATE.W-1],     lc + halfWidA));
    if (xHi - xLo > 1){
      svg.append("rect").attr("class","ifs-lambda-band")
        .attr("x", xLo).attr("y", m.t).attr("width", xHi-xLo).attr("height", H-m.b-m.t)
        .attr("fill", "#E24A33").attr("fill-opacity", 0.18)
        .style("pointer-events","none");
    }
    // Main vertical line
    svg.append("line").attr("class","ifs-lambda-line")
      .attr("x1", xPos).attr("x2", xPos).attr("y1", m.t).attr("y2", H-m.b)
      .attr("stroke", "#E24A33").attr("stroke-width", 1.6);
    // Two small arrow heads at top of the line (left/right) for affordance
    const arrowY = m.t + 6;
    const arrowSize = 6;
    svg.append("polygon").attr("class","ifs-lambda-arrow")
      .attr("points", `${xPos-2},${arrowY} ${xPos-2-arrowSize},${arrowY-arrowSize/2} ${xPos-2-arrowSize},${arrowY+arrowSize/2}`)
      .attr("fill", "#E24A33");
    svg.append("polygon").attr("class","ifs-lambda-arrow")
      .attr("points", `${xPos+2},${arrowY} ${xPos+2+arrowSize},${arrowY-arrowSize/2} ${xPos+2+arrowSize},${arrowY+arrowSize/2}`)
      .attr("fill", "#E24A33");
    // Tag the wavelength
    svg.append("text").attr("x", xPos).attr("y", m.t-2).attr("text-anchor","middle")
      .style("font-size","10px").style("fill","#E24A33").style("font-weight","600")
      .text(`λ = ${lc.toFixed(1)} Å`);
    // Wide invisible hit area to make the line easy to grab
    svg.append("rect").attr("class","ifs-lambda-hit")
      .attr("x", xPos-7).attr("y", m.t).attr("width", 14).attr("height", H-m.b-m.t)
      .attr("fill", "transparent").style("cursor", "ew-resize")
      .on("mousedown", function(e){
        if (e.button !== 0 || e.ctrlKey) return;
        e.preventDefault(); e.stopPropagation();
        STATE._ifsLambdaDrag = { xs, m, W, dragging: true };
      });
  }
}

/* Global drag handlers for the λ cursor — bound once. */
/* Global drag handler for the SNR plot's vertical "current value" cursor.
   Dragging it updates STATE.values[STATE.xKey] (clamped to the parameter's slider range),
   syncs the slider, and re-renders the SNR view. */
function attachSnrXDrag(){
  if (STATE._snrXDragAttached) return;
  STATE._snrXDragAttached = true;
  const svgNode = document.getElementById("plot");
  window.addEventListener("mousemove", e => {
    const d = STATE._snrXDrag;
    if (!d || !d.dragging) return;
    const rect = svgNode.getBoundingClientRect();
    // SVG viewBox uses dim.w units across the full rect; map clientX → svgX in viewBox coords
    const svgX = (e.clientX - rect.left) * (d.dim.w / rect.width);
    const fx = (svgX - d.panel.x) / d.panel.w;
    if (!isFinite(fx)) return;
    const clamped = Math.max(0, Math.min(1, fx));
    let xVal;
    try { xVal = d.xScale.invert(clamped); }
    catch(err){ return; }
    if (!isFinite(xVal)) return;
    // Clamp to parameter range (slider min/max)
    const xKey = STATE.xKey;
    const p = PARAMS[xKey];
    if (!p) return;
    const vmin = p.log ? Math.pow(10, p.min) : p.min;
    const vmax = p.log ? Math.pow(10, p.max) : p.max;
    xVal = Math.max(vmin, Math.min(vmax, xVal));
    STATE.values[xKey] = xVal;
    syncSlider(xKey);
    if (!STATE._snrXPending){
      STATE._snrXPending = true;
      requestAnimationFrame(()=>{
        STATE._snrXPending = false;
        doUpdate();
      });
    }
  });
  window.addEventListener("mouseup", ()=> { if (STATE._snrXDrag) STATE._snrXDrag.dragging = false; });
}

function attachIfsLambdaDrag(){
  if (STATE._ifsLambdaDragAttached) return;
  STATE._ifsLambdaDragAttached = true;
  const svg = document.getElementById("svg-ifs-spec");
  window.addEventListener("mousemove", e => {
    const d = STATE._ifsLambdaDrag;
    if (!d || !d.dragging) return;
    const rect = svg.getBoundingClientRect();
    // Convert to viewBox coordinates: viewBox is 0..W with width = current measured cell width
    const fx = (e.clientX - rect.left) / rect.width;
    const xPx = fx * d.W;
    // Invert d3 linear scale: xs maps [λmin, λmax] → [m.l, W-m.r]
    const xMin = d.xs.range()[0], xMax = d.xs.range()[1];
    const f = Math.max(0, Math.min(1, (xPx - xMin) / (xMax - xMin)));
    const lamDomain = d.xs.domain();
    IFS_STATE.lambda_center = lamDomain[0] + f * (lamDomain[1] - lamDomain[0]);
    // Throttle the cube re-slice with RAF
    if (!STATE._ifsLambdaPending){
      STATE._ifsLambdaPending = true;
      requestAnimationFrame(()=>{
        STATE._ifsLambdaPending = false;
        drawIfsView();
      });
    }
  });
  window.addEventListener("mouseup", ()=> { if (STATE._ifsLambdaDrag) STATE._ifsLambdaDrag.dragging = false; });
}

function attachIfsRectDrag(){
  if (STATE._ifsDragAttached) return;
  STATE._ifsDragAttached = true;
  // The overlay SVG is pointer-events:none so DS9 right-click drag passes through to the canvas.
  // The rect element itself receives left-button mousedown for the drag/resize handler.
  // We use event delegation on the SVG: an event reaches the listener only if it hit the rect (because the SVG has pointer-events:none on its background).
  const ov = document.getElementById("ov-ifs-stack");

  let dragging = false, mode = null, ox = 0, oy = 0, r0 = null;
  function pickMode(svgX, svgY, r){
    const edgePx = Math.max(2.5, Math.min(IFS_STATE.H, IFS_STATE.n3) * 0.06);
    const onLeft   = Math.abs(svgX - r.x1) < edgePx;
    const onRight  = Math.abs(svgX - r.x2) < edgePx;
    const onTop    = Math.abs(svgY - r.y1) < edgePx;
    const onBottom = Math.abs(svgY - r.y2) < edgePx;
    const inside   = svgX > r.x1 && svgX < r.x2 && svgY > r.y1 && svgY < r.y2;
    // Corners → resize
    if (onLeft  && onTop)    return "nw";
    if (onRight && onTop)    return "ne";
    if (onLeft  && onBottom) return "sw";
    if (onRight && onBottom) return "se";
    // Edges or inside → move
    if (onLeft || onRight || onTop || onBottom || inside) return "move";
    return null;
  }
  function toSvgCoords(e){
    const rect = ov.getBoundingClientRect();
    return {
      x: (e.clientX - rect.left) / rect.width  * IFS_STATE.n3,
      y: (e.clientY - rect.top)  / rect.height * IFS_STATE.H
    };
  }
  ov.addEventListener("mousedown", e=>{
    if (!IFS_STATE.rect) return;
    // ignore right-click and ctrl-click — those are reserved for DS9 colormap drag on the canvas underneath
    if (e.button !== 0 || e.ctrlKey) return;
    // Only fire if the target is the rect element itself (not the SVG background — which is pointer-events:none anyway, but guard for safety)
    if (e.target.tagName !== "rect") return;
    e.preventDefault();
    const p = toSvgCoords(e);
    mode = pickMode(p.x, p.y, IFS_STATE.rect);
    if (!mode) return;
    dragging = true;
    ox = p.x; oy = p.y; r0 = {...IFS_STATE.rect};
  });
  window.addEventListener("mousemove", e=>{
    if (!dragging) return;
    const p = toSvgCoords(e);
    const dx = p.x - ox, dy = p.y - oy;
    let r = {...r0};
    if (mode === "move"){
      r.x1 += dx; r.x2 += dx; r.y1 += dy; r.y2 += dy;
    } else if (mode === "nw"){
      r.x1 += dx; r.y1 += dy;
      if (r.x2 - r.x1 < 1) r.x1 = r.x2 - 1;
      if (r.y2 - r.y1 < 1) r.y1 = r.y2 - 1;
    } else if (mode === "ne"){
      r.x2 += dx; r.y1 += dy;
      if (r.x2 - r.x1 < 1) r.x2 = r.x1 + 1;
      if (r.y2 - r.y1 < 1) r.y1 = r.y2 - 1;
    } else if (mode === "sw"){
      r.x1 += dx; r.y2 += dy;
      if (r.x2 - r.x1 < 1) r.x1 = r.x2 - 1;
      if (r.y2 - r.y1 < 1) r.y2 = r.y1 + 1;
    } else if (mode === "se"){
      r.x2 += dx; r.y2 += dy;
      if (r.x2 - r.x1 < 1) r.x2 = r.x1 + 1;
      if (r.y2 - r.y1 < 1) r.y2 = r.y1 + 1;
    }
    r.x1 = Math.max(0, Math.min(IFS_STATE.n3 - 1, r.x1));
    r.x2 = Math.max(1, Math.min(IFS_STATE.n3,     r.x2));
    r.y1 = Math.max(0, Math.min(IFS_STATE.H  - 1, r.y1));
    r.y2 = Math.max(1, Math.min(IFS_STATE.H,      r.y2));
    IFS_STATE.rect = r;
    drawIfsRect();
    drawIfsSpectrum();
  });
  window.addEventListener("mouseup", ()=> { dragging = false; mode = null; });

  // Cursor feedback on hover (before mousedown)
  ov.addEventListener("mousemove", e => {
    if (dragging) return;
    if (!IFS_STATE.rect) return;
    const p = toSvgCoords(e);
    const m = pickMode(p.x, p.y, IFS_STATE.rect);
    if (!m) ov.style.pointerEvents = "none"; // let through
    else {
      ov.style.pointerEvents = "";
      e.target.style.cursor = (m === "move") ? "move" : "nwse-resize";
    }
  });
}
