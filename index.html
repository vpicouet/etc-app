<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Generic ETC — SNR calculator</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230d1117'/><polyline points='2,26 7,18 11,22 16,8 21,14 25,6 30,10' fill='none' stroke='%2358a6ff' stroke-width='2.5' stroke-linejoin='round' stroke-linecap='round'/></svg>">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<!-- Baked spectra data — also accessible via fetch("data/spectra.json"). The .js wrapper lets file:// work. -->
<script src="data/spectra.js"></script>
<!-- Emission cube index — sets window.CUBE_INDEX_BAKED. Also accessible via fetch("data/cubes/index.json"). -->
<script src="data/cubes/index.js"></script>
<style>
  /* ===== DESIGN TOKENS ============================================================
     All visible style is parameterised through CSS variables so that theme files in
     themes/*.css just override them. data-mode="dark" on <body> picks the dark set.
     The plot internals (SVG colors, canvas colormap) are NOT theme-controlled — only
     the surrounding UI chrome is. */
  :root{
    /* Sizing */
    --header-h: 38px;
    --radius:6px;
    --radius-sm:3px;
    --gap:8px;
    --gap-sm:6px;

    /* Typography */
    --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, "JetBrains Mono", "IBM Plex Mono", Menlo, monospace;
    --font-display: var(--font-ui);
    --letter-spacing-display: 0;
    --text-transform-display: none;

    /* Light palette (default) */
    --bg:#f7f7f7;
    --bg-alt:#f0f0f0;
    --panel:#ffffff;
    --panel-2:#fafafa;
    --line:#e2e2e2;
    --line-strong:#cccccc;
    --text:#1a1a1a;
    --text-soft:#444444;
    --muted:#666666;
    --header-bg:#ffffff;
    --header-text:var(--text);
    --accordion-summary-bg:#f3f3f3;
    --tab-bg:#ececec;
    --tab-active-bg:#ffffff;
    --tab-text:#444444;
    --tooltip-bg:rgba(0,0,0,0.85);
    --tooltip-text:#ffffff;
    --accent:#348ABD;
    --accent-2:#E24A33;
    --error:#c00000;
    --img-bg:#000000;
    --img-cell-title-bg:rgba(0,0,0,0.55);
    --img-cell-title-text:#ffffff;
    --shadow-elev-1:0 1px 2px rgba(0,0,0,0.04);

    /* Plot SVG/canvas — NEVER themed (kept for consistency across all themes) */
    --plot-axis-text:#333333;
    --plot-axis-line:#888888;
    --plot-legend-text:#222222;
    --plot-vline:#000000;
    --plot-vline-hover:#E24A33;
    --plot-ax-title:#222222;
    --plot-bg:#ffffff;
    --plot-curve:#000000;       /* main curve stroke (quad sum, stack profile, SB limits…) */
    --plot-curve-2:#444444;     /* secondary darker stroke */
  }

  /* Dark palette baseline. Themes can re-override any of these. */
  body[data-mode="dark"]{
    --bg:#161a20;
    --bg-alt:#1c2128;
    --panel:#21262d;
    --panel-2:#1c2128;
    --line:#30363d;
    --line-strong:#444c56;
    --text:#e6edf3;
    --text-soft:#c9d1d9;
    --muted:#8b949e;
    --header-bg:#0d1117;
    --header-text:#e6edf3;
    --accordion-summary-bg:#161a20;
    --tab-bg:#161a20;
    --tab-active-bg:#21262d;
    --tab-text:#8b949e;
    --tooltip-bg:rgba(0,0,0,0.92);
    --tooltip-text:#e6edf3;
    --accent:#58a6ff;
    --accent-2:#ff7b72;
    --error:#f85149;
    --img-bg:#000000;
    --shadow-elev-1:0 1px 2px rgba(0,0,0,0.4);

    /* Dark-adapted plot tokens. Axes/text stay legible on dark bg, and the main curve stroke
       (used for quad-sum, stacked profile, SB limits…) becomes white instead of pure black. */
    --plot-axis-text:#c9d1d9;
    --plot-axis-line:#5a6473;
    --plot-legend-text:#e6edf3;
    --plot-vline:#e6edf3;
    --plot-ax-title:#e6edf3;
    --plot-bg:#1a1f27;
    --plot-curve:#ffffff;
    --plot-curve-2:#cccccc;
  }

  /* ===== BASE ================================================================== */
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font:13px/1.35 var(--font-ui);
    height:100%;width:100%;overflow:hidden}

  /* Header */
  header{height:var(--header-h);display:flex;align-items:center;gap:10px;padding:0 12px;
    border-bottom:1px solid var(--line);background:var(--header-bg);color:var(--header-text);
    position:relative;z-index:5}
  header h1{margin:0;font-size:14px;font-weight:600;flex:0 0 auto;
    font-family:var(--font-display);letter-spacing:var(--letter-spacing-display);text-transform:var(--text-transform-display)}
  header nav{flex:1;display:flex;gap:6px;align-items:center}
  header nav a{font-size:12px;color:var(--muted);text-decoration:none;padding:3px 8px;
    border:1px solid transparent;border-radius:var(--radius-sm)}
  header nav a.active,header nav a:hover{background:var(--bg-alt);color:var(--text);border-color:var(--line)}
  header .meta{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;font-family:var(--font-mono)}
  header .theme-controls{display:flex;gap:4px;align-items:center;flex:0 0 auto;margin-left:auto}
  header .theme-controls select,
  header .theme-controls button{font-size:11px;padding:2px 6px}
  #theme-toggle{font-size:14px;width:26px;height:22px;line-height:1;padding:0;background:transparent;border:1px solid var(--line);
    color:var(--text);border-radius:var(--radius-sm);cursor:pointer}
  #theme-toggle:hover{background:var(--bg-alt)}

  /* App grid — fills the remaining viewport */
  .app{display:grid;grid-template-columns: minmax(0,1fr) 480px;gap:var(--gap);padding:var(--gap);
    height: calc(100vh - var(--header-h)); width:100%}
  #plot-wrap{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:var(--gap-sm);display:flex;flex-direction:column;min-height:0;min-width:0;overflow:hidden;
    box-shadow:var(--shadow-elev-1)}
  #controls{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:var(--gap);min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:var(--gap);
    box-shadow:var(--shadow-elev-1)}

  /* Top row controls */
  .topbar{display:flex;flex-direction:column;gap:4px;flex:0 0 auto}
  .topbar-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .topbar-row > *{flex:0 0 auto}
  body:not([data-view="snr"]) .snr-only{display:none!important}
  label.kv{display:flex;align-items:center;gap:4px;font-size:11.5px;color:var(--muted)}
  select,input[type="text"],input[type="number"]{font:12px var(--font-ui);padding:2px 4px;
    border:1px solid var(--line-strong);border-radius:var(--radius-sm);background:var(--panel);color:var(--text)}
  select:hover,input:hover{border-color:var(--accent)}
  button{font:12px var(--font-ui);padding:3px 8px;border:1px solid var(--line-strong);background:var(--panel);color:var(--text);
    border-radius:var(--radius-sm);cursor:pointer}
  button:hover{background:var(--bg-alt)}
  button.tog{padding:2px 6px;font-size:11px}
  button.tog.on{background:var(--accent);color:#fff;border-color:var(--accent)}

  /* Accordions */
  .acc{border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--panel)}
  .acc > summary{padding:5px 8px;cursor:pointer;font-weight:600;font-size:12px;
    background:var(--accordion-summary-bg);border-radius:var(--radius-sm) var(--radius-sm) 0 0;list-style:none;
    display:flex;justify-content:space-between;align-items:center;user-select:none;color:var(--text);
    font-family:var(--font-display);letter-spacing:var(--letter-spacing-display);text-transform:var(--text-transform-display)}
  .ifs-check{display:flex;align-items:center;gap:3px;font-size:11px;font-weight:normal;
    color:var(--muted);cursor:pointer;margin-left:auto;margin-right:6px}
  .acc[open] > summary{border-bottom:1px solid var(--line)}
  .acc > summary::after{content:"▾";color:var(--muted);font-size:10px}
  .acc[open] > summary::after{content:"▴"}
  .acc-body{padding:6px 8px}

  /* Slider rows */
  .slider-row{display:grid;grid-template-columns: 145px 1fr 78px;gap:6px;
    align-items:center;margin-bottom:4px}
  .slider-row label{font-size:11px;color:var(--muted);cursor:pointer;user-select:none;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  /* Slider row controlled by an active dependency: greyed out + slider disabled */
  .slider-row.dep-locked{opacity:0.45}
  .slider-row.dep-locked input[type="range"]{pointer-events:none}
  .slider-row.dep-locked label{cursor:default;text-decoration:none}
  /* Hide the "Image options" accordion when the user is on the SNR view (it's irrelevant there) */
  body[data-view="snr"] #img-opts-acc{display:none}
  /* Hide λ Stack row in SNR and Spectro image views (only meaningful in IFS) */
  body[data-view="snr"] #row-lambda_stack{display:none}
  body[data-view="img"] #row-lambda_stack{display:none}
  /* Hide wavelength slider in SNR view (set by instrument; not meaningful to sweep here) */
  body[data-view="snr"] #row-wavelength{display:none}
  /* Hide TH FWHM (imager-only) when the instrument is a spectrograph */
  body[data-spectro="true"] #row-Throughput_FWHM{display:none}
  /* Labels are only clickable as x-axis in SNR view */
  body[data-view="img"] .slider-row label,
  body[data-view="ifs"] .slider-row label{cursor:default}
  body[data-view="img"] .slider-row label:hover,
  body[data-view="ifs"] .slider-row label:hover{color:var(--muted);text-decoration:none}
  .slider-row label:hover{color:var(--accent);text-decoration:underline}
  .slider-row label.is-x{color:var(--accent-2);font-weight:600}
  .slider-row input[type="range"]{width:100%;accent-color:var(--accent);
    height:14px;background:transparent;color-scheme:light}
  /* Dim sliders in dark mode (color-scheme:dark makes the native track grey instead of white) */
  body[data-mode="dark"] .slider-row input[type="range"]{color-scheme:dark;opacity:0.85}
  body[data-mode="dark"] .slider-row input[type="range"]:hover{opacity:1}
  .slider-row .val{font-size:11px;text-align:right;color:var(--text);
    font-variant-numeric:tabular-nums;font-family:var(--font-mono)}
  .flags-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
  /* SDSS object search row */
  .sdss-row{display:flex;gap:4px;align-items:center;margin-bottom:4px;flex-wrap:wrap}
  .sdss-row input[type="text"]{flex:1;min-width:80px;font:12px var(--font-mono);
    padding:2px 5px;border:1px solid var(--line-strong);border-radius:var(--radius-sm);
    background:var(--panel);color:var(--text)}
  .sdss-row button{flex:0 0 auto;padding:2px 7px;font-size:11px}
  #sdss-status{font-size:10.5px;color:var(--muted);width:100%;font-family:var(--font-mono)}
  #sdss-status.ok{color:var(--accent)}
  #sdss-status.err{color:var(--error)}
  /* Hide SDSS search when detector is outside SDSS range */
  body:not([data-sdss-avail="true"]) .sdss-row,
  body:not([data-sdss-avail="true"]) #sdss-status{display:none!important}

  /* Plot */
  #status{font-size:11px;color:var(--muted);padding:2px 4px;flex:0 0 auto;font-family:var(--font-mono)}
  #status.err{color:var(--error)}
  .plot-area{flex:1 1 auto;min-height:0;width:100%;position:relative;display:flex;flex-direction:column;overflow:hidden}
  .plot-area > svg, .plot-area > .img-view{display:none;flex:1 1 0;min-height:0;width:100%;height:100%}
  .plot-area > svg.active{display:block}
  .plot-area > .img-view.active{display:flex}
  #plot{display:none;width:100%;height:100%;background:var(--plot-bg)}
  #plot.active{display:block}
  .plot-axis text{font-size:10px;fill:var(--plot-axis-text)}
  .plot-axis path,.plot-axis line{stroke:var(--plot-axis-line);shape-rendering:crispEdges}
  .legend{font-size:10.5px;fill:var(--plot-legend-text)}
  .vline{stroke:var(--plot-vline);stroke-width:1.4;stroke-dasharray:3,3;pointer-events:none}
  .vline-hit{cursor:ew-resize}
  .vline-hit:hover ~ .vline, .vline-hit:hover + .vline{stroke:var(--plot-vline-hover);stroke-width:1.8}
  .ax-title{font-size:11px;fill:var(--plot-ax-title);font-weight:600}

  /* View tabs (SNR / Spectro image / IFS) */
  .view-tabs{display:flex;gap:2px;flex:0 0 auto;margin-bottom:4px}
  .view-tab{padding:3px 10px;font-size:11.5px;background:var(--tab-bg);border:1px solid var(--line);
    border-bottom:none;border-radius:var(--radius-sm) var(--radius-sm) 0 0;cursor:pointer;color:var(--tab-text);
    font-family:var(--font-display);letter-spacing:var(--letter-spacing-display);text-transform:var(--text-transform-display)}
  .view-tab.active{background:var(--tab-active-bg);color:var(--text);font-weight:600}

  /* Spectro image view: fixed proportion between imshow stack (top 55%) and analysis panels (bottom 45%) */
  .img-view{flex-direction:column;gap:4px;padding:2px;min-height:0;height:100%;overflow:hidden}
  .img-row{display:flex;flex-direction:column;gap:6px;height:55%;min-height:0;flex:none}
  /* Horizontal variant: two imshow cells side-by-side (used by the IFS view) */
  .img-row-h{display:grid;grid-template-columns:1fr 1fr;gap:6px;height:55%;min-height:0;flex:none}
  .img-cell{border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--img-bg);
    position:relative;overflow:hidden;display:block;width:100%;flex:1 1 0;min-height:0}
  .img-cell .cell-title{font-size:11px;color:var(--img-cell-title-text);background:var(--img-cell-title-bg);
    padding:2px 6px;position:absolute;top:0;left:0;right:0;z-index:3;font-family:var(--font-mono)}
  /* Canvas fills the cell, stretched in pixel-art mode — image aspect is not preserved (it's 500×100, very thin) */
  .img-cell canvas{width:100%;height:100%;display:block;image-rendering:pixelated;position:relative;z-index:1;cursor:crosshair}
  .img-cell svg.overlay{position:absolute;inset:0;width:100%;height:100%;z-index:2;pointer-events:none}
  /* Thin colorbar on the right of the IFS imshow cells. width: 14px from the right border. */
  .img-cell-with-cb canvas.ifs-colorbar{position:absolute;top:18px;right:4px;width:12px;height:calc(100% - 36px);
    image-rendering:pixelated;z-index:4;border:1px solid rgba(255,255,255,0.25);border-radius:1px;cursor:pointer}
  .img-cell-with-cb .cb-label{position:absolute;right:18px;font-size:9px;color:#fff;
    background:rgba(0,0,0,0.5);padding:1px 3px;border-radius:2px;z-index:5;
    font-family:var(--font-mono);pointer-events:none}
  .img-cell-with-cb .cb-top{top:18px}
  .img-cell-with-cb .cb-bottom{bottom:18px}
  /* 2×2 grid of analysis sub-plots */
  .img-extra{height:45%;min-height:0;flex:none;display:grid;
    grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:6px;overflow:hidden}
  .img-extra > svg{display:block;border:1px solid var(--line);
    border-radius:var(--radius-sm);background:var(--plot-bg);min-height:0;min-width:0;overflow:hidden}

  /* Pixel hover tooltip */
  #pixtip{position:fixed;pointer-events:none;background:var(--tooltip-bg);color:var(--tooltip-text);
    font-size:11px;padding:4px 7px;border-radius:var(--radius-sm);font-family:var(--font-mono);
    z-index:9999;white-space:pre;display:none;line-height:1.35;border:1px solid rgba(255,255,255,0.08)}

  details.sheet{margin-top:auto;flex:0 0 auto}
  details.sheet summary{cursor:pointer;color:var(--muted);font-size:11px}
  details.sheet input{width:100%;margin-top:4px;font-size:11px;padding:2px 4px;
    border:1px solid var(--line-strong);border-radius:var(--radius-sm);background:var(--panel);color:var(--text)}

  /* Floating params button — hidden on desktop */
  #mob-params-btn{display:none}

  /* === Responsive: mobile === */
  @media (max-width: 820px){
    /* Scroll allowed — no overflow:hidden on body */
    html,body{overflow-x:hidden;overflow-y:auto;height:auto}

    /* Compact header: keep only h1 + GitHub + theme toggle */
    header nav a:not([href*="github"]){display:none}
    header h1{font-size:13px}

    /* App: single column, natural height, no grid */
    .app{
      display:flex;flex-direction:column;
      width:100%;height:auto;
      padding:4px;gap:6px;
      grid-template-columns:none;
    }

    /* Plot: fixed height, taller in portrait, shorter in landscape */
    #plot-wrap{
      width:100%;
      height:70vw;          /* portrait: ~70% of screen width ≈ good SNR plot height */
      min-height:260px;
      max-height:520px;
      flex:none;
      border-radius:var(--radius-sm);
      padding:4px;
      display:flex;flex-direction:column;overflow:hidden;
      position:relative;
    }
    .plot-area{flex:1 1 auto;min-height:0;overflow:hidden}

    /* img-row subplots: taller on mobile so they're readable */
    .img-row,.img-row-h{height:180px}

    /* Controls: normal flow below plot, hidden behind overlay toggle */
    #controls{
      width:100%;height:auto;
      position:fixed;inset:0;
      padding:10px;padding-top:48px;
      overflow-y:auto;
      display:none;
      flex-direction:column;gap:6px;
      background:var(--panel);
      z-index:50;
    }
    body[data-mob-params="1"] #controls{display:flex}

    /* Slider columns on phone */
    .slider-row{grid-template-columns:110px 1fr 68px}

    /* Landscape: use more of the screen height for the plot */
    @media (orientation:landscape){
      #plot-wrap{height:55vh;max-height:none}
    }

    /* Floating ⚙ button — always visible bottom-right */
    #mob-params-btn{
      display:flex;
      position:fixed;bottom:18px;right:18px;
      width:48px;height:48px;
      border-radius:50%;
      background:var(--accent);
      color:#fff;
      border:none;
      font-size:22px;
      align-items:center;justify-content:center;
      cursor:pointer;
      z-index:200;
      box-shadow:0 3px 10px rgba(0,0,0,0.5);
    }
  }
</style>
<!-- Theme stylesheet placed AFTER the inline style so its CSS variables effectively override the defaults. -->
<link id="theme-css" rel="stylesheet" href="themes/twilight.css">
</head>
<body>

<div id="pixtip"></div>
<button id="mob-params-btn" title="Toggle parameters">⚙️</button>

<header>
  <h1>Generic ETC</h1>
  <nav>
    <a href="./" class="active">Instrument simulator</a>
    <a href="./comparison.html">Comparison</a>
    <a href="./info.html">Info</a>
    <a href="https://github.com/vpicouet/etc-app" target="_blank">GitHub</a>
    <a href="https://docs.google.com/spreadsheets/d/1Ox0uxEm2TfgzYA6ivkTpU4xrmN5vO5kmnUPdCSt73uU/edit" target="_blank">Instrument DB</a>
  </nav>
  <span id="meta" class="meta"></span>
  <span class="theme-controls">
    <select id="theme-select" style="display:none" title="Visual theme.">
      <option value="twilight" selected>Astronomical Twilight</option>
    </select>
    <button id="theme-toggle" title="Toggle dark / light mode">🌙</button>
  </span>
</header>

<div class="app">
  <div id="plot-wrap">
    <div id="status">Loading instruments…</div>
    <div class="view-tabs">
      <div class="view-tab active" data-view="snr" title="Noise budget, contributions stack, SNR stack, surface-brightness limits">SNR</div>
      <div class="view-tab" data-view="img" title="Simulated detector image: source + sky + dark + RN + CIC (and EMCCD gamma amplification if EM_gain>1)">Spectro image</div>
      <div class="view-tab" id="view-tab-ifs" data-view="ifs" style="display:none" title="IFS view: cube slice + integrated spectrum. Only shown when the current instrument is an IFS (dimensions=3 in the spreadsheet).">IFS</div>
    </div>
    <div class="plot-area">
      <svg id="plot" class="active" preserveAspectRatio="none"></svg>
      <div id="plot-img" class="img-view">
        <div class="img-row">
          <div class="img-cell img-cell-with-cb">
            <div class="cell-title" id="img-single-title">Single exposure</div>
            <canvas id="cv-single" title="DS9 colormap: right-click + drag (or ctrl-click + drag on Mac trackpad). Horizontal = bias, vertical = contrast. Double-click to reset."></canvas>
            <svg id="ov-single" class="overlay" preserveAspectRatio="none"></svg>
            <canvas id="cb-single" class="ifs-colorbar"></canvas>
            <div class="cb-label cb-top" id="cb-single-max"></div>
            <div class="cb-label cb-bottom" id="cb-single-min"></div>
          </div>
          <div class="img-cell img-cell-with-cb">
            <div class="cell-title" id="img-stack-title">Stacked</div>
            <canvas id="cv-stack" title="DS9 colormap: right-click + drag (or ctrl-click + drag on Mac trackpad). Horizontal = bias, vertical = contrast. Double-click to reset."></canvas>
            <svg id="ov-stack" class="overlay" preserveAspectRatio="none"></svg>
            <canvas id="cb-stack" class="ifs-colorbar"></canvas>
            <div class="cb-label cb-top" id="cb-stack-max"></div>
            <div class="cb-label cb-bottom" id="cb-stack-min"></div>
          </div>
        </div>
        <div class="img-extra">
          <svg id="svg-prof-spat"></svg>
          <svg id="svg-prof-spec"></svg>
          <svg id="svg-hist"></svg>
          <svg id="svg-optics"></svg>
        </div>
      </div>
      <div id="plot-ifs" class="img-view">
        <div class="img-row-h">
          <div class="img-cell img-cell-with-cb">
            <div class="cell-title" id="ifs-single-title">Single cube — λ slice</div>
            <canvas id="cv-ifs-single" title="Single-exposure λ-slice of the IFS cube. Cube[H × n3 × W] is built as a separable product: 2D spatial PSF × source spectrum. DS9 colormap drag works here too."></canvas>
            <svg id="ov-ifs-single" class="overlay" preserveAspectRatio="none"></svg>

<script>
"use strict";

/* ============================================================================
   1. CONSTANTS + HELPERS
   ========================================================================== */
const COLORS = ['#E24A33','#988ED5','#FBC15E','#348ABD','#8EBA42','#FFB5B8','#777777'];
const NAMES  = ["Signal","Dark current","Sky","Read noise","CIC","Extra background"];

function lin(n,a,b){const o=new Array(n);const d=(b-a)/(n-1);for(let i=0;i<n;i++)o[i]=a+d*i;return o}
function log(n,a,b){a=Math.max(a,1e-30);const la=Math.log10(a),lb=Math.log10(Math.max(b,a*1.0001));const o=new Array(n);const d=(lb-la)/(n-1);for(let i=0;i<n;i++)o[i]=10**(la+d*i);return o}
function space(n,a,b,xlog){return (xlog && a>=0) ? log(n, a===0?1e-4:a, b) : lin(n,a,b)}
function erf(x){const s=Math.sign(x);x=Math.abs(x);const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;const t=1/(1+p*x);const y=1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);return s*y}
function normSf(x,scale){if(scale<=0)return x>0?0:1;const z=x/scale;return 0.5*(1-erf(z/Math.SQRT2))}
function convert_ergs2LU(flux, wave_nm){const wave=wave_nm*1e-7;const E=6.62e-27*3e10/wave;const a=Math.PI/(180*3600);return flux/(E*a*a)}
function convert_LU2ergs(LU, wave_nm){const wave=wave_nm*1e-7;const E=6.62e-27*3e10/wave;const a=Math.PI/(180*3600);return LU*E*a*a}
function calculate_photon_counting_RN_noise(RN){
  const f = r=>{
    if (r<0.3) return 2*normSf(0.5, r);
    if (r>0.5) return r;
    const noise_low = 2*normSf(0.5, 0.3);
    const t = (r-0.3)/0.2;
    return noise_low*(1-t) + 0.5*t;
  };
  return typeof RN==="number" ? f(RN) : RN.map(f);
}
function fmtNum(v){if(!isFinite(v))return "—";return (Math.abs(v)<1e-3||Math.abs(v)>=1e4) ? v.toExponential(2) : (+v).toFixed(2)}
function argClosest(a,v){let best=0,d=Infinity;for(let i=0;i<a.length;i++){const dd=Math.abs(a[i]-v);if(dd<d){d=dd;best=i}}return best}

/* Read a CSS variable from <body> (used to theme hardcoded plot stroke colors). */

  return v || fallback;
