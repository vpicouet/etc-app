let updateScheduled = false;
function scheduleUpdate(){ if (updateScheduled) return; updateScheduled = true; requestAnimationFrame(()=>{ updateScheduled = false; doUpdate(); }); }

/* Lock/unlock the Line_width slider depending on whether a baked spectrum is active in img/ifs views. */
function updateImgDependentUI(){
  const lock = IMG_FLAGS.spectrum !== "Baseline emission line" && STATE.view !== "snr";
  const row = document.getElementById("row-Line_width");
  if (row){
    row.classList.toggle("dep-locked", lock);
    const inp = row.querySelector("input[type='range']");
    if (inp) inp.disabled = lock;
  }
  const barRow = document.getElementById("bar-angle-row");
  if (barRow) barRow.style.display = IMG_FLAGS.source_shape === "Bar" ? "flex" : "none";
}

function setView(view){
  STATE.view = view;
  // Reflect on <body> so CSS can adapt (e.g. disable click cursor on labels outside the SNR view)
  document.body.setAttribute("data-view", view);
  document.querySelectorAll(".view-tab").forEach(el => el.classList.toggle("active", el.dataset.view===view));
  document.getElementById("plot").classList.toggle("active", view==="snr");
  document.getElementById("plot-img").classList.toggle("active", view==="img");
  document.getElementById("plot-ifs").classList.toggle("active", view==="ifs");
  updateImgDependentUI();
  // Wait two RAFs so the just-shown container has time to lay out before we measure its size for the SVG viewBoxes
  requestAnimationFrame(()=> requestAnimationFrame(()=> scheduleUpdate()));
}

/* Show/hide the IFS tab depending on the current instrument's dimensions column. */
function updateIfsTabVisibility(){
  const isIFS = FLAGS.IFS;
  const tab = document.getElementById("view-tab-ifs");
  if (tab) tab.style.display = isIFS ? "" : "none";
  if (!isIFS && STATE.view === "ifs") setView("snr");
}

function doUpdate(){
  // Update SDSS search visibility (depends on wavelength + Bandwidth sliders)
  document.body.setAttribute("data-sdss-avail", detectorInSdssDomain() ? "true" : "false");
  const xKey = STATE.xKey, p = PARAMS[xKey]; if (!p) return;
  const xlog = document.getElementById("xlog").classList.contains("on");
  const xa = p.log ? Math.pow(10, p.min) : p.min;
  const xb = p.log ? Math.pow(10, p.max) : p.max;
  const N = 60;
  const xArr = space(N, xa, xb, xlog);
  const pa = {};
  for (const k of Object.keys(PARAMS)) pa[k] = (k===xKey) ? xArr : STATE.values[k];
  pa.xArr = xArr;
  pa.IFS = FLAGS.IFS; pa.spectrograph = FLAGS.spectrograph; pa.counting_mode = FLAGS.counting_mode;
  pa.SNR_res = document.getElementById("snr_res").value;
  // Apply parameter coupling: a dependent param overrides its scalar/array value
  applyDependenciesVector(pa, N);
  let res;
  try { res = computeObservation(pa); }
  catch(e){ d3.select("#status").classed("err",true).text("Compute error: "+e.message); console.error(e); return; }
  const iCur = argClosest(xArr, STATE.values[xKey]);
  const snrCurStatus = isFinite(res.SNR[iCur]) ? res.SNR[iCur].toFixed(2) : "—";
  d3.select("#status").classed("err",false)
    .text(`Instrument: ${STATE.current_instrument||"—"}   |   x = ${xKey}   |   SNR = ${snrCurStatus}`);
  document.getElementById("meta").textContent = STATE.current_instrument
    ? `${STATE.current_instrument} • SNR ${snrCurStatus}` : "";
  if (STATE.view === "snr") { drawPlot(res); attachSnrXDrag(); }
  else if (STATE.view === "ifs") { drawIfsView(); attachIfsRectDrag(); attachIfsLambdaDrag(); }
  else drawImageView();
}

function buildXAxisOptions(){
  const sel = d3.select("#xaxis"); sel.selectAll("*").remove();
  GROUPS.forEach(t=>{
    const og = sel.append("optgroup").attr("label", t.toUpperCase());
    for (const [k,p] of Object.entries(PARAMS)){
      if (p.tab!==t || !p.xable) continue;
      og.append("option").attr("value",k).text(k);
    }
  });
  sel.property("value", STATE.xKey).on("change", function(){
    STATE.xKey=this.value;
    document.querySelectorAll("label.is-x").forEach(el=>el.classList.remove("is-x"));
    const cur = document.querySelector(`label[data-label-key="${this.value}"]`);
    if (cur) cur.classList.add("is-x");
    scheduleUpdate();
  });
}
function buildInstrumentOptions(){
  const sel = d3.select("#instrument"); sel.selectAll("*").remove();
  for (const n of STATE.instruments.colnames) sel.append("option").attr("value",n).text(n);
  // Pick the first available preferred instrument from this list
  const preferOrder = ["SCWI SPEC", "FIREBall-2 2025"];
  let pref = STATE.instruments.colnames[0];
  for (const p of preferOrder){ if (STATE.instruments.colnames.includes(p)){ pref = p; break; } }
  sel.property("value", pref).on("change", function(){ applyInstrument(this.value); scheduleUpdate(); });
  applyInstrument(pref);
}

async function loadSpectraData(){
  // First preference: the global set by data/spectra.js (loaded via <script>). Works on file:// too.
  if (typeof window !== "undefined" && window.SPECTRA_DATA_BAKED){
    SPECTRA_DATA = window.SPECTRA_DATA_BAKED;
    const nSpec = Object.keys(SPECTRA_DATA.spectra||{}).length;
    const nAtm  = Object.keys(SPECTRA_DATA.atm||{}).length;
    const nSky  = Object.keys(SPECTRA_DATA.sky_lines||{}).length;
    console.log(`Loaded baked spectra: ${nSpec} spectra, ${nAtm} atm, ${nSky} sky-line catalogues`);
    if (document.getElementById("img-spec")) buildImageOptionsUI();
    return;
  }
  // Fallback: fetch the .json — try a few relative paths.
  const candidates = ["data/spectra.json", "./data/spectra.json", "/etc-app/data/spectra.json"];
  for (const url of candidates){
    try {
      const r = await fetch(url, {cache:"force-cache"});
      if (!r.ok) continue;
      SPECTRA_DATA = await r.json();
      const nSpec = Object.keys(SPECTRA_DATA.spectra||{}).length;
      console.log(`Loaded ${url}: ${nSpec} spectra`);
      if (document.getElementById("img-spec")) buildImageOptionsUI();
      return;
    } catch (e){ /* try next */ }
  }
  console.warn("Could not load spectra (neither baked global nor fetch) — only 'Baseline emission line' will be available.");
  SPECTRA_DATA = null;
  d3.select("#status").classed("err", true)
    .text("⚠ Could not load spectra.js — the Spectrum dropdown will only show 'Baseline emission line'.");
}

async function loadCubeIndex(){
  if (!EMISSION_CUBES_ENABLED) return;
  // First preference: global set by data/cubes/index.js (<script src> in head — works on file:// too)
  if (typeof window !== "undefined" && window.CUBE_INDEX_BAKED){
    CUBE_INDEX = window.CUBE_INDEX_BAKED;
    console.log(`Loaded cube index: ${Object.keys(CUBE_INDEX).length} cubes`);
    return;
  }
  // Fallback: fetch (works on GitHub Pages / any HTTP server)
  try {
    const r = await fetch("data/cubes/index.json");
    if (r.ok){ CUBE_INDEX = await r.json(); console.log(`Loaded cube index: ${Object.keys(CUBE_INDEX).length} cubes`); return; }
  } catch(e){}
  console.warn("Could not load cube index — emission cubes unavailable.");
}

/* Pick the FOV variant (arcsec string key) closest to detFov arcsec. */
/* Lazy-load a cube binary. One bin per cube, keyed by cubeKey. */
async function loadCube(cubeKey){
  if (!EMISSION_CUBES_ENABLED || !CUBE_INDEX || !CUBE_INDEX[cubeKey]) return null;
  if (CUBE_CACHE[cubeKey]) return CUBE_CACHE[cubeKey];
  const meta = CUBE_INDEX[cubeKey];
  if (!meta || !meta.file) return null;
  try {
    const r = await fetch(`data/cubes/${meta.file}`);
    if (r.ok){
      const buf = await r.arrayBuffer();
      const arr = new Float32Array(buf);
      CUBE_CACHE[cubeKey] = arr;
      console.log(`Loaded cube "${cubeKey}" (${(buf.byteLength/1024/1024).toFixed(1)} MB)`);
      return arr;
    }
  } catch(e){}
  console.warn(`Failed to load cube "${cubeKey}"`);
  return null;
}

/* Prefix used in the spectrum dropdown to distinguish cube entries from SEDs. */
const CUBE_KEY_PREFIX = "Cube: ";

/* Rebuild the <select> option list after cubes arrive. */
function refreshSpectrumDropdown(sel){
  if (!sel) return;
  // Collect existing option values
  const existing = new Set(Array.from(sel.options).map(o => o.value));
  // Add cube options that are not yet present
  if (EMISSION_CUBES_ENABLED && CUBE_INDEX){
    for (const [key, meta] of Object.entries(CUBE_INDEX)){
      const val = CUBE_KEY_PREFIX + key;
      if (!existing.has(val)){
        const opt = document.createElement("option");
        opt.value = val;
        opt.textContent = `Cube: ${meta.label}`;
        sel.appendChild(opt);
      }
    }
  }
}

/* ============================================================================
   THEME / DARK MODE
   ============================================================================ */
const THEME_LIST = ["default","caltech","nasa","twilight","terminal"];
function applyTheme(name){
  if (!THEME_LIST.includes(name)) name = "default";
  document.getElementById("theme-css").setAttribute("href", `themes/${name}.css`);
  try { localStorage.setItem("etc.theme", name); } catch(e){}
  const sel = document.getElementById("theme-select"); if (sel) sel.value = name;
}
function applyMode(mode){
  if (mode !== "dark" && mode !== "light") mode = "light";
  document.body.setAttribute("data-mode", mode);
  try { localStorage.setItem("etc.mode", mode); } catch(e){}
  const btn = document.getElementById("theme-toggle");
  if (btn) btn.textContent = (mode === "dark") ? "☀" : "🌙";
  // The legend rect colors are baked from CSS variables at draw time; force a redraw so they pick up the new palette.
  if (typeof scheduleUpdate === "function") requestAnimationFrame(()=> scheduleUpdate());
}
function initTheme(){
  // Theme is currently locked to "twilight" (dropdown hidden). Dark/light is user-toggleable.
  let mode = "light";
  try { mode = localStorage.getItem("etc.mode") || mode; } catch(e){}
  applyTheme("twilight");
  applyMode(mode);
  const btn = document.getElementById("theme-toggle");
  if (btn) btn.addEventListener("click", () => applyMode(document.body.getAttribute("data-mode") === "dark" ? "light" : "dark"));
}
// Apply ASAP — before main runs, to avoid flicker.
initTheme();

async function main(){
  document.body.setAttribute("data-view", STATE.view || "snr");
  document.body.setAttribute("data-spectro", FLAGS.spectrograph ? "true" : "false");
  initValuesToDefault();
  await loadSpectraData();
  await loadCubeIndex();
  buildUI();
  buildDependencyUI();
  buildImageOptionsUI();
  updateDepVisibility();
  buildXAxisOptions();
  try {
    await loadInstruments(document.getElementById("sheet_id").value, document.getElementById("sheet_name").value);
    buildInstrumentOptions();
    d3.select("#status").classed("err",false).text(`Loaded ${STATE.instruments.colnames.length} instruments.`);
  } catch (e){
    d3.select("#status").classed("err",true).text("Failed to load sheet: "+e.message+" — using defaults.");
    console.error(e);
  }
  ["xlog","ylog"].forEach(id => {
    document.getElementById(id).addEventListener("click", function(){
      this.classList.toggle("on"); scheduleUpdate();
    });
  });
  document.getElementById("lock-axes").addEventListener("click", function(){
    LOCK_AXES.active = this.classList.toggle("on");
    if (!LOCK_AXES.active){
      // Unlock: clear frozen limits so next render auto-fits
      LOCK_AXES.snrY = [null, null, null];
      LOCK_AXES.img  = null;
      scheduleUpdate();
    }
    // When locking: limits are captured on the very next render (lazy capture)
  });
  document.getElementById("snr_res").addEventListener("change", scheduleUpdate);
  document.getElementById("cfg-save").addEventListener("click", ()=>{
    const cfg = {
      version: 1,
      instrument: STATE.current_instrument || "",
      xKey: STATE.xKey,
      xlog: document.getElementById("xlog").classList.contains("on"),
      ylog: document.getElementById("ylog").classList.contains("on"),
      values: Object.assign({}, STATE.values),
      img_flags: Object.assign({}, IMG_FLAGS),
    };
    const blob = new Blob([JSON.stringify(cfg, null, 2)], {type:"application/json"});
    const a = Object.assign(document.createElement("a"), {
      href: URL.createObjectURL(blob),
      download: `etc-config-${(cfg.instrument||"params").replace(/\s+/g,"-")}.json`
    });
    a.click(); URL.revokeObjectURL(a.href);
  });
  document.getElementById("cfg-load").addEventListener("click", ()=>
    document.getElementById("cfg-file").click()
  );
  document.getElementById("cfg-file").addEventListener("change", function(){
    const file = this.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const cfg = JSON.parse(e.target.result);
        if (cfg.values) Object.assign(STATE.values, cfg.values);
        if (cfg.img_flags) Object.assign(IMG_FLAGS, cfg.img_flags);
        if (cfg.xKey && PARAMS[cfg.xKey]) STATE.xKey = cfg.xKey;
        if (typeof cfg.xlog === "boolean")
          document.getElementById("xlog").classList.toggle("on", cfg.xlog);
        if (typeof cfg.ylog === "boolean")
          document.getElementById("ylog").classList.toggle("on", cfg.ylog);
        for (const k of Object.keys(PARAMS)) syncSlider(k);
        buildImageOptionsUI();
        scheduleUpdate();
      } catch(err) {
        alert("Could not load config: " + err.message);
      }
    };
    reader.readAsText(file);
    this.value = "";  // allow reloading the same file
  });
  document.getElementById("reset").addEventListener("click", ()=>{ initValuesToDefault(); for (const k of Object.keys(PARAMS)) syncSlider(k); scheduleUpdate(); });
  document.getElementById("reload").addEventListener("click", async ()=>{
    try {
      await loadInstruments(document.getElementById("sheet_id").value, document.getElementById("sheet_name").value);
      buildInstrumentOptions(); scheduleUpdate();
    } catch (e){ d3.select("#status").classed("err",true).text("Reload failed: "+e.message); }
  });
  // View tab switching
  document.querySelectorAll(".view-tab").forEach(el => {
    el.addEventListener("click", ()=> setView(el.dataset.view));
  });
  window.addEventListener("resize", ()=>scheduleUpdate());
  scheduleUpdate();
}
main();

/* === Mobile floating params button === */
document.getElementById("mob-params-btn").addEventListener("click", function(){
  const open = document.body.getAttribute("data-mob-params") === "1";
  document.body.setAttribute("data-mob-params", open ? "0" : "1");
  this.textContent = open ? "⚙️" : "✕";
});
</script>
