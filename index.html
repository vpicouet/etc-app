/* Sub-plot X-axis zoom helpers. STATE.subplotZoom[svgId] = {xLo, xHi} when zoomed. */
function getZoomDomain(svgId, naturalLo, naturalHi){
  const z = STATE.subplotZoom[svgId];
  if (!z) return [naturalLo, naturalHi];
  // Clamp to the natural range so the user can't pan off the data
  const lo = Math.max(naturalLo, Math.min(naturalHi, z.xLo));
  const hi = Math.max(naturalLo, Math.min(naturalHi, z.xHi));
  return (hi > lo) ? [lo, hi] : [naturalLo, naturalHi];
}
function setSubplotZoom(svgId, xLo, xHi){ STATE.subplotZoom[svgId] = {xLo, xHi}; }
function resetSubplotZoom(svgId){ delete STATE.subplotZoom[svgId]; }
function getZoomDomainY(svgId, naturalLo, naturalHi){
  const z = STATE.subplotZoom[svgId];
  if (!z || z.yLo == null) return [naturalLo, naturalHi];
  const lo = Math.max(naturalLo, Math.min(naturalHi, z.yLo));
  const hi = Math.max(naturalLo, Math.min(naturalHi, z.yHi));
  return (hi > lo) ? [lo, hi] : [naturalLo, naturalHi];
}

/* Wire rubber-band drag zoom + dblclick-reset on an SVG subplot. Idempotent per id. */
function attachSubplotZoom(svgId, redrawFn){
  if (STATE._subplotZoomAttached && STATE._subplotZoomAttached[svgId]) return;
  STATE._subplotZoomAttached = STATE._subplotZoomAttached || {};
  STATE._subplotZoomAttached[svgId] = true;
  const svg = document.getElementById(svgId); if (!svg) return;

  let dragStart = null;     // { clientX, clientY, vx, vy, dataX, dataY }
  let dragAxis  = null;     // null | "x" | "y" — locked once drag exceeds threshold
  let rubberRect = null;

  const AXIS_LOCK_PX = 6;  // pixels of movement before axis is locked

  function clientXtoData(clientX){
    if (!STATE._lastDomain || !STATE._lastDomain[svgId]) return null;
    const rect = svg.getBoundingClientRect();
    const vbW  = svg.viewBox.baseVal.width || rect.width;
    const m = STATE._lastDomain[svgId].margin;
    const vx = (clientX - rect.left) * (vbW / rect.width);
    const [lo, hi] = STATE._lastDomain[svgId].used;
    const fx = Math.max(0, Math.min(1, (vx - m.l) / (vbW - m.l - m.r)));
    return { vx, fx, data: lo + fx*(hi - lo) };
  }

  function clientYtoData(clientY){
    if (!STATE._lastDomain || !STATE._lastDomain[svgId]) return null;
    const ld = STATE._lastDomain[svgId];
    if (!ld.usedY) return null;
    const rect = svg.getBoundingClientRect();
    const vbH  = svg.viewBox.baseVal.height || rect.height;
    const m = ld.margin;
    const vy = (clientY - rect.top) * (vbH / rect.height);
    const [lo, hi] = ld.usedY;
    const fy = Math.max(0, Math.min(1, (vy - m.t) / (vbH - m.t - m.b)));
    return hi - fy*(hi - lo);
  }

  function clientXtoVx(clientX){
    const rect = svg.getBoundingClientRect();
    const vbW  = svg.viewBox.baseVal.width || rect.width;
    return (clientX - rect.left) * (vbW / rect.width);
  }

  function clientYtoVy(clientY){
    const rect = svg.getBoundingClientRect();
    const vbH  = svg.viewBox.baseVal.height || rect.height;
    return (clientY - rect.top) * (vbH / rect.height);
  }

  svg.style.cursor = "crosshair";

  svg.addEventListener("mousedown", function(e){
    if (e.button !== 0) return;
    const ld = STATE._lastDomain[svgId];
    if (!ld) return;
    e.preventDefault();
    const vx = clientXtoVx(e.clientX);
    const vy = clientYtoVy(e.clientY);
    const dX = clientXtoData(e.clientX);
    const dY = clientYtoData(e.clientY);
    dragStart = { clientX: e.clientX, clientY: e.clientY, vx, vy,
                  dataX: dX ? dX.data : null, dataY: dY };
    dragAxis = null;

    // Create rubber-band rect (initially hidden)
    rubberRect = document.createElementNS("http://www.w3.org/2000/svg","rect");
    rubberRect.setAttribute("fill", "rgba(180,180,255,0.25)");
    rubberRect.setAttribute("stroke", "var(--accent-2,#E24A33)");
    rubberRect.setAttribute("stroke-width", "1");
    rubberRect.setAttribute("pointer-events", "none");
    rubberRect.setAttribute("x", vx); rubberRect.setAttribute("width", 0);
    rubberRect.setAttribute("y", vy); rubberRect.setAttribute("height", 0);
    svg.appendChild(rubberRect);
  });

  window.addEventListener("mousemove", function(e){
    if (!dragStart || !rubberRect) return;
    const dx = e.clientX - dragStart.clientX;
    const dy = e.clientY - dragStart.clientY;

    // Lock axis once movement exceeds threshold
    if (!dragAxis){
      if (Math.abs(dx) < AXIS_LOCK_PX && Math.abs(dy) < AXIS_LOCK_PX) return;
      const ld = STATE._lastDomain[svgId];
      const hasY = ld && ld.usedY;
      dragAxis = (!hasY || Math.abs(dx) >= Math.abs(dy)) ? "x" : "y";
    }

    const ld = STATE._lastDomain[svgId];
    const m = ld.margin;
    const vbW = svg.viewBox.baseVal.width  || svg.getBoundingClientRect().width;
    const vbH = svg.viewBox.baseVal.height || svg.getBoundingClientRect().height;

    if (dragAxis === "x"){
      const vx = clientXtoVx(e.clientX);
      rubberRect.setAttribute("x",      Math.min(dragStart.vx, vx));
      rubberRect.setAttribute("width",  Math.abs(vx - dragStart.vx));
      rubberRect.setAttribute("y",      m.t);
      rubberRect.setAttribute("height", vbH - m.t - m.b);
    } else {
      const vy = clientYtoVy(e.clientY);
      rubberRect.setAttribute("x",      m.l);
      rubberRect.setAttribute("width",  vbW - m.l - m.r);
      rubberRect.setAttribute("y",      Math.min(dragStart.vy, vy));
      rubberRect.setAttribute("height", Math.abs(vy - dragStart.vy));
    }
  });

  window.addEventListener("mouseup", function(e){
    if (!dragStart || !rubberRect) return;
    if (rubberRect.parentNode) rubberRect.parentNode.removeChild(rubberRect);
    rubberRect = null;

    const axis  = dragAxis;
    const start = dragStart;
    dragStart = null; dragAxis = null;
    if (!axis) return;  // never locked = accidental click

    const ld = STATE._lastDomain[svgId];
    const z  = STATE.subplotZoom[svgId] || {};

    if (axis === "x"){
      const dA = clientXtoData(e.clientX);
      if (!dA || start.dataX === null) return;
      const [nLo, nHi] = ld.natural;
      let xA = Math.min(start.dataX, dA.data);
      let xB = Math.max(start.dataX, dA.data);
      if (xB - xA < 0.01 * (nHi - nLo)) return;
      xA = Math.max(nLo, xA); xB = Math.min(nHi, xB);
      STATE.subplotZoom[svgId] = { ...z, xLo: xA, xHi: xB };
    } else {
      const dYend   = clientYtoData(e.clientY);
      const dYstart = start.dataY;
      if (dYend === null || dYstart === null) return;
      const [nyLo, nyHi] = ld.naturalY;
      let yA = Math.min(dYend, dYstart);
      let yB = Math.max(dYend, dYstart);
      if (yB - yA < 0.01 * (nyHi - nyLo)) return;
      yA = Math.max(nyLo, yA); yB = Math.min(nyHi, yB);
      STATE.subplotZoom[svgId] = { ...z, yLo: yA, yHi: yB };
    }
    redrawFn();
  });

  svg.addEventListener("dblclick", function(){
    if (!STATE.subplotZoom[svgId]) return;
    resetSubplotZoom(svgId);
    redrawFn();
  });
}

/* ============================================================================
   PRNG + sample distributions for the image simulator
   ========================================================================== */
function makeRng(seed){
  // Mulberry32 — fast, deterministic
  let s = (seed>>>0) || 1;
  return function(){ s = (s + 0x6D2B79F5)>>>0; let t = s; t = Math.imul(t ^ (t>>>15), t | 1); t ^= t + Math.imul(t ^ (t>>>7), t | 61); return ((t ^ (t>>>14))>>>0) / 4294967296; };
}
function makeNormal(rng){
  // Box-Muller, with cached sample
  let spare=null;
  return function(mu,sigma){
    if (spare!=null){ const x=spare; spare=null; return mu + sigma*x; }
    let u, v, s;
    do { u = rng()*2-1; v = rng()*2-1; s = u*u+v*v; } while (s===0 || s>=1);
    const m = Math.sqrt(-2*Math.log(s)/s);
    spare = v*m;
    return mu + sigma*(u*m);
  };
}
function makePoisson(rng){
  // Knuth for small λ, Gaussian approx for large λ
  return function(lambda){
    if (!(lambda>0)) return 0;
    if (lambda < 30){
      const L = Math.exp(-lambda);
      let k=0, p=1;
      while (true){
        k++; p *= rng();
        if (p <= L) return k-1;
        if (k>2000) return k;
      }
    } else {
      // Normal approx, clamp at 0
      // Use Box-Muller inline to avoid coupling
      let u, v, s;
      do { u = rng()*2-1; v = rng()*2-1; s = u*u+v*v; } while (s===0 || s>=1);
      const z = u*Math.sqrt(-2*Math.log(s)/s);
      return Math.max(0, Math.round(lambda + Math.sqrt(lambda)*z));
    }
  };
}
function makeGamma(rng, normFn){
  // Marsaglia & Tsang for shape k>=1; shape boost for k<1 (Ahrens-Dieter-ish)
  // theta = scale; returns sample from Gamma(k, theta), mean = k*theta.
  return function gamma(k, theta){
    if (!(k>0) || !(theta>0)) return 0;
    if (k < 1){
      // Boost: Gamma(k) = Gamma(k+1) * U^(1/k)
      const g = gamma(k+1, theta);
      const u = rng();
      return g * Math.pow(u, 1/k);
    }
    const d = k - 1/3, c = 1/Math.sqrt(9*d);
    while (true){
      let x, v;
      do { x = normFn(0,1); v = 1 + c*x; } while (v<=0);
      v = v*v*v;
      const u = rng();
      if (u < 1 - 0.0331*x*x*x*x) return d*v*theta;
      if (Math.log(u) < 0.5*x*x + d*(1 - v + Math.log(v))) return d*v*theta;
    }
  };
}

/* ============================================================================
   Image simulator — baseline Gaussian emission line (spectro) or 2D point source (imager)
   Returns: { single:Float32Array(H*W), stack:Float32Array(H*W), W, H,
              wavelengths (Å, length W), xPhys (Å), yPhys ("), title_single, title_stack }
   Physics matches Observation.SimulateFIREBallemCCDImage for source="Baseline Spectra".
   ========================================================================== */

/* 1D Gaussian convolution — boundary-normalised (handles edges correctly).
   Returns a new Float64Array of same length. sigma < 0.5 → identity. */
function gaussConv1D(arr, sigma){
  if (sigma < 0.5) return arr;
  const n = arr.length;
  const r = Math.ceil(3.5 * sigma);
  const out = new Float64Array(n);
  for (let i=0;i<n;i++){
    let s = 0, w = 0;
    for (let d=-r;d<=r;d++){
      const j = i + d;
      if (j < 0 || j >= n) continue;
      const wt = Math.exp(-0.5*(d/sigma)**2);
      s += arr[j] * wt; w += wt;
    }
    out[i] = w > 0 ? s/w : 0;
  }
  return out;
}

/* Separable 2D Gaussian blur on a row-major Float64Array of size H×W. */
function gaussBlur2D(data, W, H, sigma){
  if (sigma < 0.5) return data;
  // Blur rows (spectral direction)
  const tmp = new Float64Array(H * W);
  const row = new Float64Array(W);
  for (let j=0;j<H;j++){
    for (let i=0;i<W;i++) row[i] = data[j*W+i];
    const blurred = gaussConv1D(row, sigma);
    for (let i=0;i<W;i++) tmp[j*W+i] = blurred[i];
  }
  // Blur columns (spatial direction)
  const out = new Float64Array(H * W);
  const col = new Float64Array(H);
  for (let i=0;i<W;i++){
    for (let j=0;j<H;j++) col[j] = tmp[j*W+i];
    const blurred = gaussConv1D(col, sigma);
    for (let j=0;j<H;j++) out[j*W+i] = blurred[j];
  }
  return out;
}

function gauss1d(x, x0, sigma){
  const a = (x-x0)/sigma;
  return Math.exp(-0.5*a*a);
}
function erf01(x){return 0.5*(1+erf(x))}

/* Parse a user-supplied 2-column CSV (wave, value). Auto-detects Å/nm/µm.
   Returns a plain JS array resampled onto SPECTRA_DATA.grid (length = grid.n), or null on failure. */
function parseUserCSV(text){
  if (!SPECTRA_DATA) return null;
  const rows = [];
  for (const line of text.split(/\r?\n/)){
    const parts = line.trim().split(/[\s,]+/);
    if (parts.length < 2) continue;
    const a = parseFloat(parts[0]), b = parseFloat(parts[1]);
    if (!isFinite(a) || !isFinite(b)) continue;
    rows.push([a, b]);
  }
  if (rows.length < 2) return null;
  let wave = rows.map(r => r[0]);
  const vals = rows.map(r => r[1]);
  // Auto-detect units from median wavelength
  const med = wave.slice().sort((a,b)=>a-b)[Math.floor(wave.length/2)];
  if (med < 50)       wave = wave.map(w => w * 1000);   // µm → nm
  else if (med > 1e4) wave = wave.map(w => w / 10);     // Å → nm
  // Resample onto SPECTRA_DATA.grid (in nm)
  const g = SPECTRA_DATA.grid;
  const n = g.n;
  const wMin = g.min_nm, wMax = g.max_nm;
  // Build sorted index
  const order = wave.map((_,i)=>i).sort((a,b)=>wave[a]-wave[b]);
  const sw = order.map(i=>wave[i]);
  const sv = order.map(i=>vals[i]);
  const out = [];
  for (let k=0; k<n; k++){
    const nm = wMin + (wMax - wMin) * k / (n - 1);
    if (nm <= sw[0])         { out.push(sv[0]); continue; }
    if (nm >= sw[sw.length-1]){ out.push(sv[sv.length-1]); continue; }
    let lo = 0, hi = sw.length - 1;
    while (hi - lo > 1){ const mid = (lo+hi)>>1; if (sw[mid]<=nm) lo=mid; else hi=mid; }
    const t = (nm - sw[lo]) / (sw[hi] - sw[lo]);
    out.push(sv[lo]*(1-t) + sv[hi]*t);
  }
  return out;
}

/* Build (once) a shared <dialog> for CSV format reminders.
   Returns {dialog, body, onOk} where onOk is set before each showModal() call. */
let _csvDialog = null;
function getCsvDialog(){
  if (_csvDialog) return _csvDialog;
  const dlg = document.createElement("dialog");
  Object.assign(dlg.style, {
    background:"var(--panel,#1e1e2e)", color:"var(--text,#cdd6f4)",
    border:"1px solid var(--accent,#7aa2f7)", borderRadius:"8px",
    padding:"18px 20px", maxWidth:"360px", fontSize:"12px", lineHeight:"1.65"
  });

  const body = document.createElement("div");
  dlg.appendChild(body);

  const btnRow = document.createElement("div");
  Object.assign(btnRow.style, { display:"flex", gap:"8px", justifyContent:"flex-end", marginTop:"14px" });

  const btnCancel = document.createElement("button");
  btnCancel.textContent = "Cancel";
  Object.assign(btnCancel.style, { padding:"3px 12px", cursor:"pointer" });

  const btnOk = document.createElement("button");
  btnOk.textContent = "OK — choose file";
  Object.assign(btnOk.style, { padding:"3px 12px", cursor:"pointer", fontWeight:"bold" });

  btnRow.appendChild(btnCancel);
  btnRow.appendChild(btnOk);
  dlg.appendChild(btnRow);
  document.body.appendChild(dlg);

  const state = { dialog: dlg, body, onOk: null };
  btnCancel.addEventListener("click", () => dlg.close());
  btnOk.addEventListener("click", () => { dlg.close(); if (state.onOk) state.onOk(); });
  _csvDialog = state;
  return state;
}

/* Append a "Load" button next to a dropdown row.
   lines: array of strings shown as the format reminder (plain text, one per paragraph).
   onLoaded(key, array) called after successful parse. */
function attachCsvLoader(selectId, d3RowSel, lines, onLoaded){
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".csv,.txt";
  input.style.display = "none";
  document.body.appendChild(input);

  d3RowSel.append("button")
    .style("padding","1px 7px").style("font-size","11px").style("cursor","pointer")
    .style("border","1px solid var(--line)").style("border-radius","3px")
    .style("background","var(--panel)").style("color","var(--text-soft)").style("white-space","nowrap")
    .text("Load")
    .on("click", function(e){
      e.preventDefault();
      const dlg = getCsvDialog();
      // Populate body with plain-text paragraphs
      while (dlg.body.firstChild) dlg.body.removeChild(dlg.body.firstChild);
      lines.forEach((line, i) => {
        const p = document.createElement(i === 0 ? "strong" : "p");
        p.textContent = line;
        if (i === 0) { const br = document.createElement("div"); br.style.marginBottom = "6px"; dlg.body.appendChild(p); dlg.body.appendChild(br); }
        else dlg.body.appendChild(p);
        p.style.margin = "2px 0";
      });
      dlg.onOk = () => input.click();
      dlg.dialog.showModal();
    });

  input.addEventListener("change", function(){
    const file = input.files[0];
    if (!file) return;
    input.value = "";
    const reader = new FileReader();
    reader.onload = function(ev){
      const arr = parseUserCSV(ev.target.result);
      if (!arr){ alert("Could not parse CSV — expected 2 columns: wavelength, value."); return; }
      const key = "user:" + file.name.replace(/\.(csv|txt)$/i,"");
      const sel = document.getElementById(selectId);
      if (sel){
        const prev = sel.querySelector(`option[value="${CSS.escape(key)}"]`);
        if (prev) prev.remove();
        const newOpt = document.createElement("option");
        newOpt.value = key;
        newOpt.textContent = key;
        sel.appendChild(newOpt);
        sel.value = key;
      }
      onLoaded(key, arr);
    };
    reader.readAsText(file);
  });
}

/* Interpolate a baked curve {min_nm, max_nm, n, values:[...]} onto a target wavelength array (Å). */
function interpCurve(values, gridSpec, targetAngstroms){
  if (!values || !values.length) return null;
  const out = new Float64Array(targetAngstroms.length);
  const minNm = gridSpec.min_nm, maxNm = gridSpec.max_nm, n = values.length;
  const dnm = (maxNm - minNm) / (n - 1);
  for (let i=0; i<targetAngstroms.length; i++){
    const nm = targetAngstroms[i] / 10;
    if (nm < minNm || nm > maxNm){ out[i] = 0; continue; }
    const f = (nm - minNm) / dnm;
    const i0 = Math.floor(f);
    const i1 = Math.min(n-1, i0+1);
    const t = f - i0;
    out[i] = values[i0]*(1-t) + values[i1]*t;
  }
  return out;
}

function simulateImage(p){
  // Use scalar parameters from STATE.values + FLAGS
  const W = p.W || 500, H = p.H || 100;          // detector size (W = spectral, H = spatial)
  const seed = p.seed >>> 0;
  const rng = makeRng(seed);
  const norm = makeNormal(rng);
  const pois = makePoisson(rng);
  const gam = makeGamma(rng, norm);
  // Reported back so the Optics panel legend can show which curve was actually used
  let sourceInfo_throughput = "flat";
  let sourceInfo_atm        = "flat";

  // Pull params
  const wavelength = p.wavelength;                  // nm
  const Spectral_resolution = p.Spectral_resolution;
  const Slitwidth = p.Slitwidth, Slitlength = p.Slitlength;
  const PSF_RMS_mask = p.PSF_RMS_mask, PSF_RMS_det = p.PSF_RMS_det;
  const Size_source = p.Size_source, Line_width = p.Line_width;
  const pixel_scale = p.pixel_scale, dispersion = p.dispersion;
  const Bandwidth = p.Bandwidth;
  const QE = p.QE, Throughput = p.Throughput, Atmosphere = p.Atmosphere;
  const Collecting_area = p.Collecting_area;
  const Sky = p.Sky, Signal = p.Signal_in;
  const exposure_time = p.exposure_time, readout_time = p.readout_time, acquisition_time = p.acquisition_time;
  const RN = p.RN, Dark_current = p.Dark_current, CIC_charge = p.CIC_charge;
  const EM_gain = p.EM_gain, extra_background = p.extra_background;
  const cosmic_ray_loss_per_sec = p.cosmic_ray_loss_per_sec;
  const Throughput_FWHM = p.Throughput_FWHM; // Å
  const spectro = !!p.spectrograph, counting_mode = !!p.counting_mode;
  const opt_QElambda = p.QElambda!==false;
  const opt_atmlambda = p.atmlambda!==false;
  const opt_skylines = !!p.sky_lines;
  const mode = p.source_im || "Sim image";   // "Sim image" | "Source" | "Convolved source" | "SNR"

  // ---- Reproduce key derived quantities from Observation.initilize ----
  const fsr = 2.35, arcsec2str = Math.pow(Math.PI/180/3600, 2);
  // PSF in spectral pixels
  const PSF_lambda_pix = 10*wavelength/Spectral_resolution/dispersion;
  // Spectral resolution effective (in Å)
  const point_source_spectral_resolution = 10*wavelength/Spectral_resolution; // Å
  const diffuse_spectral_resolution = Math.sqrt(point_source_spectral_resolution**2 + (Slitwidth*dispersion/pixel_scale)**2);

  // Spatial PSF in pixels (at detector)
  const Rx = PSF_RMS_det/pixel_scale;
  // Source spatial sigma (in detector pixels)
  const PSF_x = Math.sqrt(Math.min(Size_source/pixel_scale, Slitlength/pixel_scale)**2 + Rx*Rx);
  // Source spectral sigma (in detector pixels)
  const PSF_lam = Math.sqrt((diffuse_spectral_resolution/dispersion)**2 + (Line_width/dispersion)**2);

  // Effective area
  const effective_area = QE*Throughput*Atmosphere*(Collecting_area*100*100);

  // Aperture (slit) fraction
  let flux_fraction = 1;
  if (spectro){
    flux_fraction = (1 + erf(Slitlength/(2*Math.SQRT2*PSF_RMS_mask)) - 1);
    flux_fraction *= (1 + erf(Slitwidth /(2*Math.SQRT2*PSF_RMS_mask)) - 1);
    if (!isFinite(flux_fraction) || flux_fraction<=0) flux_fraction = 1;
  }

  // Signal: convert ergs → LU; per pix per s integrated over slit area (Slitwidth × dispersion in Å)
  const Signal_use = Signal > 1 ? Math.pow(10, -(Signal-20.08)/2.5)*2.06e-16 : Signal;
  const Signal_LU = convert_ergs2LU(Signal_use, wavelength);
  // factor_CU2el: e-/s per LU per pixel (depends on mode; for the image, take per-pixel rate = effective_area · arcsec2str · Slitwidth · dispersion)
  let factor_CU2el, factor_CU2el_sky;
  if (spectro){
    const sigma_eff_img = Math.sqrt(Size_source**2 + PSF_RMS_det**2);
    factor_CU2el     = effective_area * arcsec2str * Math.min(Slitwidth, sigma_eff_img) * dispersion;
    factor_CU2el_sky = effective_area * arcsec2str * Slitwidth * dispersion;
  } else {
    factor_CU2el     = effective_area * pixel_scale*pixel_scale * Throughput_FWHM;
    factor_CU2el_sky = factor_CU2el;
  }
  // Signal_el = e-/pix/exp at the SOURCE PEAK before profile spreading (we then multiply by normalized Gaussian)
  const Signal_el_total = Signal_LU * factor_CU2el * exposure_time * flux_fraction;
  // For the image, the source spreads over PSF_x × PSF_lam pixels — integrate to total e- = Signal_el_total
  // Sky rate per pixel per exposure:
  const Sky_LU = convert_ergs2LU(Sky, wavelength);
  const sky_e_per_pix_per_exp = Sky_LU * factor_CU2el_sky * exposure_time;
  const dark_per_pix_per_exp = Dark_current * exposure_time / 3600;
  const extra_per_pix_per_exp = extra_background * exposure_time / 3600;

  // N images stacked
  const cosmic_ray_loss = Math.min(cosmic_ray_loss_per_sec*(exposure_time + readout_time/2), 1);
  const N_images = acquisition_time*3600/(exposure_time + readout_time);
  const N_stack = Math.floor(N_images * (1-cosmic_ray_loss));

  // λ-axis (Å)
  const wave_min = 10*wavelength - (W/2)*dispersion;
  const wave_max = 10*wavelength + (W/2)*dispersion;
  const wavelengths = new Float64Array(W);
  for (let i=0;i<W;i++) wavelengths[i] = wave_min + (wave_max-wave_min)*i/(W-1);

  // Mapping helper — the sheet writes "SCWI SPEC" with spaces, the baked-folder key is "SCWI_SPEC".
  const instKey = (STATE.current_instrument || "").replace(/ /g,"_");

  // Throughput(λ):
  //   1. If a baked instrument-specific throughput curve exists → use it.
  //   2. Else if QElambda is on → centred Gaussian of FWHM = Throughput_FWHM.
  //   3. Else flat 1.
  const thSigma = Throughput_FWHM / 2.35;
  const throughputCurve = new Float64Array(W);
  let throughputSource = "flat";
  if (opt_QElambda){
    let used = false;
    // 1. User-loaded CSV takes priority
    const userThKey = IMG_FLAGS.user_throughput_key || "";
    if (!used && userThKey && SPECTRA_DATA && SPECTRA_DATA.throughput_per_instrument && SPECTRA_DATA.throughput_per_instrument[userThKey]){
      const c = interpCurve(SPECTRA_DATA.throughput_per_instrument[userThKey], SPECTRA_DATA.grid, wavelengths);
      if (c){
        let mx = 0; for (let i=0;i<W;i++) if (c[i]>mx) mx = c[i];
        if (mx > 0.01){
          for (let i=0;i<W;i++) throughputCurve[i] = c[i]/mx;
          used = true; throughputSource = userThKey;
        }
      }
    }
    // 2. Baked instrument-specific curve
    if (!used && SPECTRA_DATA && SPECTRA_DATA.throughput_per_instrument && SPECTRA_DATA.throughput_per_instrument[instKey]){
      const c = interpCurve(SPECTRA_DATA.throughput_per_instrument[instKey], SPECTRA_DATA.grid, wavelengths);
      if (c){
        let mx = 0; for (let i=0;i<W;i++) if (c[i]>mx) mx = c[i];
        if (mx > 0.01){
          for (let i=0;i<W;i++) throughputCurve[i] = c[i]/mx;
          used = true; throughputSource = `instrument (${instKey})`;
        }
      }
    }
    if (!used){
      for (let i=0;i<W;i++) throughputCurve[i] = gauss1d(wavelengths[i], wavelength*10, thSigma);
      throughputSource = `Gaussian FWHM=${Throughput_FWHM.toFixed(0)}Å`;
    }
  } else {
    throughputCurve.fill(1);
  }

  // Atmosphere curve:
  //   1. If a baked instrument-specific atm curve exists → use it.
  // Atmosphere curve — always driven by p.atm_kind (the dropdown value).
  // The special key "instrument:KEY" means use atm_per_instrument[KEY] from the baked data.
  // This key is injected into the dropdown by applyInstrument() when the instrument has its own curve.
  const atmCurve = new Float64Array(W);
  let atmSource = "flat";
  if (opt_atmlambda){
    let used = false;
    const ak = p.atm_kind || "";
    // Instrument-specific curve (key starts with "instrument:")
    if (!used && ak.startsWith("instrument:") && SPECTRA_DATA && SPECTRA_DATA.atm_per_instrument){
      const iKey = ak.slice("instrument:".length);
      const raw = SPECTRA_DATA.atm_per_instrument[iKey];
      if (raw){
        const c = interpCurve(raw, SPECTRA_DATA.grid, wavelengths);
        if (c){ let mx=0; for(let i=0;i<W;i++) if(c[i]>mx) mx=c[i];
          if(mx>0.01){ for(let i=0;i<W;i++) atmCurve[i]=c[i]; used=true; atmSource=ak; } }
      }
    }
    // Global curve from dropdown
    if (!used && SPECTRA_DATA && SPECTRA_DATA.atm && ak && SPECTRA_DATA.atm[ak]){
      const c = interpCurve(SPECTRA_DATA.atm[ak], SPECTRA_DATA.grid, wavelengths);
      if (c){ let mx=0; for(let i=0;i<W;i++) if(c[i]>mx) mx=c[i];
        if(mx>0.01){ for(let i=0;i<W;i++) atmCurve[i]=c[i]; used=true; atmSource=ak; }
        else console.warn(`[etc] atm curve "${ak}" is ~0 in this window — using flat atm.`); }
    }
    if (!used){ atmCurve.fill(1); atmSource="flat"; }
  } else {
    atmCurve.fill(1);
  }
  // Expose for the Optics overlay legend
  sourceInfo_throughput = throughputSource;
  sourceInfo_atm        = atmSource;

  // Spectral profile of the source — either:
  //   - "Baseline emission line": Gaussian centred mid-W, sigma = PSF_lam (original behaviour), OR
  //   - a baked spectrum (continuum SED): interpolate it on the detector wavelengths
  //
  // We follow Observation.py SimulateFIREBallemCCDImage closely:
  //   - spatialProfile = Gaussian1D(amp=1, sigma=PSF_x)         (peak=1, NOT sum=1)
  //   - spectra        = Gaussian1D(amp=1, sigma=PSF_λ) × atm × throughput
  //   - source_im      = outer(spectra, spatial × slit) / Σ_smaller_psf
  //   - amplitude      = Signal_el_total (proportional to Signal slider through Signal_el_total)
  // The key trick (Python): we normalise the total flux by the sum of a NARROWER PSF, which makes
  // the peak of the source proportional to Signal_el_total / (2π σ_y σ_λ) — physically correct,
  // and visible on the imshow when Signal grows.

  const spectralProfile = new Float64Array(W);
  const wantedSpec = p.spectrum || "Baseline emission line";
  const isCubeSpec = EMISSION_CUBES_ENABLED && wantedSpec.startsWith(CUBE_KEY_PREFIX);
  const cubeKey    = isCubeSpec ? wantedSpec.slice(CUBE_KEY_PREFIX.length) : null;
  const cubeMeta   = (cubeKey && CUBE_INDEX) ? CUBE_INDEX[cubeKey] : null;
  const detFov     = H * pixel_scale;  // arcsec
  const cubeData   = (cubeKey && CUBE_CACHE[cubeKey]) ? CUBE_CACHE[cubeKey] : null;

  if (!isCubeSpec){
    if (wantedSpec === "Baseline emission line" || !SPECTRA_DATA || !SPECTRA_DATA.spectra[wantedSpec]){
      for (let i=0;i<W;i++) spectralProfile[i] = gauss1d(i, W/2, PSF_lam);
    } else {
      const redshift = (typeof p.Redshift==="number") ? p.Redshift : 0;
      const observedRest = new Float64Array(W);
      for (let i=0;i<W;i++) observedRest[i] = wavelengths[i] / (1 + redshift);
      const fluxRest = interpCurve(SPECTRA_DATA.spectra[wantedSpec], SPECTRA_DATA.grid, observedRest);
      let sum = 0, count = 0;
      for (let i=0;i<W;i++){ if (isFinite(fluxRest[i]) && fluxRest[i]>0){ sum += fluxRest[i]; count++; } }
      const meanFlux = count > 0 ? sum / count : 1;
      const norm = meanFlux > 0 ? meanFlux : 1;
      for (let i=0;i<W;i++) spectralProfile[i] = fluxRest[i] / norm;
    }
  }
  // Apply throughput × atm (only for non-cube path; cubes get per-column multiplication below)
  if (!isCubeSpec){
    for (let i=0;i<W;i++) spectralProfile[i] *= throughputCurve[i]*atmCurve[i];
    if (wantedSpec !== "Baseline emission line"){
      const convolved = gaussConv1D(spectralProfile, PSF_lam);
      for (let i=0;i<W;i++) spectralProfile[i] = convolved[i];
    }
  }

  // 2D source shape — source2D[j*W_src + i] where W_src=W (spectral), j=spatial
  // For separable shapes we just need the along-slit profile (spatialProfile[j]).
  // For Bar we need 2D because along-slit profile depends on spectral column (slit position).
  const shape     = (p.source_shape || "Gaussian");
  const barAngle  = ((p.bar_angle || 0) * Math.PI / 180);
  const srcRadius = Math.max(0.01, Size_source) / pixel_scale;  // in detector pixels

  // Along-slit spatial profile (peak=1) — used for separable shapes
  const spatialProfile = new Float64Array(H);
  const cosA = Math.cos(barAngle), sinA = Math.sin(barAngle);
  for (let j=0;j<H;j++){
    const dy = j - H/2;
    if (shape === "Moffat"){
      const beta = 2.5;
      spatialProfile[j] = Math.pow(1 + (dy/Math.max(0.01,PSF_x))**2, -beta);
    } else if (shape === "Disk"){
      spatialProfile[j] = Math.abs(dy) <= PSF_x ? 1.0 : 0.0;
    } else if (shape === "Bar"){
      // Bar is infinite in the direction perpendicular to barAngle.
      // Along-slit profile = cross-section through the bar at x=0 (slit center).
      // Perpendicular distance from bar centre axis = |dy * cos(angle)|
      const d = Math.abs(dy * cosA);
      spatialProfile[j] = Math.exp(-0.5*(d/Math.max(0.01,PSF_x))**2);
    } else {
      // Gaussian (default)
      spatialProfile[j] = gauss1d(j, H/2, PSF_x);
    }
  }

  // Slit profile (only for spectro): erf gate, peak=1
  const slitProfile = new Float64Array(H);
  if (spectro){
    const length = Slitlength/2/pixel_scale;
    for (let j=0;j<H;j++){
      const dj = j - H/2;
      const a = erf((length - dj)/(Math.SQRT2*Math.max(Rx,0.05)));
      const b = erf((length + dj)/(Math.SQRT2*Math.max(Rx,0.05)));
      slitProfile[j] = 0.5*(a+b);
    }
    let m = 0; for (let j=0;j<H;j++) if (slitProfile[j]>m) m=slitProfile[j];
    if (m>0) for (let j=0;j<H;j++) slitProfile[j] /= m;
  } else {
    slitProfile.fill(1);
  }

  const source = new Float64Array(W*H);

  if (isCubeSpec && cubeMeta && cubeData){
    // ---- Emission datacube path ------------------------------------------
    // cube layout: Float32Array, row-major (nz, ny, nx) as written by bake_cubes.py
    // Cube baked at exactly SCWI detector pixel scale: 1 cube pixel = 1 detector pixel.
    // cube shape: (nz=500, ny=100, nx=100) = (spectral, along-slit, cross-slit)
    // Python layout after transpose: cube[x_spatial, y_cross, lambda]
    // pre_im = mean(cube[:, slit_lo:slit_hi, :], axis=1) → (H, W)
    // Here cube is stored (nz, ny, nx) so cube[iz, j, cx] = cube[lambda, x_along_slit, y_cross]
    const [nz, ny, nx] = cubeMeta.shape;
    const cWaveMin = cubeMeta.wave_min, cWaveMax = cubeMeta.wave_max;
    const cWaveStep = (cWaveMax - cWaveMin) / Math.max(1, nz - 1);

    // Detector wavelength axis (Å → nm for cube lookup)
    const detWave_nm = new Float64Array(W);
    for (let i=0;i<W;i++) detWave_nm[i] = wavelengths[i] / 10;

    // Slit cross-section: average over cube X (cross-slit) pixels within Slitwidth
    const slitHalfPix = Math.max(0.5, (Slitwidth / pixel_scale) / 2);
    const cxLo = Math.max(0, Math.floor(nx/2 - slitHalfPix));
    const cxHi = Math.min(nx-1, Math.ceil(nx/2 + slitHalfPix));
    const cxCnt = cxHi - cxLo + 1;

    // PSF kernel (spatial, sigma=Rx detector pixels)
    const kRad = Math.max(2, Math.ceil(Rx * 3));
    const psfKernel = new Float64Array(2*kRad+1);
    let psfSum = 0;
    for (let d=-kRad; d<=kRad; d++){
      const dNorm = d / Math.max(0.1, Rx);
      psfKernel[d+kRad] = Math.exp(-0.5 * dNorm * dNorm);
      psfSum += psfKernel[d+kRad];
    }
    if (psfSum > 0) for (let d=0; d<psfKernel.length; d++) psfKernel[d] /= psfSum;

    // For each spectral column i: average cross-slit, apply PSF, apply throughput
    for (let i=0;i<W;i++){
      const wNm = detWave_nm[i];
      if (wNm < cWaveMin || wNm > cWaveMax) continue;

      // Linear interp on spectral axis
      const cz_f = (wNm - cWaveMin) / cWaveStep;
      const cz0 = Math.max(0, Math.min(nz-2, Math.floor(cz_f)));
      const cz1 = cz0 + 1;
      const tz  = cz_f - cz0;

      // For each detector row j, average cube cross-slit pixels
      const sliceH = new Float64Array(H);
      for (let j=0;j<H;j++){
        let val = 0;
        for (let cx=cxLo; cx<=cxHi; cx++){
          val += (1-tz)*cubeData[cz0*ny*nx + j*nx + cx]
               +    tz *cubeData[cz1*ny*nx + j*nx + cx];
        }
        sliceH[j] = val / cxCnt;
      }

      // Convolve spatially with PSF
      const convH = new Float64Array(H);
      for (let j=0;j<H;j++){
        let s = 0;
        for (let d=-kRad; d<=kRad; d++){
          const jj = j+d; if (jj<0||jj>=H) continue;
          s += sliceH[jj] * psfKernel[d+kRad];
        }
        convH[j] = s;
      }

      const thAtm = throughputCurve[i] * atmCurve[i];
      for (let j=0;j<H;j++)
        source[j*W + i] = convH[j] * slitProfile[j] * Signal_el_total * thAtm;
    }

    // Spectral profile at centre pixel for display
    const cxMid = Math.floor(nx/2), cyMid = Math.floor(ny/2);
    for (let i=0;i<W;i++){
      const wNm = detWave_nm[i];
      if (wNm < cWaveMin || wNm > cWaveMax){ spectralProfile[i] = 0; continue; }
      const cz_f = (wNm - cWaveMin) / cWaveStep;
      const cz0 = Math.max(0, Math.min(nz-2, Math.floor(cz_f)));
      const tz  = cz_f - cz0;
      spectralProfile[i] = Math.max(0,
        (1-tz)*cubeData[cz0*ny*nx + cyMid*nx + cxMid] +
            tz*cubeData[(cz0+1)*ny*nx + cyMid*nx + cxMid]) * throughputCurve[i] * atmCurve[i];
    }
    // Normalise spectralProfile by mean (for display consistency)
    let spSum = 0, spCnt = 0;
    for (let i=0;i<W;i++) if (spectralProfile[i]>0){ spSum+=spectralProfile[i]; spCnt++; }
    const spMean = spCnt>0 ? spSum/spCnt : 1;
    if (spMean>0) for (let i=0;i<W;i++) spectralProfile[i] /= spMean;

  } else {
    // ---- Standard separable / 2D shape path --------------------------------
    const psf_spec_narrow_sigma = Math.max(0.5, PSF_lambda_pix * PSF_lambda_pix / Math.max(0.01, PSF_lam*PSF_lam + PSF_lambda_pix*PSF_lambda_pix));
    const psf_spat_narrow_sigma = Math.max(0.5, Rx * Rx / Math.max(0.01, PSF_x*PSF_x + Rx*Rx));
    let sumNarrowSpec = 0;
    for (let i=0;i<W;i++) sumNarrowSpec += gauss1d(i, W/2, psf_spec_narrow_sigma);

    if (shape === "Bar"){
      // Bar is NOT separable: each detector column (spectral position) corresponds to a
      // different cross-slit position. The slit samples a 1D cut through the 2D bar at
      // angle barAngle. Column i maps to cross-slit offset dx = (i - W/2) pixels.
      // The bar profile at (dx, dy): perpendicular distance to bar axis =
      //   d_perp = |dx*sinA - dy*cosA|   (across bar width, controlled by srcRadius)
      //   d_par  = |dx*cosA + dy*sinA|   (along bar, infinite → always 1)
      // So the spatial profile at column i is a Gaussian in dy centered where dy = dx*tanA.
      let totalFlux = 0;
      const raw2d = new Float64Array(H*W);
      for (let i=0;i<W;i++){
        const dx = i - W/2;
        for (let j=0;j<H;j++){
          const dy = j - H/2;
          const d_perp = dx*sinA - dy*cosA;
          raw2d[j*W+i] = Math.exp(-0.5*(d_perp/Math.max(0.01,srcRadius))**2);
          totalFlux += raw2d[j*W+i];
        }
      }
      const amp = Signal_el_total / Math.max(1, totalFlux);
      for (let j=0;j<H;j++){
        for (let i=0;i<W;i++){
          source[j*W+i] = amp * raw2d[j*W+i] * slitProfile[j] * spectralProfile[i];
        }
      }
    } else {
      let sumNarrowSpat = 0;
      for (let j=0;j<H;j++) sumNarrowSpat += gauss1d(j, H/2, psf_spat_narrow_sigma);
      const normFactor = (sumNarrowSpec || 1) * (sumNarrowSpat || 1);
      const amplitude = Signal_el_total / normFactor;

      for (let j=0;j<H;j++){
        const spat = amplitude * spatialProfile[j] * slitProfile[j];
        for (let i=0;i<W;i++){
          source[j*W + i] = spat * spectralProfile[i];
        }
      }
    }
  }
  // (debug log removed)

  // Sky: continuum + optional emission lines (baked sky_lines OR fallback random Gaussians).
  // IMPORTANT: sky is light that goes through the slit too — so it is GATED BY THE SLIT PROFILE
  // on the spatial axis (just like the source). Outside the slit, no sky.
  const sky_rate = sky_e_per_pix_per_exp;        // e-/pix/exp continuum baseline (inside slit)
  const dark_rate = dark_per_pix_per_exp;
  const extra_rate = extra_per_pix_per_exp;

  // Per-column sky multiplier from baked sky-line spectrum
  let skyLineMult = null;
  if (opt_skylines){
    skyLineMult = new Float64Array(W); skyLineMult.fill(1);
    // Use the catalogue selected in the dropdown (sky_kind). The user always controls which
    // catalogue is shown — no silent instrument-specific override.
    let rawCurve = null;
    if (SPECTRA_DATA && SPECTRA_DATA.sky_lines && p.sky_kind && SPECTRA_DATA.sky_lines[p.sky_kind]){
      rawCurve = interpCurve(SPECTRA_DATA.sky_lines[p.sky_kind], SPECTRA_DATA.sky_grid, wavelengths);
    }
    if (rawCurve){
      // Convolve with the instrumental spectral resolution (same as Observation.py gaussian_filter1d)
      const sigmaPix = Math.max(0.7, PSF_lam);
      const k = Math.max(2, Math.ceil(sigmaPix * 4));
      const conv = new Float64Array(W);
      for (let i = 0; i < W; i++){
        let s = 0, wt = 0;
        for (let d = -k; d <= k; d++){
          const j = i + d; if (j < 0 || j >= W) continue;
          const w = gauss1d(d, 0, sigmaPix);
          s += rawCurve[j] * w; wt += w;
        }
        conv[i] = wt > 0 ? s / wt : 0;
      }
      // The baked catalogue is normalised to max=1 (non-negative). Use it as a shape multiplier:
      // skyLineMult[i] = conv[i] preserves positions fixed — independent of the Sky slider.
      // A pixel with conv=1 carries peak-line sky; conv=0 is pure continuum (will add 1 below in skyAt).
      // We add 1 so the continuum base is preserved: skyAt(col) = sky_rate * (1 + conv[col])
      // i.e. at a strong line the sky is 2× continuum, at conv=0 it equals continuum.
      for (let i = 0; i < W; i++) skyLineMult[i] = 1 + conv[i];
    }
    // No fallback to random lines — if no catalogue covers the wavelength range, skyLineMult stays 1
    // (flat continuum) which is physically correct.
  }

  // sky multiplier value at a column
  function skyAt(col){ return skyLineMult ? sky_rate*skyLineMult[col] : sky_rate; }

  // Spatial gate: sky only present inside the slit. Dark + extra-background are everywhere
  // (they originate at the detector, not from the sky).
  function skyAtRow(col, j){ return skyAt(col) * slitProfile[j]; }

  // ---- Build single + stacked images depending on the requested display mode
  const single = new Float64Array(W*H);
  const stack = new Float64Array(W*H);
  const Nst = N_stack;

  if (mode === "Source" || mode === "Convolved source"){
    // Display the noise-free source image (e-/exp), with or without convolution / slit losses already applied (we always apply slit profile above).
    for (let j=0;j<H;j++) for (let i=0;i<W;i++) single[j*W+i] = stack[j*W+i] = source[j*W+i];
  } else if (mode === "SNR"){
    // Approximate per-pixel SNR map = source / sqrt(source + sky + dark + extra + RN²)
    for (let j=0;j<H;j++){
      for (let i=0;i<W;i++){
        const s = source[j*W+i];
        const bg = skyAtRow(i, j) + dark_rate + extra_rate;
        const noise2 = s + bg + RN*RN;
        const snr1 = noise2>0 ? s/Math.sqrt(noise2) : 0;
        single[j*W+i] = snr1;
        stack[j*W+i] = Nst > 0 ? snr1 * Math.sqrt(Nst) : 0;
      }
    }
  } else {
    // "Sim image" — full Poisson + EMCCD + RN realisation
    for (let j=0;j<H;j++){
      for (let i=0;i<W;i++){
        const lam1 = source[j*W+i] + skyAtRow(i, j) + dark_rate + extra_rate;
        let s = pois(lam1);
        if (EM_gain > 1){
          if (rng() < CIC_charge) s += 1;
          if (s > 0) s = gam(s, EM_gain);
        }
        s += norm(0, RN);
        single[j*W+i] = s;
      }
    }
    for (let j=0;j<H;j++){
      for (let i=0;i<W;i++){
        const lamN = (source[j*W+i] + skyAtRow(i, j) + dark_rate + extra_rate) * Nst;
        let s = pois(lamN);
        if (EM_gain > 1){
          const cic_sum = Nst > 0 ? pois(CIC_charge * Nst) : 0;
          if (s + cic_sum > 0) s = gam(s + cic_sum, EM_gain) / Nst;
          else s = 0;
        } else {
          s = Nst > 0 ? s / Nst : 0;
        }
        s = Nst > 0 ? s + norm(0, RN/Math.sqrt(Nst)) : 0;
        stack[j*W+i] = s;
      }
    }
  }

  return {
    single, stack, W, H, N_stack: Nst,
    wavelengths,
    xPhys_per_pix: dispersion,    // Å/pix
    yPhys_per_pix: pixel_scale,   // "/pix
    Signal_el_total, sky_e_per_pix_per_exp, dark_per_pix_per_exp, extra_per_pix_per_exp,
    cosmic_ray_loss, EM_gain, spectro,
    // Optics curves for the right-hand panel
    throughputCurve, atmCurve, skyLineMult, slitProfile,
    // Which curve was actually used (for the optics panel legend)
    sourceInfo_throughput, sourceInfo_atm,
    // Diagnostics
    spectralProfile, spatialProfile,
    // Noiseless source image (e-/pix/exp) — used by IFS cube builder to preserve correct amplitude
    source
  };
}

/* ============================================================================
   2. PHYSICS (port of Observation.initilize)
   ========================================================================== */
/* ============================================================================
   SNR CALCULATION
   ----------------------------------------------------------------------------
   The whole SNR pipeline lives in this single function. It is split into 8 named
   stages below — search for the "### N — TITLE ###" banners to navigate. The
   maths is documented in info.html §5 "SNR calculation".

   Inputs: a `p` object with all instrument/observation scalars, plus
           `p.xArr` the array of values for the x-axis sweep (so every quantity
           below is an array of length N = p.xArr.length).
   Output: { x, noises, noises_per_exp, electrons_per_pix, SNR, SB_lim_per_*, ... }
   ============================================================================ */
function computeObservation(p){

  // ## 1 — INPUT PARAMETERS (vectorised over the x-axis sweep) ##############
  const N = p.xArr.length;
  const arrify = v => (typeof v==="number")? Array(N).fill(v) : v.slice();
  let Signal=arrify(p.Signal), Sky=arrify(p.Sky), Dark_current=arrify(p.Dark_current),
      RN=arrify(p.RN), CIC_charge=arrify(p.CIC_charge), extra_background=arrify(p.extra_background),
      EM_gain=arrify(p.EM_gain), exposure_time=arrify(p.exposure_time),
      readout_time=arrify(p.readout_time), acquisition_time=arrify(p.acquisition_time),
      QE=arrify(p.QE), Throughput=arrify(p.Throughput), Atmosphere=arrify(p.Atmosphere),
      Collecting_area=arrify(p.Collecting_area), pixel_scale=arrify(p.pixel_scale),
      Spectral_resolution=arrify(p.Spectral_resolution), dispersion=arrify(p.dispersion),
      Slitwidth=arrify(p.Slitwidth), Slitlength=arrify(p.Slitlength),
      PSF_RMS_mask=arrify(p.PSF_RMS_mask), PSF_RMS_det=arrify(p.PSF_RMS_det),
      Size_source=arrify(p.Size_source), Line_width=arrify(p.Line_width),
      wavelength=arrify(p.wavelength), cosmic_ray_loss_per_sec=arrify(p.cosmic_ray_loss_per_sec),
      Bandwidth=arrify(p.Bandwidth), Throughput_FWHM=arrify(p.Throughput_FWHM),
      lambda_stack=arrify(p.lambda_stack);

  const IFS = !!p.IFS, spectro = !!p.spectrograph, counting_mode = !!p.counting_mode;
  const SNR_res = p.SNR_res || "per pix";
  const fsr = 2.35, arcsec2str = Math.pow(Math.PI/180/3600, 2);

  // ## 2 — SOURCE FLUX → CONTINUUM UNITS + APERTURE FRACTION ###############
  // Magnitudes (Signal > 1) are interpreted as UV mAB and converted to ergs.
  // Circular fibers get a π/4 disc-vs-square geometric correction.
  Signal = Signal.map(s => s>1 ? Math.pow(10, -(s-20.08)/2.5)*2.06e-16 : s);
  for(let i=0;i<N;i++){ if (Math.abs(Slitlength[i]-Slitwidth[i])<1e-12) Signal[i] *= Math.PI/4; }

  // Slit aperture fraction — fraction of the source PSF that passes through the slit (info.html §5.3)
  let flux_fraction = new Array(N).fill(1);
  for(let i=0;i<N;i++){
    const f1 = (1+erf(Slitlength[i]/(2*Math.SQRT2*PSF_RMS_mask[i]))) - 1;
    let f = f1;
    if (!IFS) f *= ((1+erf(Slitwidth[i]/(2*Math.SQRT2*PSF_RMS_mask[i]))) - 1);
    flux_fraction[i] = isFinite(f) ? f : 1;
  }
  const ff_slit = flux_fraction;

  // ## 3 — PSF & SOURCE/RESOLUTION-ELEMENT SIZES (in detector pixels) ######
  const PSF_lambda_pix = new Array(N);
  for(let i=0;i<N;i++) PSF_lambda_pix[i] = 10*wavelength[i]/Spectral_resolution[i]/dispersion[i];

  // σ_eff: quadratic convolution of source and detector PSF — the actual image size on the detector.
  // Used everywhere except "per pix" (single pixel, PSF irrelevant) and the IFS 2λpix special mode.
  const sigma_eff = new Array(N);
  for(let i=0;i<N;i++) sigma_eff[i] = Math.sqrt(Size_source[i]**2 + PSF_RMS_det[i]**2);

  const source_size = new Array(N), elem_size = new Array(N), pixels_total_source = new Array(N);
  // pix_nx / pix_spec / pix_ny: spatial pixels along one slicer, spectral pixels, IFS slicer count.
  // pix_ny = 1 for non-IFS. Display: nx × nλ (× ny if IFS).
  const pix_spat = new Array(N), pix_spec = new Array(N), pix_ny = new Array(N).fill(1);
  for(let i=0;i<N;i++){
    if (spectro){
      const seff = sigma_eff[i];
      const sspec = Math.max(1, Math.sqrt(PSF_lambda_pix[i]**2 + Math.pow(Math.min(Line_width[i],Bandwidth[i])/dispersion[i],2)));
      const spat_src = Math.max(Math.min(seff*fsr, Slitlength[i])/pixel_scale[i], 1);
      source_size[i] = spat_src * sspec;
      const nslices_src = IFS ? Math.ceil(Math.sqrt(seff**2+PSF_RMS_mask[i]**2)*fsr/Slitwidth[i]) : 1;
      pixels_total_source[i] = source_size[i] * nslices_src;
      const spat_elem = Math.ceil(Math.min(PSF_RMS_mask[i]*fsr, Slitlength[i])/pixel_scale[i]);
      const spec_elem = Math.ceil(Math.sqrt(Math.min(PSF_RMS_det[i]/pixel_scale[i], PSF_lambda_pix[i])**2 + Math.min(Line_width[i]/dispersion[i], PSF_lambda_pix[i])**2));
      const nslices_elem = IFS ? Math.ceil(PSF_RMS_mask[i]*fsr/Slitwidth[i]) : 1;
      elem_size[i] = spat_elem * spec_elem * nslices_elem;
      // defaults = res-elem components (overwritten in section 4 for other modes)
      pix_spat[i] = spat_elem;
      pix_spec[i] = spec_elem;
      pix_ny[i]   = nslices_elem;
    } else {
      const seff = sigma_eff[i];
      source_size[i] = Math.pow(seff*fsr/pixel_scale[i], 2);
      elem_size[i]   = Math.pow(PSF_RMS_det[i]*fsr/pixel_scale[i], 2);
      pixels_total_source[i] = source_size[i];
      const side = Math.ceil(seff*fsr/pixel_scale[i]);
      pix_spat[i] = side; pix_spec[i] = side; pix_ny[i] = 1;
    }
  }

  // ## 4 — INTEGRATION MODE → N_pix (info.html §5.2) ########################
  let number_pixels_used = new Array(N);
  if (SNR_res==="per pix"){
    number_pixels_used.fill(1);
    for(let i=0;i<N;i++){ pix_spat[i]=1; pix_spec[i]=1; pix_ny[i]=1; }
  } else if (SNR_res==="per Res elem"){
    for(let i=0;i<N;i++){
      number_pixels_used[i] = Math.ceil(elem_size[i]);
      // pix_spat/pix_spec/pix_ny already set to res-elem components above
    }
  } else if (SNR_res==="per Source"){
    for(let i=0;i<N;i++){
      number_pixels_used[i] = Math.ceil(pixels_total_source[i]);
      if (spectro){
        const seff = sigma_eff[i];
        const sspec = Math.max(1, Math.sqrt(PSF_lambda_pix[i]**2 + Math.pow(Math.min(Line_width[i],Bandwidth[i])/dispersion[i],2)));
        const spat_src = Math.max(Math.min(seff*fsr, Slitlength[i])/pixel_scale[i], 1);
        const nslices_src = IFS ? Math.ceil(Math.sqrt(seff**2+PSF_RMS_mask[i]**2)*fsr/Slitwidth[i]) : 1;
        pix_spat[i] = Math.ceil(spat_src);
        pix_spec[i] = Math.ceil(sspec);
        pix_ny[i]   = nslices_src;
      } else {
        const side = Math.ceil(sigma_eff[i]*fsr/pixel_scale[i]);
        pix_spat[i] = side; pix_spec[i] = side; pix_ny[i] = 1;
      }
    }
  } else {
    if (spectro && IFS){
      for(let i=0;i<N;i++){
        // IFS 2λpix mode uses its own geometry — keep Size_source as-is here
        const spatial_pix_per_slicer = Slitwidth[i]/pixel_scale[i];
        const spectral_pix_adaptive = Math.max(2, Math.pow(2, Math.floor(Math.log2(spatial_pix_per_slicer))));
        const nslices = Math.sqrt(Size_source[i]**2 + PSF_RMS_mask[i]**2)/Slitwidth[i];
        const pixels_spat_total = (1/pixel_scale[i])*nslices;
        pixels_total_source[i] = pixels_spat_total * spectral_pix_adaptive;
        number_pixels_used[i] = pixels_total_source[i];
        source_size[i] = (pixels_spat_total/nslices) * spectral_pix_adaptive;
        pix_spat[i] = Math.ceil(1/pixel_scale[i]);
        pix_spec[i] = Math.ceil(spectral_pix_adaptive);
        pix_ny[i]   = Math.ceil(nslices);
      }
    } else {
      for(let i=0;i<N;i++){
        number_pixels_used[i] = Math.ceil(pixels_total_source[i]);
        if (spectro){
          const seff = sigma_eff[i];
          const sspec = Math.max(1, Math.sqrt(PSF_lambda_pix[i]**2 + Math.pow(Math.min(Line_width[i],Bandwidth[i])/dispersion[i],2)));
          const spat_src = Math.max(Math.min(seff*fsr, Slitlength[i])/pixel_scale[i], 1);
          pix_spat[i] = Math.ceil(spat_src); pix_spec[i] = Math.ceil(sspec); pix_ny[i] = 1;
        } else {
          const side = Math.ceil(sigma_eff[i]*fsr/pixel_scale[i]);
          pix_spat[i] = side; pix_spec[i] = side; pix_ny[i] = 1;
        }
      }
    }
  }

  // ## 5 — EXCESS NOISE FACTOR + DARK/CIC SHOT NOISE #######################
  // ENF = 1 in photon-counting mode or no EM gain, √2 otherwise.
  const ENF = new Array(N);
  for(let i=0;i<N;i++) ENF[i] = (counting_mode || EM_gain[i]<2) ? 1 : 2;

  const Dark_current_f = new Array(N), Dark_current_noise = new Array(N), CIC_noise = new Array(N);
  for(let i=0;i<N;i++){
    Dark_current_f[i] = Dark_current[i]*exposure_time[i]/3600;
    Dark_current_noise[i] = Math.sqrt(Dark_current_f[i]*ENF[i]);
    CIC_noise[i] = Math.sqrt(CIC_charge[i]*ENF[i]);
  }

  // ## 6 — EFFECTIVE AREA = QE × Throughput × Atm × A_tel #################
  const Photon_fraction_kept = new Array(N).fill(1), RN_fraction_kept = new Array(N).fill(1);
  const QE_eff = new Array(N), effective_area = new Array(N);
  for(let i=0;i<N;i++){
    QE_eff[i] = Photon_fraction_kept[i]*QE[i];
    effective_area[i] = QE_eff[i]*Throughput[i]*Atmosphere[i]*(Collecting_area[i]*100*100);
  }

  const cosmic_ray_loss = new Array(N);
  for(let i=0;i<N;i++) cosmic_ray_loss[i] = Math.min(cosmic_ray_loss_per_sec[i]*(exposure_time[i]+readout_time[i]/2), 1);

  const sourceSizeAfter = new Array(N), slitSizeAfter = new Array(N);
  for(let i=0;i<N;i++){
    if (SNR_res==="per Source per 2λpix" && IFS && spectro){
      let slicer_eff;
      if (Slitwidth[i]>=1.0) slicer_eff = 1.38;
      else if (Slitwidth[i]>=0.5) slicer_eff = Math.max(0.69, Size_source[i]);
      else slicer_eff = Size_source[i];
      sourceSizeAfter[i] = Size_source[i]*slicer_eff;
      slitSizeAfter[i]   = Size_source[i]*slicer_eff;
    } else {
      // Use σ_eff (source ⊛ PSF_det) so point sources are correctly spread over the PSF footprint.
      // fsr=2.35 converts σ → FWHM for comparison with physical slit dimensions.
      const seff = sigma_eff[i];
      const along  = Math.min(seff*fsr, Slitlength[i]);
      const across = Math.min(seff*fsr, Slitwidth[i]);
      sourceSizeAfter[i] = along * across;
      slitSizeAfter[i]   = along * (IFS ? Math.max(seff*fsr, Slitwidth[i]) : Slitwidth[i]);
    }
  }

  const factor_CU2el = new Array(N), factor_CU2el_sky = new Array(N);
  for(let i=0;i<N;i++){
    if (spectro){
      if (SNR_res==="per Source per 2λpix" && IFS){
        const spatial_pix_per_slicer = Slitwidth[i]/pixel_scale[i];
        const spectral_bin_pixels = Math.max(2, Math.pow(2, Math.floor(Math.log2(spatial_pix_per_slicer))));
        const spectral_bin_A = spectral_bin_pixels * dispersion[i]*10.0;
        factor_CU2el[i]     = effective_area[i]*arcsec2str*sourceSizeAfter[i]*spectral_bin_A/pixels_total_source[i];
        factor_CU2el_sky[i] = effective_area[i]*arcsec2str*slitSizeAfter[i]  *spectral_bin_A/pixels_total_source[i];
      } else {
        // Divide by source_size (pixels in one slicer/slit spatial×spectral footprint), NOT pixels_total_source.
        // pixels_total_source includes the IFS nslices factor which belongs only in number_pixels_used (noise),
        // not in the per-pixel flux conversion — otherwise IFS mode artificially divides the signal by nslices.
        const lw = Math.min(Line_width[i], Bandwidth[i]);
        factor_CU2el[i]     = effective_area[i]*arcsec2str*lw*sourceSizeAfter[i]/source_size[i];
        factor_CU2el_sky[i] = effective_area[i]*arcsec2str*Math.max(lw, dispersion[i])*slitSizeAfter[i]/source_size[i];
      }
    } else {
      factor_CU2el[i] = pixel_scale[i]*pixel_scale[i]*Throughput_FWHM[i];
      factor_CU2el_sky[i] = factor_CU2el[i];
    }
  }

  const N_images = new Array(N), N_images_true = new Array(N);
  for(let i=0;i<N;i++){
    N_images[i] = acquisition_time[i]*3600/(exposure_time[i]+readout_time[i]);
    N_images_true[i] = N_images[i]*(1-cosmic_ray_loss[i]);
  }

  // ## 7 — SIGNAL & SKY IN ELECTRONS, RN, ADDITIONAL BACKGROUND ############
  const sky = new Array(N), Sky_noise = new Array(N), Signal_LU = new Array(N), Signal_el = new Array(N), signal_noise = new Array(N);
  for(let i=0;i<N;i++){
    const Sky_CU_i = convert_ergs2LU(Sky[i], wavelength[i]);
    sky[i] = Sky_CU_i*factor_CU2el_sky[i]*exposure_time[i];
    Sky_noise[i] = Math.sqrt(sky[i]*ENF[i]);
    Signal_LU[i] = convert_ergs2LU(Signal[i], wavelength[i]);
    Signal_el[i] = Signal_LU[i]*factor_CU2el[i]*exposure_time[i]*ff_slit[i];
    signal_noise[i] = Math.sqrt(Signal_el[i]*ENF[i]);
  }

  // Read noise after EM-gain division + photon-counting analytic miscount model (info.html §5.5)
  const RN_after_gain = new Array(N);
  for(let i=0;i<N;i++) RN_after_gain[i] = RN[i]*RN_fraction_kept[i]/EM_gain[i];
  const RN_final = calculate_photon_counting_RN_noise(RN_after_gain);

  const Additional_background = new Array(N), Additional_background_noise = new Array(N);
  for(let i=0;i<N;i++){
    Additional_background[i] = extra_background[i]/3600*exposure_time[i];
    Additional_background_noise[i] = Math.sqrt(Additional_background[i]*ENF[i]);
  }

  // ## 8 — TOTAL SNR (info.html §5.4) ######################################
  // κ = √(N_pix × N_λ × N_stack)  ;  signal scales as κ²  ;  noise as κ·√(Σσ²)
  const N_resol_element_A = spectro ? Array(N).fill(1) : lambda_stack;
  const factor = new Array(N), Signal_resolution = new Array(N), Total_noise_final = new Array(N), SNR = new Array(N);
  for(let i=0;i<N;i++){
    factor[i] = Math.sqrt(number_pixels_used[i])*Math.sqrt(N_resol_element_A[i])*Math.sqrt(N_images_true[i]);
    Signal_resolution[i] = Signal_el[i]*factor[i]*factor[i];
    const inside = signal_noise[i]**2 + Dark_current_noise[i]**2 + Additional_background_noise[i]**2 + Sky_noise[i]**2 + CIC_noise[i]**2 + RN_final[i]**2;
    Total_noise_final[i] = factor[i]*Math.sqrt(inside);
    SNR[i] = Signal_resolution[i]/Total_noise_final[i];
  }

  const noises_per_exp = new Array(N), noises = new Array(N), electrons_per_pix = new Array(N);
  for(let i=0;i<N;i++){
    const sp = Math.sqrt(number_pixels_used[i]);
    noises_per_exp[i] = [
      sp*signal_noise[i], sp*Dark_current_noise[i], sp*Sky_noise[i],
      sp*RN_final[i], sp*CIC_noise[i], sp*Additional_background_noise[i],
      sp*Math.sqrt(Signal_el[i])
    ];
    noises[i] = [
      signal_noise[i]*factor[i], Dark_current_noise[i]*factor[i], Sky_noise[i]*factor[i],
      RN_final[i]*factor[i], CIC_noise[i]*factor[i], Additional_background_noise[i]*factor[i],
      Signal_resolution[i]
    ];
    electrons_per_pix[i] = [Signal_el[i], Dark_current_f[i], sky[i], 0*RN_final[i], CIC_charge[i], Additional_background[i]];
  }

  // ## 9 — SURFACE BRIGHTNESS LIMIT @ SNR=5 (info.html §5.6) ##############
  const n_sigma = 5;
  const SB_lim_per_pix = new Array(N), SB_lim_per_res = new Array(N), SB_lim_per_source = new Array(N);
  for(let i=0;i<N;i++){
    const sn_nf = signal_noise[i]*factor[i], Tnf = Total_noise_final[i];
    const val = (n_sigma**2 * ENF[i] + n_sigma * Math.sqrt(4*Tnf*Tnf - 4*sn_nf*sn_nf + ENF[i]**2 * n_sigma**2))/2;
    const lu_per_e = Signal_LU[i]/Signal_resolution[i];
    const sig_ergs = convert_LU2ergs(val*lu_per_e, wavelength[i]);
    SB_lim_per_pix[i] = sig_ergs;
    SB_lim_per_res[i] = sig_ergs/elem_size[i];
    SB_lim_per_source[i] = sig_ergs/source_size[i];
  }

  return { x: p.xArr, N, noises_per_exp, noises, electrons_per_pix,
    Signal_el, Dark_current_f, sky, RN_final, CIC_charge, Additional_background,
    SNR, Total_noise_final, number_pixels_used, source_size, elem_size,
    pix_spat, pix_spec, pix_ny,
    SB_lim_per_pix, SB_lim_per_res, SB_lim_per_source, factor, Signal_resolution };
}

/* ============================================================================
   3. PARAMETERS — grouped into accordions (NO "Image" group)
   ========================================================================== */
const PARAMS = {
  Signal:       {tab:"Source", label:"Flux", unit:"erg/cm²/s/arcsec²/Å", min:-21, max:-9, step:0.1, log:true, default_log:-17, fmt:e=>e.toExponential(2), xable:true, tip:"Surface brightness of the diffuse source in erg/cm²/s/arcsec²/Å. Values >1 are interpreted as UV magnitudes and converted to flux."},
  Size_source:  {tab:"Source", label:"Spatial ext. (σ)", unit:"\"", min:0, max:100, step:0.01, log:false, default:1, fmt:v=>v.toFixed(2), xable:true, tip:"Spatial extension of the source (sigma) in arcseconds. Affects the number of pixels integrated over and aperture losses."},

/* ============================================================================
   4. LOAD GSHEET
   ========================================================================== */
async function loadInstruments(sheet_id, sheet_name){
  const url = `https://docs.google.com/spreadsheets/d/${sheet_id}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheet_name)}`;
  const r = await fetch(url, {mode:"cors"});
  if (!r.ok) throw new Error(`HTTP ${r.status} loading gsheet`);
  const txt = await r.text();
  const rows = d3.csvParseRows(txt);
  if (rows.length<2) throw new Error("Empty sheet");
  const header = rows[0];
  const instrNames = header.slice(3).filter(n=>n && n.trim().length);
  const dict = {}; const char_units = {};
  for (const n of instrNames) dict[n] = {};
  for (let r=1;r<rows.length;r++){
    const row = rows[r]; const key = row[1]; const unit = row[2];
    if (!key) continue;
    char_units[key] = unit||"";
    for (let c=0;c<instrNames.length;c++){
      const raw = row[3+c];
      if (raw==null || raw==="") continue;
      const f = parseFloat(raw);
      dict[instrNames[c]][key] = isFinite(f) ? f : raw;
    }
  }
  STATE.instruments = {colnames: instrNames, char_units, dict};
  return STATE.instruments;
}

function applyInstrument(name){
  const d = STATE.instruments.dict[name]; if (!d) return;
  STATE.current_instrument = name;
  // Reset every param to its default first, then overlay sheet values.
  // This mirrors Python where each Observation is constructed fresh — it prevents
  // parameters absent from one instrument's sheet row from keeping a stale value
  // set by the previously selected instrument.
  initValuesToDefault();
  for (const k of Object.keys(PARAMS)){
    if (k in d && typeof d[k]==="number" && isFinite(d[k])) STATE.values[k] = d[k];
  }
  if ("IFS" in d) FLAGS.IFS = !!d.IFS;
  if (d.dimensions === 3) FLAGS.IFS = true;   // match Observation.py: dimensions=3 implies IFS=True
  if ("spectrograph" in d) FLAGS.spectrograph = !!d.spectrograph;
  const _ifsCb = document.getElementById("cb-ifs-flag");
  if (_ifsCb) _ifsCb.checked = FLAGS.IFS;
  // Stash for IFS view (needs FOV_size)
  STATE.instrument_FOV_size = (typeof d.FOV_size === "number") ? d.FOV_size : null;
  for (const k of Object.keys(PARAMS)) syncSlider(k);
  IFS_STATE.rect = null;          // reset extraction box on instrument change
  IFS_STATE.lambda_center = null; // reset λ cursor → defaults to central detector λ next render
  updateIfsTabVisibility();
  document.body.setAttribute("data-spectro", FLAGS.spectrograph ? "true" : "false");
  // UV instruments default to UV_atm_lines sky catalogue
  const isUV = /FIREBall|GALEX|UVEX|SCWI/i.test(name);
  if (isUV && SPECTRA_DATA && SPECTRA_DATA.sky_lines && SPECTRA_DATA.sky_lines["UV_atm_lines"]){
    IMG_FLAGS.sky_kind = "UV_atm_lines";
    const el = document.getElementById("img-sky-kind");
    if (el) el.value = "UV_atm_lines";
  }

  // Inject instrument-specific atm curve into the dropdown (or remove it if absent)
  const instKey2 = name.replace(/ /g,"_");
  const atmEl = document.getElementById("img-atm-kind");
  const instAtmKey = `instrument:${instKey2}`;
  if (atmEl){
    // Remove any previously injected instrument option
    const prev = atmEl.querySelector("option[data-inst]");
    if (prev) prev.remove();
    if (SPECTRA_DATA && SPECTRA_DATA.atm_per_instrument && SPECTRA_DATA.atm_per_instrument[instKey2]){
      // Prepend the instrument-specific option and select it
      const opt = document.createElement("option");
      opt.value = instAtmKey;
      opt.textContent = `${instKey2} (instrument)`;
      opt.dataset.inst = "1";
      atmEl.insertBefore(opt, atmEl.firstChild);
      atmEl.value = instAtmKey;
      IMG_FLAGS.atm_kind = instAtmKey;
    } else {
      // No instrument curve — fall back to whatever is currently selected (keep user's choice)
    }
  }
}

function buildUI(){
  const root = d3.select("#accordions");
  root.selectAll("*").remove();
  GROUPS.forEach(group=>{
    const det = root.append("details").attr("class","acc").attr("open",true);
    const summ = det.append("summary");
    summ.append("span").text(group);
    if (group === "Spectrograph"){
      summ.append("label")
        .attr("class","ifs-check")
        .attr("title","Enable IFS mode (integral field spectrograph). Unlocks the IFS view tab.")
        .on("click", e => e.stopPropagation())
        .call(lbl => {
          lbl.append("input").attr("type","checkbox").attr("id","cb-ifs-flag")
            .property("checked", FLAGS.IFS)
            .on("change", function(){ FLAGS.IFS = this.checked; updateIfsTabVisibility(); scheduleUpdate(); });
          lbl.append("span").text("IFS");
        });
    }
    const body = det.append("div").attr("class","acc-body");
    for (const [k,p] of Object.entries(PARAMS)){
      if (p.tab!==group) continue;
      const row = body.append("div").attr("class","slider-row").attr("id", `row-${k}`);
      // Tooltip = explanation only (no parameter name, no "click to use as x-axis" hint)
      const tipText = p.tip || (p.label + (p.unit?` [${p.unit}]`:""));
      const lab = row.append("label").attr("title", tipText)
        .attr("data-label-key", k)
        .classed("is-x", STATE.xKey===k)
        .text(p.label + (p.unit?` [${p.unit}]`:""));
      if (p.xable){
        lab.on("click", function(){
          // Click to set x-axis is meaningful only on the SNR view (where the x-axis is plotted)
          if (STATE.view !== "snr") return;
          STATE.xKey = k;
          const sel = document.getElementById("xaxis");
          sel.value = k;
          document.querySelectorAll("label.is-x").forEach(el=>el.classList.remove("is-x"));
          this.classList.add("is-x");
          scheduleUpdate();
        });
      }
      const v = STATE.values[k];
      const sliderVal = p.log ? Math.log10(Math.max(v, Math.pow(10,p.min))) : v;
      const step = p.log ? (p.step||0.05) : p.step;
      const inp = row.append("input").attr("type","range").attr("data-key",k)
        .attr("title", tipText)
        .attr("min", p.min).attr("max", p.max).attr("step", step).attr("value", sliderVal);
      const val = row.append("div").attr("class","val").attr("data-val",k).text(p.fmt(v))
        .attr("title","Click to type a value")
        .style("cursor","text");
      inp.on("input", function(){
        const s = +this.value;
        STATE.values[k] = p.log ? Math.pow(10, s) : s;
        val.text(p.fmt(STATE.values[k]));
        scheduleUpdate();
      });
      // Click on the value label → inline number input
      val.on("click", function(){
        const node = this;
        const cur = STATE.values[k];
        const ni = document.createElement("input");
        ni.type = "number";
        ni.value = p.pct ? +(cur*100).toFixed(4) : cur;
        ni.step = p.log ? "any" : (p.pct ? p.step*100 : p.step) || "any";
        Object.assign(ni.style, {
          width:"72px", fontSize:"inherit", background:"var(--bg)", color:"var(--text)",
          border:"1px solid var(--accent)", borderRadius:"3px", padding:"0 3px",
          textAlign:"right", fontFamily:"inherit"
        });
        node.textContent = "";
        node.appendChild(ni);
        ni.focus(); ni.select();
        function commit(){
          const raw = parseFloat(ni.value);
          if (isFinite(raw)){
            // Clamp to the param's physical range (converted from log or pct if needed)
            const lo = p.log ? Math.pow(10, p.min) : p.min;
            const hi = p.log ? Math.pow(10, p.max) : p.max;
            const physical = p.pct ? raw / 100 : raw;
            STATE.values[k] = Math.min(hi, Math.max(lo, physical));
            syncSlider(k);
            scheduleUpdate();
          }
          node.textContent = p.fmt(STATE.values[k]);
        }
        ni.addEventListener("keydown", function(e){
          if (e.key === "Enter"){ e.preventDefault(); commit(); }
          if (e.key === "Escape"){ node.textContent = p.fmt(STATE.values[k]); }
        });
        ni.addEventListener("blur", commit);
      });
    }
  });
}

function syncSlider(k){
  const p = PARAMS[k]; if (!p) return;
  const v = STATE.values[k];
  const inp = document.querySelector(`input[data-key="${k}"]`);
  if (!inp) return;
  inp.value = p.log ? Math.log10(Math.max(v, Math.pow(10,p.min))) : v;
  const val = document.querySelector(`[data-val="${k}"]`);
  if (val) val.textContent = p.fmt(v);
}

// Returns true when the detector window overlaps the SDSS spectral range (3800–9200 Å).
function detectorInSdssDomain(){
  const wav_nm = STATE.values.wavelength || 200;
  const bw     = STATE.values.Bandwidth  || 200;  // Å
  const wMin   = 10*wav_nm - bw/2;
  const wMax   = 10*wav_nm + bw/2;
  return wMax > 3800 && wMin < 9200;
}

// ---------- MAST invoke helper ----------
async function mastInvoke(service, params){
  const body = new URLSearchParams();
  body.set("request", JSON.stringify({ service, params, format:"json", pagesize:50 }));
  const r = await fetch("https://mast.stsci.edu/api/v0/invoke", { method:"POST", body });
  if (!r.ok) throw new Error(`MAST ${service} HTTP ${r.status}`);
  return r.json();
}

// Step 1 — MAST name lookup → {ra, dec}
async function mastNameLookup(name){
  const j = await mastInvoke("Mast.Name.Lookup", { input: name, format:"json" });
  const c = j.resolvedCoordinate;
  if (!c || !c.length) throw new Error(`"${name}" not resolved by MAST`);
  return { ra: +c[0].ra, dec: +c[0].decl };
}

// Step 2 — SIMBAD TAP redshift lookup (CORS-enabled)
async function simbadRedshift(name){
  const adql = `SELECT rvz_redshift FROM basic JOIN ident ON ident.oidref=basic.oid WHERE ident.id='${name.replace(/'/g,"''")}'`;
  const url = "https://simbad.u-strasbg.fr/simbad/sim-tap/sync?REQUEST=doQuery&LANG=ADQL&FORMAT=json&QUERY=" + encodeURIComponent(adql);
  try {
    const r = await fetch(url);
    if (!r.ok) return 0;
    const j = await r.json();
    if (!j.data || !j.data.length) return 0;
    const z = j.data[0][0];
    return isFinite(+z) ? +z : 0;
  } catch(_){ return 0; }
}

// Step 3 — MAST cone search → SDSS spectrum obsid
async function mastFindSdss(ra, dec){
  const j = await mastInvoke("Mast.Caom.Cone", { ra, dec, radius: 0.02 });
  const rows = (j.data || []).filter(d =>
    d.obs_collection === "SDSS" &&
    d.dataproduct_type === "spectrum" &&
    (d.obs_id || "").startsWith("sdss_spectro_")
  );
  if (!rows.length) throw new Error("No SDSS spectrum within 1.2′");
  return rows[0].obsid;
}

// Step 4 — MAST products → spec-lite FITS URI
async function mastSpecUri(obsid){
  const j = await mastInvoke("Mast.Caom.Products", { obsid: String(obsid) });
  const rows = (j.data || []).filter(d =>
    (d.productSubGroupDescription || "").toUpperCase() === "SPECTRA" &&
    (d.dataURI || "").includes("spec-lite")
  );
  if (!rows.length) throw new Error("spec-lite product not found for obsid " + obsid);
  return rows[0].dataURI;   // e.g. "mast:SDSS/sdss/spectro/1070/52591/0072/spec-lite-..."
}

// Step 5 — Download FITS and parse HDU1 binary table → {wave (Å), flux}
async function parseFitsSpectrum(uri){
  const url = "https://mast.stsci.edu/api/v0/Download/file?uri=" + encodeURIComponent(uri);
  const r = await fetch(url);
  if (!r.ok) throw new Error(`FITS download HTTP ${r.status}`);
  const buf = await r.arrayBuffer();
  const bytes = new Uint8Array(buf);

  const dec = new TextDecoder("ascii");
  function readCards(offset){
    const meta = {};
    let i = offset;
    while (i + 80 <= bytes.length){
      const card = dec.decode(bytes.slice(i, i+80));
      i += 80;
      if (card.startsWith("END     ")) break;
      const key = card.slice(0,8).trim();
      const val = card.slice(10,30).trim().replace(/\//,"").trim();
      meta[key] = val;
    }
    // round up to next 2880-byte block
    const blockEnd = offset + Math.ceil((i - offset) / 2880) * 2880;
    return { meta, nextHdu: blockEnd };
  }

  // HDU0 (primary) — skip
  const hdu0 = readCards(0);
  // HDU1 — binary table
  const hdu1 = readCards(hdu0.nextHdu);
  const m = hdu1.meta;
  const naxis1 = parseInt(m.NAXIS1 || "0");  // row width in bytes
  const naxis2 = parseInt(m.NAXIS2 || "0");  // number of rows
  const tfields = parseInt(m.TFIELDS || "0");

  // Find loglam and flux column indices (1-based in FITS, 0-based here)
  let loglamCol = -1, fluxCol = -1, byteOffset = 0;
  const colOffsets = [];
  const colFormats = [];
  for (let c = 1; c <= tfields; c++){
    const ttype = (m[`TTYPE${c}`] || "").replace(/'/g,"").trim().toLowerCase();
    const tform = (m[`TFORM${c}`] || "").replace(/'/g,"").trim();
    colOffsets.push(byteOffset);
    colFormats.push(tform);
    if (ttype === "loglam")  loglamCol = c-1;
    if (ttype === "flux")    fluxCol   = c-1;
    // Compute column byte width: E=4, D=8, J=4, I=2, B=1, rE=r*4 ...
    const m2 = tform.match(/^(\d*)([EDJIB])/);
    const repeat = m2 ? (parseInt(m2[1])||1) : 1;
    const sz = {"E":4,"D":8,"J":4,"I":2,"B":1}[m2?m2[2]:"E"] || 4;
    byteOffset += repeat * sz;
  }
  if (loglamCol < 0 || fluxCol < 0)
    throw new Error("loglam or flux column not found in FITS HDU1");

  const dataStart = hdu1.nextHdu;
  const view = new DataView(buf);
  const wave = new Float64Array(naxis2);
  const flux  = new Float64Array(naxis2);
  for (let row = 0; row < naxis2; row++){
    const base = dataStart + row * naxis1;
    wave[row] = Math.pow(10, view.getFloat32(base + colOffsets[loglamCol], false));
    flux[row]  = view.getFloat32(base + colOffsets[fluxCol], false);
  }
  return { wave, flux };
}

async function fetchSdssObject(name){
  const status = document.getElementById("sdss-status");
  status.className = ""; status.textContent = `Resolving "${name}"…`;

  // Step 1: name → RA/Dec via MAST
  let ra, dec;
  try {
    ({ ra, dec } = await mastNameLookup(name));
    status.textContent = `RA=${ra.toFixed(4)} Dec=${dec.toFixed(4)} — querying SDSS…`;
  } catch(e){ status.className="err"; status.textContent=`Name lookup: ${e.message}`; return; }

  // Step 1b: redshift from SIMBAD (best-effort, non-blocking)
  const redshift = await simbadRedshift(name);

  // Step 2: cone search → obsid
  let obsid;
  try {
    obsid = await mastFindSdss(ra, dec);
    status.textContent = `SDSS obsid=${obsid} — fetching products…`;
  } catch(e){ status.className="err"; status.textContent=`SDSS search: ${e.message}`; return; }

  // Step 3: products → FITS URI
  let uri;
  try {
    uri = await mastSpecUri(obsid);
    status.textContent = `Downloading spectrum…`;
  } catch(e){ status.className="err"; status.textContent=`Products: ${e.message}`; return; }

  // Step 4: download + parse FITS
  let wave, flux;
  try {
    ({ wave, flux } = await parseFitsSpectrum(uri));
  } catch(e){ status.className="err"; status.textContent=`FITS: ${e.message}`; return; }

  // Inject into SPECTRA_DATA (baked SED grid 80–1100 nm × 4000 pts)
  const key = `SDSS: ${name}`;
  if (!SPECTRA_DATA){ status.className="err"; status.textContent="Spectra not loaded yet"; return; }
  if (!SPECTRA_DATA.spectra) SPECTRA_DATA.spectra = {};
  const grid = SPECTRA_DATA.grid;
  const nPts = grid.n, dNm = (grid.max_nm - grid.min_nm) / (nPts-1);
  const resampled = new Array(nPts);
  for (let i = 0; i < nPts; i++){
    const lamA = (grid.min_nm + i*dNm) * 10;  // nm → Å
    let lo = 0, hi = wave.length - 1;
    while (hi - lo > 1){ const m = (lo+hi)>>1; wave[m] <= lamA ? lo=m : hi=m; }
    const dw = wave[hi] - wave[lo];
    const t  = dw > 0 ? (lamA - wave[lo]) / dw : 0;
    resampled[i] = (lamA >= wave[0] && lamA <= wave[wave.length-1])
      ? flux[lo]*(1-t) + flux[hi]*t : 0;
  }
  const mx = resampled.reduce((a,v)=>Math.max(a,Math.abs(v)),0);
  SPECTRA_DATA.spectra[key] = mx > 0 ? resampled.map(v=>v/mx) : resampled;

  STATE.fetchedSpectrum = { name: key, redshift };
  IMG_FLAGS.spectrum = key;

  // Auto-set Signal slider to the mean SDSS flux in the detector window.
  // SDSS flux unit = 10⁻¹⁷ erg/cm²/s/Å; Signal slider is in erg/cm²/s/arcsec²/Å.
  // The SDSS 3″ fiber covers ~7 arcsec², so divide by that to get per-arcsec².
  const detWavMin = (STATE.values.wavelength||200)*10 - (STATE.values.Bandwidth||200)/2;
  const detWavMax = (STATE.values.wavelength||200)*10 + (STATE.values.Bandwidth||200)/2;
  let fluxSum = 0, fluxN = 0;
  for (let i = 0; i < wave.length; i++){
    if (wave[i] >= detWavMin && wave[i] <= detWavMax && isFinite(flux[i]) && flux[i] > 0){
      fluxSum += flux[i]; fluxN++;
    }
  }
  if (fluxN > 0){
    const meanFluxSDSS = fluxSum / fluxN;          // 10⁻¹⁷ erg/cm²/s/Å
    const meanFluxCGS  = meanFluxSDSS * 1e-17;     // erg/cm²/s/Å
    const fiberAreaAsec2 = Math.PI * (1.5*1.5);    // SDSS 3″-diameter fiber
    const SB = meanFluxCGS / fiberAreaAsec2;       // erg/cm²/s/arcsec²/Å
    const Sp = PARAMS.Signal;
    const clamped = Math.min(Math.max(SB, Math.pow(10,Sp.min)), Math.pow(10,Sp.max));
    STATE.values.Signal = clamped;
    syncSlider("Signal");
  }

  status.className = "ok";
  status.textContent = `✓ ${key} (${wave.length} pts, z=${redshift.toFixed(4)})`;
  buildImageOptionsUI();
  scheduleUpdate();
}

  tog("img-qe", "Throughput(λ) shaping (QE × instrument bandpass Gaussian)", "QElambda",

  // ----- Colormap picker -----

    const n = 6;
    for (let k=0; k<=n; k++){
      const [r,g,b] = cmapAt(name, k/n);
      stops.push(`rgb(${r|0},${g|0},${b|0}) ${(100*k/n).toFixed(0)}%`);
    }
    sw.style("background", `linear-gradient(to right, ${stops.join(",")})`);
    sw.on("click", function(){
      STATE.colormap = name;
