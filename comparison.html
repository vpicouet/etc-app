<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Generic ETC — Instrument & Detector comparison</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
  :root{
    --header-h: 38px;
    --radius:6px; --radius-sm:3px;
    --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, "JetBrains Mono", Menlo, monospace;
    --bg:#f7f7f7; --bg-alt:#f0f0f0; --panel:#ffffff;
    --line:#e2e2e2; --line-strong:#cccccc;
    --text:#1a1a1a; --text-soft:#444; --muted:#666;
    --header-bg:#fff; --header-text:var(--text);
    --accent:#348ABD; --accent-2:#E24A33;
    --plot-bg:#ffffff; --plot-axis-text:#333; --plot-axis-line:#888; --plot-curve:#000;
    --shadow-elev-1:0 1px 2px rgba(0,0,0,0.04);
  }
  body[data-mode="dark"]{
    --bg:#161a20; --bg-alt:#1c2128; --panel:#21262d;
    --line:#30363d; --line-strong:#444c56;
    --text:#e6edf3; --text-soft:#c9d1d9; --muted:#8b949e;
    --header-bg:#0d1117; --header-text:#e6edf3;
    --accent:#58a6ff; --accent-2:#ff7b72;
    --plot-bg:#1a1f27; --plot-axis-text:#c9d1d9; --plot-axis-line:#5a6473; --plot-curve:#ffffff;
    --shadow-elev-1:0 1px 2px rgba(0,0,0,0.4);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font:13px/1.4 var(--font-ui);
    height:100%;width:100%;overflow:hidden}

  header{height:var(--header-h);display:flex;align-items:center;gap:10px;padding:0 12px;
    border-bottom:1px solid var(--line);background:var(--header-bg);color:var(--header-text);
    position:relative;z-index:5}
  header h1{margin:0;font-size:14px;font-weight:600;flex:0 0 auto}
  header nav{flex:1;display:flex;gap:6px;align-items:center}
  header nav a{font-size:12px;color:var(--muted);text-decoration:none;padding:3px 8px;
    border:1px solid transparent;border-radius:var(--radius-sm)}
  header nav a.active,header nav a:hover{background:var(--bg-alt);color:var(--text);border-color:var(--line)}
  header .theme-controls{display:flex;gap:4px;align-items:center;flex:0 0 auto;margin-left:auto}
  #theme-toggle{font-size:14px;width:26px;height:22px;line-height:1;padding:0;background:transparent;
    border:1px solid var(--line);color:var(--text);border-radius:var(--radius-sm);cursor:pointer}
  #theme-toggle:hover{background:var(--bg-alt)}

  /* Main grid: scatter row | controls strip | radars row */
  /* Main layout: plots area + right sidebar */
  .app{
    display:grid;
    grid-template-columns: minmax(0,1fr) 190px;
    grid-template-rows: minmax(0,1fr) minmax(0,1fr);
    gap:6px;
    padding:6px;
    height: calc(100vh - var(--header-h));
    width:100%;
  }

  /* Scatter occupies top-left */
  .area-scatter{ grid-column:1; grid-row:1; min-height:0; min-width:0 }
  /* Radars row occupies bottom-left, split 50/50 */
  .area-radars{ grid-column:1; grid-row:2; display:grid; grid-template-columns:1fr 1fr; gap:6px; min-height:0 }
  /* Sidebar occupies the full right column, split 50/50 to align with scatter/radars */
  .area-sidebar{
    grid-column:2; grid-row:1/3;
    display:grid; grid-template-rows:1fr 1fr; gap:6px; min-height:0; overflow:hidden
  }

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow-elev-1);min-height:0;min-width:0;overflow:hidden;display:flex}

  /* Scatter panel fills its area */
  .area-scatter > .panel{ width:100%; height:100%; padding:0 }

  /* Scatter controls inside the sidebar */
  .ctl{padding:8px 10px;flex-direction:column;gap:6px;font-size:12px;overflow:auto}
  .ctl label{display:flex;align-items:center;gap:6px;color:var(--text-soft)}
  .ctl select{flex:1;font:12px var(--font-ui);padding:2px 4px;
    border:1px solid var(--line-strong);border-radius:3px;background:var(--panel);color:var(--text);min-width:0}
  .ctl .check-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;font-size:11.5px;color:var(--text-soft)}
  .ctl .check-row input[type=checkbox]{margin:0}
  .ctl-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-top:2px;font-weight:600}
  .preset-row{display:flex;flex-wrap:wrap;gap:3px;align-items:center;margin-top:5px}
  .preset-label{font-size:10px;color:var(--muted);white-space:nowrap}
  .preset-btn{font-size:10.5px;padding:2px 6px;border-radius:3px;border:1px solid var(--line);background:var(--panel);color:var(--text-soft);cursor:pointer;white-space:nowrap}
  .preset-btn:hover{border-color:var(--accent);color:var(--accent)}

  /* Pickers — vertical, inside sidebar */
  .picker-panel{padding:8px 10px;flex-direction:column;gap:6px;overflow:auto;min-height:0}
  .picker-group{display:flex;flex-direction:column;gap:4px;min-width:0}
  .picker-header{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted)}
  .picker-header label{font-weight:600;color:var(--text-soft);font-size:11px;text-transform:uppercase;letter-spacing:0.05em;flex:0 0 auto}
  .picker-header select{font:12px var(--font-ui);padding:2px 4px;
    border:1px solid var(--line-strong);border-radius:3px;background:var(--panel);color:var(--text);
    flex:1 1 auto;min-width:0}
  .picker-header .clear{font-size:11px;color:var(--muted);cursor:pointer;flex:0 0 auto;padding:2px 5px;border-radius:3px;border:1px solid transparent}
  .picker-header .clear:hover{color:var(--accent-2);border-color:var(--line)}
  .picker-sep{border:none;border-top:1px solid var(--line);margin:4px 0}
  .chips{display:flex;gap:4px;flex-wrap:wrap;min-height:16px}
  .chip{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;
    background:var(--bg-alt);border:1px solid var(--line);border-radius:10px;padding:1px 4px 1px 6px;color:var(--text);max-width:100%}
  .chip .dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex:0 0 7px}
  .chip .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .chip .x{cursor:pointer;color:var(--muted);font-weight:600;padding:0 2px;flex:0 0 auto}
  .chip .x:hover{color:var(--accent-2)}

  /* Radars */
  .area-radars > .panel{padding:4px}

  .area-scatter > .panel > svg,
  .area-radars  > .panel > svg{
    display:block;width:100%;height:100%;background:var(--plot-bg);min-width:0;min-height:0
  }

  .plot-axis text{font-size:10.5px;fill:var(--plot-axis-text);font-family:var(--font-mono)}
  .plot-axis path,.plot-axis line{stroke:var(--plot-axis-line);shape-rendering:crispEdges}
  .ax-lbl{font-size:11.5px;fill:var(--text-soft);font-style:italic}
  .instr-name{font-size:10px;fill:var(--text-soft);font-family:var(--font-mono);pointer-events:none}
  .radar-axis{stroke:var(--line);stroke-opacity:0.5;fill:none;shape-rendering:crispEdges}
  .radar-axis-line{stroke:var(--line);stroke-opacity:0.5;shape-rendering:crispEdges}
  .radar-label{font-size:10.5px;fill:var(--text-soft);font-family:var(--font-mono)}
  .radar-tick{font-size:8.5px;fill:var(--muted);font-family:var(--font-mono);pointer-events:none}
  .radar-poly{fill-opacity:0.18;stroke-width:1.8;stroke-linejoin:round}
  .radar-title{font-size:11px;fill:var(--text-soft);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.05em}

  /* Hover tooltip (shared with all SVGs on the page) */
  #hover{position:fixed;pointer-events:none;background:rgba(0,0,0,0.88);color:#fff;
    font-size:11px;padding:5px 8px;border-radius:4px;font-family:var(--font-mono);
    z-index:9999;white-space:pre;display:none;line-height:1.4;
    border:1px solid rgba(255,255,255,0.08)}

  #status{position:absolute;bottom:8px;right:10px;font-size:10.5px;color:var(--muted);
    font-family:var(--font-mono);padding:2px 6px;background:rgba(0,0,0,0);pointer-events:none}
  #status.err{color:#c00}

  @media (max-width: 920px){
    html,body{overflow:auto}
    .app{grid-template-columns:1fr;grid-template-rows:60vh auto 50vh auto;height:auto}
    .area-scatter{grid-column:1;grid-row:1}
    .area-radars{grid-column:1;grid-row:3;grid-template-columns:1fr}
    .area-radars > .panel{height:50vh}
    .area-sidebar{grid-column:1;grid-row:2;flex-direction:row;overflow:auto}
    .area-sidebar > .panel{flex:1 1 auto;min-width:160px}
    .picker-sep{display:none}
  }
</style>

<body>

<div id="hover"></div>

<header>
  <h1>Generic ETC</h1>
  <nav>
    <a href="./">Instrument simulator</a>

<div class="app">

      <div class="check-row">

        <label><input type="checkbox" id="sc-ylog" checked> y-log</label>

        <button class="preset-btn" data-x="wavelength"     data-y="Effective_area"       data-s="Collecting_area" data-c="Spectral_resolution">Wave/Area</button>
        <button class="preset-btn" data-x="FOV_size"       data-y="Effective_area"       data-s="Collecting_area" data-c="wavelength">FOV/Area</button>

    <div class="panel picker-panel">

        </div>
        <div id="det-chips" class="chips"></div>
      </div>
    </div>

</div>

<div id="status">Loading instrument database…</div>

<script>
"use strict";

/* ============================================================================
   THEME
   ========================================================================== */
function applyMode(mode){
  if (mode!=="dark" && mode!=="light") mode = "light";
  document.body.setAttribute("data-mode", mode);
  try { localStorage.setItem("etc.mode", mode); } catch(e){}
  const b = document.getElementById("theme-toggle");
  if (b) b.textContent = (mode==="dark") ? "☀" : "🌙";
  if (typeof redrawAll==="function") requestAnimationFrame(()=>requestAnimationFrame(redrawAll));
}
(function initTheme(){
  let mode = "light";
  try { mode = localStorage.getItem("etc.mode") || mode; } catch(e){}
  applyMode(mode);
  document.getElementById("theme-toggle").addEventListener("click", ()=>{
    applyMode(document.body.getAttribute("data-mode")==="dark" ? "light" : "dark");
  });
})();
function cssVar(name, fb){ return getComputedStyle(document.body).getPropertyValue(name).trim() || fb; }

/* ============================================================================
   FLOATING HOVER TOOLTIP
   ========================================================================== */
const tip = document.getElementById("hover");
function showTip(html, e){
  tip.textContent = html;
  tip.style.display = "block";
  const pad = 12;
  let x = e.clientX + pad, y = e.clientY + pad;
  const box = tip.getBoundingClientRect();
  if (x + box.width  > window.innerWidth)  x = e.clientX - pad - box.width;
  if (y + box.height > window.innerHeight) y = e.clientY - pad - box.height;
  tip.style.left = x + "px";
  tip.style.top  = y + "px";
}
function hideTip(){ tip.style.display = "none"; }

/* ============================================================================
   DATA
   ========================================================================== */
const SHEET_ID   = "1Ox0uxEm2TfgzYA6ivkTpU4xrmN5vO5kmnUPdCSt73uU";
const SHEET_NAME = "instruments.csv";
const DET_SHEET  = "Configs";

const INSTR = [];
const DETECTORS = [];  // populated by loadDetectors()

// Keys used by the detector radar — must match row[0] in the Configs sheet
const DET_KEYS = ["exposure_time","pixel_size","readout_time","RN","Dark_current","QE","CIC_charge","EM_gain"];

async function loadInstruments(){
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;
  const r = await fetch(url, {mode:"cors"});
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const txt = await r.text();
  const rows = d3.csvParseRows(txt);
  if (rows.length<2) throw new Error("Empty sheet");
  const header = rows[0];
  const instrNames = header.slice(3).filter(n => n && n.trim().length);
  const dict = {};
  for (const n of instrNames) dict[n] = {};
  for (let r=1;r<rows.length;r++){
    const row = rows[r];
    const key = row[1];
    if (!key) continue;
    for (let c=0;c<instrNames.length;c++){
      const raw = row[3+c];
      if (raw==null || raw==="") continue;
      const f = parseFloat(raw);
      dict[instrNames[c]][key] = isFinite(f) ? f : raw;
    }
  }
  for (const n of instrNames){
    INSTR.push({ name:n, raw:dict[n], derived: deriveMetrics(dict[n]) });
  }
}

async function loadDetectors(){
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(DET_SHEET)}`;
  const r = await fetch(url, {mode:"cors"});
  if (!r.ok) throw new Error(`HTTP ${r.status} loading Configs`);
  const txt = await r.text();
  const rows = d3.csvParseRows(txt);
  if (rows.length < 2) return;
  // row 0: ["Detector_type", name1, name2, ...]
  // rows 1+: [param_key, unit, val1, val2, ...]
  // Stop at the first empty name (separates detector block from Target block)
  const rawNames = rows[0].slice(1);
  const stopIdx = rawNames.findIndex(n => !n || !n.trim());
  const names = (stopIdx >= 0 ? rawNames.slice(0, stopIdx) : rawNames).map(n => n.trim()).filter(Boolean);
  // Build param→values map
  const paramRows = {};
  for (let ri = 1; ri < rows.length; ri++){
    const key = rows[ri][0] ? rows[ri][0].trim() : "";
    if (!key) continue;
    paramRows[key] = rows[ri].slice(1); // index aligns with names
  }
  for (let ci = 0; ci < names.length; ci++){
    const name = names[ci];
    const d = {};
    for (const key of DET_KEYS){
      if (!paramRows[key]) continue;
      const raw = paramRows[key][ci];
      if (raw == null || raw === "") continue;
      const f = parseFloat(raw);
      if (isFinite(f)) d[key] = f;
    }
    DETECTORS.push({ name, ...d });
  }
}

function deriveMetrics(d){
  const num = k => (typeof d[k]==="number" && isFinite(d[k])) ? d[k] : NaN;
  const Throughput  = num("Throughput");
  const QE          = num("QE");
  const Atmosphere  = num("Atmosphere");
  const Coll_m2     = num("Collecting_area");
  const PSF_det     = num("PSF_RMS_det");
  const R           = num("Spectral_resolution");
  const wavelength  = num("wavelength");
  const FOV         = num("FOV_size");
  const texp        = num("exposure_time");
  const tro         = num("readout_time");
  const cr          = num("cosmic_ray_loss_per_sec");
  const RN          = num("RN");
  const EM          = num("EM_gain");
  const CIC         = num("CIC_charge");
  const Dark        = num("Dark_current");
  const Bextra      = num("extra_background");
  const Slitwidth   = num("Slitwidth");
  const dispersion  = num("dispersion");
  const dimensions  = num("dimensions");
  const pixel_size  = num("pixel_size");

  const E2E = (isFinite(Throughput) && isFinite(QE) && isFinite(Atmosphere)) ? Throughput*QE*Atmosphere : NaN;
  const Aeff = (isFinite(E2E) && isFinite(Coll_m2)) ? E2E*Coll_m2*1e4 : NaN;
  const SpatialRes = isFinite(PSF_det) ? 1/PSF_det : NaN;
  const RN_eff = (isFinite(RN) && isFinite(EM) && EM>0) ? RN/EM : RN;
  const dark_per_exp  = (isFinite(Dark)   && isFinite(texp)) ? Dark   * texp/3600 : 0;
  const bextra_per_exp= (isFinite(Bextra) && isFinite(texp)) ? Bextra * texp/3600 : 0;
  const var_per_frame = (isFinite(CIC)?CIC:0) + (isFinite(RN_eff)?RN_eff*RN_eff:0) + dark_per_exp + bextra_per_exp;
  const det_noise_per_frame = isFinite(var_per_frame) ? Math.sqrt(Math.max(0,var_per_frame)) : NaN;
  let det_noise_per_time = NaN;
  if (isFinite(det_noise_per_frame) && isFinite(texp) && isFinite(tro)){
    const frames_per_hour = 3600 / (texp + tro);
    det_noise_per_time = det_noise_per_frame / Math.sqrt(frames_per_hour);
  }
  const Grasp = (isFinite(Aeff) && isFinite(FOV)) ? Aeff * FOV : NaN;
  const Efficiency_CR_RO = (isFinite(cr) && isFinite(texp) && isFinite(tro))
        ? Math.max(0, (1 - Math.min(cr*(texp+tro/2), 1))) * (texp/(texp+tro)) : NaN;

  return {
    E2E_throughput: E2E,
    Effective_area: Aeff,
    Spectral_resolution: R,
    Spatial_resolution_inv: SpatialRes,
    Det_noise_per_frame: det_noise_per_frame,
    Det_noise_per_time: det_noise_per_time,
    Grasp, Efficiency_CR_RO,
    wavelength, PSF_RMS_det: PSF_det,
    Collecting_area: Coll_m2, FOV_size: FOV,
    Slitwidth, dispersion,
    Throughput, QE, Atmosphere,
    exposure_time: texp, readout_time: tro,
    RN, EM_gain: EM, CIC_charge: CIC,
    Dark_current: Dark, extra_background: Bextra,
    dimensions, pixel_size
  };
}

/* ============================================================================
   SVG SIZING HELPER
   ========================================================================== */
function svgSize(svgNode){
  const parent = svgNode.parentNode;
  const rect = parent.getBoundingClientRect();
  return {
    W: Math.max(120, Math.floor(rect.width  - 2)),
    H: Math.max(120, Math.floor(rect.height - 2))
  };
}

/* ============================================================================
   AXIS TICKS — log-axis tick filter (only 1, 2, 5 × 10^k → no overlap)
   ========================================================================== */
function logTicksOneTwoFive(scale, targetCount){
  // Generate all (1,2,5) × 10^k inside the domain, then keep only enough to roughly hit targetCount.
  const [a,b] = scale.domain();
  if (!(a>0) || !(b>a)) return [];
  const out = [];
  const la = Math.floor(Math.log10(a));
  const lb = Math.ceil(Math.log10(b));
  for (let k=la; k<=lb; k++){
    for (const m of [1,2,5]){
      const v = m*Math.pow(10,k);
      if (v >= a && v <= b) out.push(v);
    }
  }
  // Downsample to roughly targetCount
  if (out.length > targetCount){
    const step = Math.ceil(out.length / targetCount);
    return out.filter((_,i)=>i%step===0);
  }
  return out;
}
function fmtTick(v){
  const a = Math.abs(v);
  if (a===0) return "0";
  if (a >= 1e4 || a < 1e-3) return d3.format(".0~e")(v);
  return d3.format(".2~g")(v);
}

/* ============================================================================
   SCATTER
   ========================================================================== */
const SCATTER_AXES = [
  "PSF_RMS_det","Spectral_resolution","wavelength",
  "Effective_area","Collecting_area","FOV_size","Grasp",
  "E2E_throughput","Throughput","QE","Atmosphere",
  "Slitwidth","dispersion","exposure_time","readout_time",
  "RN","Dark_current","CIC_charge","EM_gain","extra_background",
  "Det_noise_per_frame","Det_noise_per_time",
  "Spatial_resolution_inv","dimensions","pixel_size"
];

function fillSelect(selId, options, defaultVal){
  const sel = document.getElementById(selId);
  while (sel.firstChild) sel.removeChild(sel.firstChild);
  options.forEach(o => {
    const opt = document.createElement("option");
    opt.value = o; opt.textContent = o;
    if (o === defaultVal) opt.selected = true;
    sel.appendChild(opt);
  });
}

function valueOf(instr, key){
  if (!instr || !instr.derived) return NaN;
  const v = instr.derived[key];
  return (typeof v === "number" && isFinite(v)) ? v : NaN;
}

function drawScatter(){
  const svg = d3.select("#scatter");
  const node = svg.node();
  const {W, H} = svgSize(node);
  svg.attr("viewBox", `0 0 ${W} ${H}`);
  svg.selectAll("*").remove();
  const m = {l:56, r:90, t:14, b:34};

  const xk = document.getElementById("sc-x").value;
  const yk = document.getElementById("sc-y").value;
  const sk = document.getElementById("sc-size").value;
  const ck = document.getElementById("sc-color").value;
  const xlog = document.getElementById("sc-xlog").checked;
  const ylog = document.getElementById("sc-ylog").checked;
  const showNames = document.getElementById("sc-names").checked;

  const pts = INSTR.map(i => ({name:i.name, x:valueOf(i,xk), y:valueOf(i,yk), s:valueOf(i,sk), c:valueOf(i,ck)}))
                   .filter(p => isFinite(p.x) && isFinite(p.y) && (!xlog || p.x>0) && (!ylog || p.y>0));
  if (!pts.length){
    svg.append("text").attr("x", W/2).attr("y", H/2).attr("text-anchor","middle")
       .attr("class","instr-name").text("No instruments with both axes available");
    return;
  }
  const xExt = d3.extent(pts.map(p=>p.x));
  const yExt = d3.extent(pts.map(p=>p.y));
  const xs = xlog
    ? d3.scaleLog().domain([Math.max(xExt[0], 1e-12), xExt[1]]).range([m.l, W-m.r])
    : d3.scaleLinear().domain([xExt[0], xExt[1]]).range([m.l, W-m.r]);
  const ys = ylog
    ? d3.scaleLog().domain([Math.max(yExt[0], 1e-12), yExt[1]]).range([H-m.b, m.t])
    : d3.scaleLinear().domain([yExt[0], yExt[1]]).range([H-m.b, m.t]);
  const sExt = d3.extent(pts.map(p=>p.s).filter(isFinite));
  const sScale = (isFinite(sExt[0]) && sExt[1]>sExt[0])
    ? d3.scaleSqrt().domain([sExt[0], sExt[1]]).range([4, 14])
    : (()=>6);
  const cExt = d3.extent(pts.map(p=>p.c).filter(isFinite));
  const cScale = (isFinite(cExt[0]) && cExt[1]>cExt[0])
    ? d3.scaleSequential(d3.interpolateViridis).domain([cExt[0], cExt[1]])
    : (()=>cssVar("--accent","#348ABD"));

  // Axes with 1-2-5 log filtering
  const xAxis = d3.axisBottom(xs).tickFormat(fmtTick);
  const yAxis = d3.axisLeft  (ys).tickFormat(fmtTick);
  if (xlog) xAxis.tickValues(logTicksOneTwoFive(xs, 6));
  else      xAxis.ticks(6);
  if (ylog) yAxis.tickValues(logTicksOneTwoFive(ys, 6));
  else      yAxis.ticks(6);
  svg.append("g").attr("class","plot-axis").attr("transform",`translate(0,${H-m.b})`).call(xAxis);
  svg.append("g").attr("class","plot-axis").attr("transform",`translate(${m.l},0)`).call(yAxis);
  svg.append("text").attr("x", (W+m.l-m.r)/2).attr("y", H-4).attr("text-anchor","middle").attr("class","ax-lbl").text(xk);
  svg.append("text").attr("transform",`translate(14,${(H+m.t-m.b)/2}) rotate(-90)`).attr("text-anchor","middle").attr("class","ax-lbl").text(yk);

  const g = svg.append("g");
  pts.forEach(p => {
    const cx = xs(p.x), cy = ys(p.y);
    const rad = (typeof sScale==="function") ? sScale(isFinite(p.s)?p.s:(sExt[0]||1)) : 6;
    const col = (typeof cScale==="function") ? cScale(isFinite(p.c)?p.c:(cExt[0]||0)) : cssVar("--accent","#348ABD");
    const circle = g.append("circle").attr("cx", cx).attr("cy", cy).attr("r", rad)
      .attr("fill", col).attr("fill-opacity", 0.78)
      .attr("stroke", cssVar("--plot-curve","#000")).attr("stroke-width", 0.6)
      .style("cursor","pointer");
    circle.on("mouseenter mousemove", function(e){
      showTip(
        `${p.name}\n${xk.padEnd(16)} ${fmtTick(p.x)}\n${yk.padEnd(16)} ${fmtTick(p.y)}\n` +
        `${sk.padEnd(16)} ${isFinite(p.s)?fmtTick(p.s):"—"}\n${ck.padEnd(16)} ${isFinite(p.c)?fmtTick(p.c):"—"}`, e);
    }).on("mouseleave", hideTip);
    if (showNames){
      p._cx = cx; p._cy = cy; p._rad = rad;
    }
  });

  // Collision-aware label rendering: place each label, skip if it overlaps a prior one
  if (showNames){
    const placed = [];
    const charW = 6, charH = 10, pad = 2;
    pts.forEach(p => {
      if (!isFinite(p._cx)) return;
      const lx = p._cx + p._rad + 3, ly = p._cy + 3;
      const tw = p.name.length * charW;
      const box = {x1: lx - pad, y1: ly - charH, x2: lx + tw + pad, y2: ly + pad};
      const collision = placed.some(b => box.x1 < b.x2 && box.x2 > b.x1 && box.y1 < b.y2 && box.y2 > b.y1);
      if (!collision){
        g.append("text").attr("class","instr-name").attr("x", lx).attr("y", ly).text(p.name);
        placed.push(box);
      }
    });
  }

  // ---- Right-margin legends ----
  const lx0 = W - m.r + 10;  // left edge of the legend column
  const axisTextFill = cssVar("--plot-axis-text","#333");
  const mutedFill    = cssVar("--muted","#666");

  // COLOR legend (colorbar gradient) — top half of the right margin
  if (typeof cScale === "function" && isFinite(cExt[0]) && cExt[1] > cExt[0]){
    const cbH = Math.min(120, (H - m.t - m.b) * 0.48);
    const cbW = 10;
    const cbY = m.t + 4;
    const defs = svg.append("defs");
    const gradId = "scatter-cb-grad";
    const grad = defs.append("linearGradient").attr("id", gradId)
      .attr("x1","0").attr("y1","1").attr("x2","0").attr("y2","0"); // bottom→top = min→max
    const steps = 10;
    for (let k=0; k<=steps; k++){
      grad.append("stop")
        .attr("offset", `${k*100/steps}%`)
        .attr("stop-color", cScale(cExt[0] + k/steps*(cExt[1]-cExt[0])));
    }
    svg.append("rect")
      .attr("x", lx0).attr("y", cbY).attr("width", cbW).attr("height", cbH)
      .attr("fill", `url(#${gradId})`)
      .attr("stroke", cssVar("--line","#ccc")).attr("stroke-width", 0.5);
    // ticks: min, mid, max
    [0, 0.5, 1].forEach(t => {
      const val = cExt[0] + t*(cExt[1]-cExt[0]);
      const ty  = cbY + cbH*(1-t);
      svg.append("line").attr("x1", lx0+cbW).attr("y1", ty).attr("x2", lx0+cbW+3).attr("y2", ty)
        .attr("stroke", axisTextFill).attr("stroke-width", 0.8);
      svg.append("text").attr("x", lx0+cbW+5).attr("y", ty).attr("dy","0.35em")
        .attr("font-size","9px").attr("fill", axisTextFill).attr("font-family","var(--font-mono)")
        .text(fmtTick(val));
    });
    svg.append("text").attr("x", lx0 + cbW/2).attr("y", cbY - 6)
      .attr("text-anchor","middle").attr("font-size","9px").attr("fill", mutedFill)
      .attr("font-family","var(--font-mono)").text(ck);
  }

  // SIZE legend — bottom half of the right margin
  if (typeof sScale === "function" && isFinite(sExt[0]) && sExt[1] > sExt[0]){
    const szY0 = m.t + (H - m.t - m.b) * 0.54;
    const dotCol = cssVar("--accent","#348ABD");
    svg.append("text").attr("x", lx0).attr("y", szY0 - 6)
      .attr("font-size","9px").attr("fill", mutedFill).attr("font-family","var(--font-mono)")
      .text(sk);
    // 3 representative sizes: min, mid, max
    const szVals = [sExt[0], (sExt[0]+sExt[1])/2, sExt[1]];
    let curY = szY0;
    szVals.forEach(v => {
      const r = sScale(v);
      curY += r + 2;
      svg.append("circle").attr("cx", lx0 + 14).attr("cy", curY).attr("r", r)
        .attr("fill", dotCol).attr("fill-opacity", 0.5)
        .attr("stroke", cssVar("--plot-curve","#000")).attr("stroke-width", 0.5);
      svg.append("text").attr("x", lx0 + 14 + r + 4).attr("y", curY).attr("dy","0.35em")
        .attr("font-size","9px").attr("fill", axisTextFill).attr("font-family","var(--font-mono)")
        .text(fmtTick(v));
      curY += r + 4;
    });
  }
}

/* ============================================================================
   PICKERS (instruments + detectors)
   Each picker stores its current selection in a small ordered Set-like array
   (keeps insertion order so chip colors are stable).
   ========================================================================== */
const SEL_INSTR = [];   // selected instrument names
const SEL_DET   = [];   // selected detector names

function fillPickerOptions(selectId, names){
  const sel = document.getElementById(selectId);
  // keep the first <option value=""> placeholder, drop the rest
  while (sel.children.length > 1) sel.removeChild(sel.lastChild);
  names.forEach(n => {
    const o = document.createElement("option");
    o.value = n; o.textContent = n;
    sel.appendChild(o);
  });
}

function wirePicker(selectId, store, chipsId, onChange){
  const sel = document.getElementById(selectId);
  sel.addEventListener("change", e => {
    const v = sel.value;
    sel.value = "";   // reset to placeholder
    if (!v) return;
    if (!store.includes(v)){
      store.push(v);
      if (store.length > 8) store.shift();    // cap at 8 entries
      renderChips(chipsId, store, onChange);
      onChange();
    }
  });
}

function renderChips(chipsId, store, onChange){
  const root = document.getElementById(chipsId);
  while (root.firstChild) root.removeChild(root.firstChild);
  const cmap = d3.schemeTableau10;
  store.forEach((n, i) => {
    const chip = document.createElement("span");
    chip.className = "chip";
    const dot = document.createElement("span");
    dot.className = "dot";
    dot.style.background = cmap[i % cmap.length];
    const nameEl = document.createElement("span");
    nameEl.className = "name"; nameEl.textContent = n;
    const x = document.createElement("span");
    x.className = "x"; x.textContent = "×"; x.title = "Remove";
    x.addEventListener("click", ()=>{
      const idx = store.indexOf(n);
      if (idx>=0){ store.splice(idx, 1); renderChips(chipsId, store, onChange); onChange(); }
    });
    chip.appendChild(dot); chip.appendChild(nameEl); chip.appendChild(x);
    root.appendChild(chip);
  });
}

/* ============================================================================
   RADARS
   ========================================================================== */
// dir: 1 = higher-is-better (outer rim = max),  -1 = lower-is-better (outer rim = 0 / absolute best)
// unit: displayed on tick labels
// absMin: if defined, the outer-rim absolute bound for lower-is-better axes (e.g. 0 for noise/PSF)
const RADAR_INSTR_METRICS = [
  { key:"E2E_throughput",      label:"E2E throughput",   dir:1,  unit:"",       absMin:null },
  { key:"Effective_area",      label:"Eff. area (cm²)",  dir:1,  unit:"cm²",    absMin:null },
  { key:"Spectral_resolution", label:"Spectral res. R",  dir:1,  unit:"",       absMin:null },
  { key:"PSF_RMS_det",         label:"PSF σ (\")",       dir:-1, unit:"\"",     absMin:0    },
  { key:"Det_noise_per_time",  label:"Det noise/√h",     dir:-1, unit:"e-/√h",  absMin:0    },
  { key:"Det_noise_per_frame", label:"Det noise/exp",    dir:-1, unit:"e-/exp", absMin:0    }
];
const RADAR_DET_METRICS = [
  { key:"QE",            label:"QE",           dir:1,  unit:"",        absMin:null },
  { key:"RN",            label:"Read noise",   dir:-1, unit:"e-/pix",  absMin:0    },
  { key:"Dark_current",  label:"Dark",         dir:-1, unit:"e-/px/h", absMin:0    },
  { key:"CIC_charge",    label:"CIC",          dir:-1, unit:"e-/exp",  absMin:0    },
  { key:"pixel_size",    label:"Pix size",     dir:-1, unit:"μm",      absMin:0    },
  { key:"EM_gain",       label:"EM gain",      dir:1,  unit:"",        absMin:null }
];

// Returns per-axis: rawValues[], scores[] (0=worst→1=best), inner (worst), outer (best)
function buildRadarValues(metrics, getValue, selection){
  return metrics.map(m => {
    const raw = selection.map(name => {
      const v = getValue(name, m.key);
      return (typeof v === "number" && isFinite(v)) ? v : null;
    });
    const valid = raw.filter(v => v != null);
    if (!valid.length) return { ...m, raw, scores: raw.map(()=>null), inner:0, outer:1 };

    const dataMin = Math.min(...valid);
    const dataMax = Math.max(...valid);

    let inner, outer;
    if (m.dir === 1){
      // higher=better: inner=worst (min among selection), outer=best (max among selection)
      inner = dataMin;
      outer = dataMax;
    } else {
      // lower=better: outer=best (min among selection), inner=worst (max among selection)
      outer = dataMin;
      inner = dataMax;
    }

    // If all identical, spread a bit so the ring is visible
    const span = Math.abs(outer - inner);
    const safeSpan = span > 0 ? span : Math.abs(inner) * 0.1 || 1;

    const scores = raw.map(v => {
      if (v == null) return null;
      return Math.max(0, Math.min(1, (v - inner) / (outer - inner + (span===0 ? safeSpan : 0))));
    });

    return { ...m, raw, scores, inner, outer };
  });
}

function fmtRadarVal(v, unit){
  if (v == null || !isFinite(v)) return "—";
  const s = (Math.abs(v) >= 1e4 || (Math.abs(v) < 0.01 && v !== 0))
    ? d3.format(".2~e")(v)
    : d3.format(".3~g")(v);
  return unit ? `${s} ${unit}` : s;
}

function drawRadar(svgId, title, metrics, getValue, selection, displayNames){
  const svg = d3.select("#"+svgId);
  const node = svg.node();
  const {W, H} = svgSize(node);
  svg.attr("viewBox", `0 0 ${W} ${H}`);
  svg.selectAll("*").remove();
  const cx = W/2, cy = H/2 + 10;
  const R = Math.max(40, Math.min(W, H)/2 - 52);
  const cmap = d3.schemeTableau10;
  const levels = 4;

  svg.append("text").attr("x", 10).attr("y", 16).attr("class","radar-title").text(title);

  if (!selection.length){
    svg.append("text").attr("x", cx).attr("y", cy).attr("text-anchor","middle").attr("class","instr-name")
       .text("Pick at least one entry above");
    return;
  }

  const data = buildRadarValues(metrics, getValue, selection);
  const N = data.length;

  // Grid polygons
  for (let l=1; l<=levels; l++){
    const r = R * (l/levels);
    const pts = [];
    for (let i=0; i<N; i++){
      const a = (i/N)*2*Math.PI - Math.PI/2;
      pts.push([cx + r*Math.cos(a), cy + r*Math.sin(a)]);
    }
    svg.append("polygon").attr("class","radar-axis").attr("points", pts.map(p=>p.join(",")).join(" "));
  }

  // Axis lines + labels + tick annotations
  for (let i=0; i<N; i++){
    const a = (i/N)*2*Math.PI - Math.PI/2;
    const xe = cx + R*Math.cos(a), ye = cy + R*Math.sin(a);
    svg.append("line").attr("class","radar-axis-line").attr("x1",cx).attr("y1",cy).attr("x2",xe).attr("y2",ye);

    // axis label (just outside the ring)
    const lx = cx + (R+20)*Math.cos(a), ly = cy + (R+20)*Math.sin(a);
    const ta = (Math.cos(a) > 0.3) ? "start" : (Math.cos(a) < -0.3 ? "end" : "middle");
    svg.append("text").attr("class","radar-label").attr("x", lx).attr("y", ly+4)
       .attr("text-anchor", ta).text(data[i].label);

    // tick values: placed perpendicular to the axis direction to avoid overlapping the label
    const { inner, outer, unit } = data[i];
    // perpendicular unit vector (rotate 90°)
    const px = -Math.sin(a), py = Math.cos(a);
    const tickOffset = 5; // px sideways from the axis line
    for (let l=1; l<=levels; l++){
      // only mid and outer ring
      if (l !== levels && l !== Math.round(levels/2)) continue;
      const frac = l/levels;
      const val = inner + frac * (outer - inner);
      const tr = R * frac;
      // base point on the axis, shifted perpendicularly
      const tx = cx + tr*Math.cos(a) + px*tickOffset;
      const ty = cy + tr*Math.sin(a) + py*tickOffset;
      // text-anchor: follow the perpendicular direction
      const pta = (px > 0.2) ? "start" : (px < -0.2 ? "end" : "middle");
      svg.append("text")
        .attr("class","radar-tick")
        .attr("x", tx).attr("y", ty)
        .attr("text-anchor", pta)
        .attr("dy", "0.35em")
        .text(fmtRadarVal(val, unit));
    }
  }

  // Polygons per selected instrument
  selection.forEach((name, idx)=>{
    const col = cmap[idx % cmap.length];
    const pts = [];
    const valuesForTip = [];
    for (let i=0; i<N; i++){
      const s = data[i].scores[idx];
      const rv = data[i].raw[idx];
      valuesForTip.push(`${data[i].label.padEnd(18)} ${fmtRadarVal(rv, data[i].unit)}`);
      if (s == null) continue;
      const r = R * Math.max(0.04, Math.min(1, s));  // never collapse to centre
      const a = (i/N)*2*Math.PI - Math.PI/2;
      pts.push([cx + r*Math.cos(a), cy + r*Math.sin(a)]);
    }
    if (pts.length < 2) return;
    const poly = svg.append("polygon").attr("class","radar-poly")
       .attr("points", pts.map(p=>p.join(",")).join(" "))
       .attr("fill", col).attr("stroke", col).style("cursor","pointer");
    const dispName = displayNames ? displayNames(name) : name;
    poly.on("mouseenter mousemove", function(e){
      showTip(`${dispName}\n` + valuesForTip.join("\n"), e);
    }).on("mouseleave", hideTip);
  });
}

function drawInstrRadar(){
  drawRadar("radar-instr", "Instrument performance", RADAR_INSTR_METRICS,
            (name, key)=>{
              const inst = INSTR.find(i => i.name===name);
              return inst ? inst.derived[key] : NaN;
            }, SEL_INSTR);
}
function drawDetRadar(){
  drawRadar("radar-det", "Detector profile", RADAR_DET_METRICS,
            (name, key)=>{
              const det = DETECTORS.find(d => d.name === name);
              return det ? det[key] : NaN;
            }, SEL_DET);
}

/* ============================================================================
   MAIN
   ========================================================================== */
function redrawAll(){ drawScatter(); drawInstrRadar(); drawDetRadar(); }

async function main(){
  try {
    await Promise.all([loadInstruments(), loadDetectors()]);
  } catch(e){
    const st = document.getElementById("status");
    st.classList.add("err");
    st.textContent = "Failed to load DB: "+e.message;
    return;
  }
  document.getElementById("status").textContent = `${INSTR.length} instruments, ${DETECTORS.length} detectors loaded.`;

  // --- Scatter setup -------------------------------------------------------
  fillSelect("sc-x",     SCATTER_AXES, "PSF_RMS_det");
  fillSelect("sc-y",     SCATTER_AXES, "Spectral_resolution");
  fillSelect("sc-size",  SCATTER_AXES, "Effective_area");
  fillSelect("sc-color", SCATTER_AXES, "wavelength");
  ["sc-x","sc-y","sc-size","sc-color","sc-xlog","sc-ylog","sc-names"].forEach(id => {
    document.getElementById(id).addEventListener("change", drawScatter);
  });

  // --- Pickers + chips -----------------------------------------------------
  fillPickerOptions("instr-picker", INSTR.map(i => i.name));
  fillPickerOptions("det-picker",   DETECTORS.map(d => d.name));

  // Pre-select first 3 instruments + representative detector subset
  INSTR.slice(0, 3).forEach(i => SEL_INSTR.push(i.name));
  const DET_DEFAULT = ["temp=-110","CMOS UVEX","Skipper","Perfect","EMCCD201","CCD MUSE","H2RG","MAMA"];
  DET_DEFAULT.forEach(n => { if (DETECTORS.some(d => d.name===n)) SEL_DET.push(n); });
  if (!SEL_DET.length) DETECTORS.slice(0,6).forEach(d => SEL_DET.push(d.name));

  // Scatter preset buttons
  document.querySelectorAll(".preset-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.getElementById("sc-x").value     = btn.dataset.x;
      document.getElementById("sc-y").value     = btn.dataset.y;
      document.getElementById("sc-size").value  = btn.dataset.s;
      document.getElementById("sc-color").value = btn.dataset.c;
      drawScatter();
    });
  });

  renderChips("instr-chips", SEL_INSTR, drawInstrRadar);
  renderChips("det-chips",   SEL_DET,   drawDetRadar);
  wirePicker("instr-picker", SEL_INSTR, "instr-chips", drawInstrRadar);
  wirePicker("det-picker",   SEL_DET,   "det-chips",   drawDetRadar);

  document.getElementById("instr-clear").addEventListener("click", ()=>{
    SEL_INSTR.length = 0; renderChips("instr-chips", SEL_INSTR, drawInstrRadar); drawInstrRadar();
  });
  document.getElementById("det-clear").addEventListener("click", ()=>{
    SEL_DET.length = 0; renderChips("det-chips", SEL_DET, drawDetRadar); drawDetRadar();
  });

  window.addEventListener("resize", ()=> requestAnimationFrame(()=>requestAnimationFrame(redrawAll)));
  requestAnimationFrame(()=>requestAnimationFrame(redrawAll));
}
main();
</script>
